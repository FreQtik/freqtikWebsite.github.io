<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#12110f">
<meta name="color-scheme" content="dark">
<meta name="application-name" content="The Endless Dark">
<meta name="description" content="The Endless Dark — a planning-first single-hero dungeon autobattler.">
<title>The Endless Dark</title>
<style>:root {
  --bg: #0f0f0d;
  --bg-2: #171613;
  --panel: rgba(31, 29, 25, .94);
  --panel-2: rgba(43, 39, 32, .94);
  --line: #4a4337;
  --line-soft: rgba(216, 190, 135, .16);
  --text: #eee8dc;
  --muted: #a69d8d;
  --gold: #d5ad58;
  --gold-2: #ffe1a0;
  --danger: #d16a62;
  --good: #7ebe8b;
  --magic: #77a7e8;
  --rare: #e4ca65;
  --epic: #b477df;
  --legendary: #df8b46;
  --ancient: #ed6e5f;
  --shadow: 0 18px 50px rgba(0,0,0,.36);
  --radius: 16px;
  --tap: 44px;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--text);
  background: var(--bg);
  color-scheme: dark;
}

* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; background: radial-gradient(circle at 20% 0%, #252116 0%, var(--bg) 42%); }
body { min-height: 100dvh; overscroll-behavior: none; }
button, input, select, textarea { font: inherit; }
button { color: inherit; }
button:focus-visible, [tabindex]:focus-visible, select:focus-visible { outline: 2px solid var(--gold-2); outline-offset: 2px; }

#app { min-height: 100dvh; }
.app-shell { min-height: 100dvh; display: grid; grid-template-rows: auto 1fr; }
.topbar { position: sticky; top: 0; z-index: 20; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; min-height: 66px; padding: 10px max(12px, env(safe-area-inset-left)) 10px max(12px, env(safe-area-inset-right)); background: rgba(14, 13, 11, .92); border-bottom: 1px solid var(--line-soft); backdrop-filter: blur(16px); }
.brand { display: flex; gap: 10px; align-items: center; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; }
.brand-mark { width: 34px; aspect-ratio: 1; display: grid; place-items: center; border: 1px solid var(--gold); transform: rotate(45deg); background: linear-gradient(135deg, #2f281a, #17130e); box-shadow: inset 0 0 0 4px #18150f; }
.brand-mark span { transform: rotate(-45deg); color: var(--gold-2); }
.resource-row { justify-self: center; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
.resource-pill { min-height: 34px; padding: 6px 10px; border: 1px solid var(--line); border-radius: 999px; color: var(--muted); background: #171510; white-space: nowrap; }
.resource-pill strong { color: var(--text); }
.top-actions { justify-self: end; display: flex; gap: 8px; }
.icon-button, .button { min-height: var(--tap); border: 1px solid var(--line); border-radius: 12px; background: linear-gradient(#2a2721, #1d1b17); padding: 9px 13px; cursor: pointer; transition: transform .12s ease, border-color .12s ease, background .12s ease; }
.icon-button { min-width: var(--tap); padding: 8px; }
.button:hover, .icon-button:hover { border-color: #80735f; background: linear-gradient(#343027, #24211b); }
.button:active, .icon-button:active { transform: translateY(1px) scale(.99); }
.button.primary { color: #17120a; background: linear-gradient(180deg, #f0d38e, #bd8d3b); border-color: #f7dea0; font-weight: 800; }
.button.danger { background: linear-gradient(#6c322f, #3e211f); border-color: #9d4d47; }
.button.good { background: linear-gradient(#365f40, #223b28); border-color: #5f936a; }
.button.small { min-height: 34px; padding: 6px 10px; border-radius: 9px; font-size: .9rem; }
.button:disabled { cursor: not-allowed; opacity: .42; transform: none; }

.main { width: min(1600px, 100%); margin: 0 auto; padding: 18px max(12px, env(safe-area-inset-left)) calc(22px + env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-right)); }
.camp-layout { display: grid; grid-template-columns: minmax(245px, 310px) minmax(420px, 1fr) minmax(280px, 380px); gap: 16px; align-items: start; }
.panel { border: 1px solid var(--line-soft); border-radius: var(--radius); background: linear-gradient(155deg, var(--panel), rgba(23, 22, 19, .96)); box-shadow: var(--shadow); overflow: hidden; }
.panel-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; min-height: 52px; padding: 12px 15px; border-bottom: 1px solid var(--line-soft); background: rgba(255,255,255,.018); }
.panel-header h2, .panel-header h3 { margin: 0; font-size: 1rem; letter-spacing: .05em; text-transform: uppercase; }
.panel-body { padding: 14px; }
.subtle { color: var(--muted); }
.eyebrow { color: var(--gold); font-size: .73rem; text-transform: uppercase; letter-spacing: .13em; font-weight: 800; }
.divider { height: 1px; background: var(--line-soft); margin: 12px 0; }
.empty-state { color: var(--muted); padding: 18px; text-align: center; border: 1px dashed var(--line); border-radius: 12px; }

.hero-card { display: grid; gap: 14px; }
.hero-stage { position: relative; min-height: 325px; display: grid; place-items: center; overflow: hidden; border: 1px solid var(--line-soft); border-radius: 14px; background: radial-gradient(circle at 50% 36%, rgba(197,162,93,.14), transparent 38%), linear-gradient(180deg, #1c1a16, #11110f); }
.hero-stage::after { content: ""; position: absolute; bottom: 34px; width: 65%; height: 22px; border-radius: 50%; background: rgba(0,0,0,.5); filter: blur(8px); }
.paper-hero { position: relative; z-index: 1; width: 128px; height: 232px; filter: drop-shadow(0 10px 15px rgba(0,0,0,.4)); }
.hero-head { position: absolute; top: 13px; left: 42px; width: 45px; height: 48px; border-radius: 48% 48% 42% 42%; background: #837b6e; border: 2px solid #c0b5a2; }
.hero-helm { position: absolute; top: 5px; left: 35px; width: 58px; height: 53px; border-radius: 35px 35px 16px 16px; background: var(--gear-main, #4c4a45); border: 2px solid var(--gear-edge, #9e9789); clip-path: polygon(10% 0, 90% 0, 100% 78%, 68% 100%, 55% 67%, 45% 67%, 32% 100%, 0 78%); }
.hero-torso { position: absolute; top: 58px; left: 27px; width: 74px; height: 88px; border-radius: 20px 20px 14px 14px; background: var(--gear-main, #4c4a45); border: 2px solid var(--gear-edge, #9e9789); clip-path: polygon(15% 0, 85% 0, 100% 38%, 82% 100%, 18% 100%, 0 38%); }
.hero-belt { position: absolute; top: 132px; left: 30px; width: 68px; height: 13px; border-radius: 6px; background: #6c5035; border: 1px solid #b38859; }
.hero-arm, .hero-leg { position: absolute; background: var(--gear-main, #4c4a45); border: 2px solid var(--gear-edge, #9e9789); transform-origin: top center; }
.hero-arm { top: 66px; width: 22px; height: 92px; border-radius: 12px; }
.hero-arm.left { left: 13px; transform: rotate(8deg); }
.hero-arm.right { right: 13px; transform: rotate(-8deg); }
.hero-leg { top: 142px; width: 29px; height: 84px; border-radius: 8px 8px 13px 13px; }
.hero-leg.left { left: 31px; transform: rotate(3deg); }
.hero-leg.right { right: 31px; transform: rotate(-3deg); }
.hero-cape { position: absolute; z-index: -1; top: 59px; left: 21px; width: 86px; height: 144px; background: var(--cape, #3a2d2b); clip-path: polygon(10% 0, 90% 0, 100% 100%, 50% 86%, 0 100%); opacity: .9; }
.hero-weapon { position: absolute; top: 74px; right: -6px; width: 11px; height: 145px; border-radius: 7px; background: linear-gradient(90deg, #777, #d8d2c1, #666); transform: rotate(-12deg); border: 1px solid #d9cfb8; }
.hero-aura { position: absolute; inset: 32px 5px 5px; border-radius: 50%; box-shadow: 0 0 40px var(--aura, transparent); opacity: .85; }
.slot-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
.equip-slot { min-height: 68px; padding: 9px; border: 1px solid var(--line-soft); background: rgba(255,255,255,.018); border-radius: 11px; cursor: pointer; text-align: left; }
.equip-slot:hover { border-color: #7d705c; }
.slot-name { display: block; color: var(--muted); font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; }
.slot-item { display: block; margin-top: 4px; font-size: .86rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.nav-tabs { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-bottom: 14px; }
.nav-tab { min-height: var(--tap); border: 1px solid var(--line-soft); background: #1b1915; border-radius: 11px; cursor: pointer; padding: 8px; color: var(--muted); }
.nav-tab.active { border-color: var(--gold); color: var(--gold-2); background: #2c2518; }

.region-strip { display: grid; grid-auto-flow: column; grid-auto-columns: minmax(150px, 1fr); gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: thin; }
.region-card { min-height: 92px; border: 1px solid var(--line-soft); border-radius: 12px; padding: 11px; background: linear-gradient(135deg, rgba(255,255,255,.025), transparent); cursor: pointer; text-align: left; }
.region-card.active { border-color: var(--gold); background: linear-gradient(135deg, rgba(215,177,96,.16), rgba(255,255,255,.02)); }
.region-card.locked { opacity: .4; cursor: not-allowed; }
.region-card strong, .region-card span { display: block; }
.region-card span { margin-top: 4px; color: var(--muted); font-size: .82rem; }
.mission-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-top: 12px; }
.mission-card { position: relative; min-height: 170px; border: 1px solid var(--line-soft); border-radius: 14px; padding: 13px; background: radial-gradient(circle at 100% 0%, rgba(215,177,96,.1), transparent 36%), #1c1a16; display: flex; flex-direction: column; gap: 8px; }
.mission-card h3 { margin: 0; font-size: 1rem; }
.mission-card .button { margin-top: auto; }
.difficulty { display: inline-flex; align-self: flex-start; padding: 3px 7px; border-radius: 99px; font-size: .72rem; border: 1px solid var(--line); color: var(--muted); }

.inventory-toolbar { display: flex; justify-content: space-between; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
.inventory-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; }
.item-card { position: relative; min-height: 102px; border: 1px solid var(--line-soft); border-radius: 11px; padding: 9px; background: #1b1916; cursor: pointer; overflow: hidden; text-align: left; }
.item-card:hover { transform: translateY(-1px); border-color: #786c59; }
.item-card.selected { box-shadow: inset 0 0 0 2px var(--gold); }
.item-card .item-icon { width: 38px; height: 38px; display: grid; place-items: center; border-radius: 9px; background: rgba(255,255,255,.045); font-size: 1.2rem; margin-bottom: 7px; }
.item-card .item-name { font-size: .78rem; line-height: 1.15; display: block; }
.item-card .item-level { position: absolute; top: 8px; right: 8px; color: var(--muted); font-size: .7rem; }
.item-card.empty { cursor: default; opacity: .35; border-style: dashed; }
.rarity-normal { color: #d0cbc1; }
.rarity-magic { color: var(--magic); }
.rarity-rare { color: var(--rare); }
.rarity-epic { color: var(--epic); }
.rarity-legendary { color: var(--legendary); }
.rarity-ancient { color: var(--ancient); text-shadow: 0 0 12px rgba(237,110,95,.35); }
.set-name { color: var(--gold-2) !important; }
.item-detail { display: grid; gap: 10px; }
.item-detail h3 { margin: 0; }
.stat-list { display: grid; gap: 6px; }
.stat-line { display: flex; justify-content: space-between; gap: 12px; font-size: .88rem; }
.stat-line span:first-child { color: var(--muted); }
.compare-up { color: var(--good); }
.compare-down { color: var(--danger); }
.item-actions { display: flex; gap: 8px; flex-wrap: wrap; }

.stats-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; }
.stat-tile { padding: 10px; border: 1px solid var(--line-soft); border-radius: 10px; background: rgba(255,255,255,.018); }
.stat-tile span { display: block; color: var(--muted); font-size: .72rem; text-transform: uppercase; letter-spacing: .06em; }
.stat-tile strong { display: block; margin-top: 3px; font-size: 1rem; }

.skill-layout { display: grid; grid-template-columns: 1fr 290px; gap: 12px; }
.skill-tree { display: grid; grid-template-columns: repeat(5, minmax(135px, 1fr)); gap: 8px; overflow-x: auto; padding-bottom: 6px; }
.skill-branch { border: 1px solid var(--line-soft); border-radius: 12px; padding: 10px; background: rgba(255,255,255,.015); min-width: 135px; }
.skill-branch h3 { margin: 0 0 8px; font-size: .85rem; color: var(--gold-2); }
.skill-node { width: 100%; min-height: 72px; text-align: left; border: 1px solid var(--line-soft); border-radius: 10px; background: #191713; margin-bottom: 7px; padding: 8px; cursor: pointer; }
.skill-node.owned { border-color: var(--good); background: #1c2a20; }
.skill-node.locked { opacity: .45; cursor: not-allowed; }
.skill-node strong, .skill-node small { display: block; }
.skill-node small { margin-top: 4px; color: var(--muted); line-height: 1.25; }
.ability-slots { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 10px; }
.ability-slot { min-height: 76px; border: 1px dashed var(--line); border-radius: 10px; padding: 8px; background: rgba(255,255,255,.015); }
.ability-card { border: 1px solid var(--line-soft); border-radius: 10px; padding: 9px; margin-bottom: 7px; background: #1b1916; cursor: pointer; }
.ability-card.equipped { border-color: var(--gold); }
.ability-card small { color: var(--muted); display: block; margin-top: 4px; }

.shop-grid, .rune-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 9px; }
.shop-card, .recipe-card { border: 1px solid var(--line-soft); border-radius: 12px; padding: 10px; background: #1b1916; }
.shop-card .button, .recipe-card .button { width: 100%; margin-top: 10px; }
.rune-pouch { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
.rune-chip { min-height: 34px; display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--line); border-radius: 99px; padding: 5px 9px; background: #171510; }
.rune-symbol { color: var(--gold-2); font-weight: 900; }

.modal-backdrop { position: fixed; z-index: 50; inset: 0; padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left)); background: rgba(3,3,3,.78); backdrop-filter: blur(9px); display: grid; place-items: center; }
.modal { width: min(1100px, 100%); max-height: calc(100dvh - 24px); overflow: auto; border: 1px solid #665b49; border-radius: 18px; background: #171612; box-shadow: 0 30px 90px rgba(0,0,0,.65); }
.modal.large { width: min(1320px, 100%); }
.modal-header { position: sticky; top: 0; z-index: 4; display: flex; justify-content: space-between; align-items: center; padding: 13px 15px; background: rgba(23,22,18,.96); border-bottom: 1px solid var(--line-soft); backdrop-filter: blur(12px); }
.modal-header h2 { margin: 0; font-size: 1rem; text-transform: uppercase; letter-spacing: .07em; }
.modal-body { padding: 14px; }

.planner-layout { display: grid; grid-template-columns: 1fr 300px; gap: 14px; }
.dungeon-map { position: relative; min-height: 590px; border: 1px solid var(--line-soft); border-radius: 14px; overflow: hidden; background: radial-gradient(circle at 50% 50%, rgba(77,72,59,.18), transparent 50%), repeating-linear-gradient(25deg, rgba(255,255,255,.012) 0 1px, transparent 1px 16px), #11110f; }
.map-line { position: absolute; height: 3px; background: #4b463b; transform-origin: 0 50%; z-index: 0; border-radius: 99px; }
.map-line.route { background: var(--gold); box-shadow: 0 0 10px rgba(213,173,88,.45); }
.map-node { position: absolute; z-index: 2; width: 76px; min-height: 76px; transform: translate(-50%,-50%); border-radius: 50%; border: 2px solid #5e5648; background: radial-gradient(circle at 35% 30%, #343129, #171612 70%); display: grid; place-items: center; text-align: center; cursor: pointer; padding: 7px; box-shadow: 0 8px 18px rgba(0,0,0,.4); }
.map-node:hover { border-color: #a59678; }
.map-node.start { border-color: var(--good); }
.map-node.boss { border-color: var(--danger); box-shadow: 0 0 0 5px rgba(209,106,98,.08), 0 8px 18px rgba(0,0,0,.4); }
.map-node.selected { border-color: var(--gold-2); box-shadow: 0 0 0 5px rgba(213,173,88,.12), 0 8px 18px rgba(0,0,0,.4); }
.map-node.unavailable { opacity: .42; cursor: not-allowed; }
.map-node .node-icon { font-size: 1.25rem; }
.map-node .node-label { font-size: .62rem; color: var(--muted); line-height: 1.1; }
.command-display { display: grid; grid-template-columns: repeat(6,1fr); gap: 5px; margin: 8px 0 12px; }
.command-pip { height: 12px; border-radius: 99px; background: #302d26; border: 1px solid var(--line); }
.command-pip.used { background: var(--gold); border-color: var(--gold-2); }
.route-list { display: grid; gap: 6px; }
.route-entry { padding: 8px; border: 1px solid var(--line-soft); border-radius: 9px; display: flex; justify-content: space-between; gap: 8px; }

.combat-screen { min-height: calc(100dvh - 120px); display: grid; grid-template-columns: minmax(0,1fr) 310px; gap: 14px; }
.arena-wrap { position: relative; min-height: 650px; border: 1px solid var(--line-soft); border-radius: 16px; overflow: hidden; background: #11110f; box-shadow: var(--shadow); }
#combatCanvas { display: block; width: 100%; height: 100%; min-height: 650px; touch-action: none; }
.combat-hud { position: absolute; inset: 12px 12px auto 12px; display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; pointer-events: none; }
.hud-card { min-width: 180px; padding: 9px 10px; border: 1px solid var(--line-soft); border-radius: 11px; background: rgba(15,15,13,.82); backdrop-filter: blur(8px); }
.hud-card.right { justify-self: end; text-align: right; }
.health-bar { height: 10px; border-radius: 99px; background: #2c2522; overflow: hidden; margin-top: 6px; border: 1px solid rgba(255,255,255,.08); }
.health-fill { height: 100%; background: linear-gradient(90deg, #7a2e2a, #d36a5e); width: var(--health,100%); transition: width .12s linear; }
.combat-controls { pointer-events: auto; display: flex; gap: 5px; align-self: start; }
.combat-log { height: 650px; overflow: auto; }
.log-entry { padding: 8px 0; border-bottom: 1px solid var(--line-soft); font-size: .83rem; }
.log-entry strong { color: var(--gold-2); }
.ability-hud { position: absolute; left: 50%; bottom: 14px; transform: translateX(-50%); display: grid; grid-template-columns: repeat(4, 66px); gap: 7px; }
.ability-orb { position: relative; width: 66px; height: 66px; border-radius: 14px; border: 1px solid var(--line); background: rgba(15,15,13,.88); display: grid; place-items: center; text-align: center; font-size: .7rem; overflow: hidden; }
.ability-cooldown { position: absolute; inset: auto 0 0; height: var(--cd,0%); background: rgba(0,0,0,.65); pointer-events: none; }

.result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.result-banner { padding: 18px; border-radius: 14px; border: 1px solid var(--line-soft); text-align: center; background: radial-gradient(circle, rgba(126,190,139,.1), transparent 70%); }
.result-banner.failure { background: radial-gradient(circle, rgba(209,106,98,.1), transparent 70%); }
.loot-row { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; }
.telemetry-list { display: grid; gap: 8px; }
.telemetry-item { border: 1px solid var(--line-soft); border-radius: 10px; padding: 9px; display: flex; justify-content: space-between; gap: 12px; }

.toast-stack { position: fixed; right: max(12px, env(safe-area-inset-right)); bottom: max(12px, env(safe-area-inset-bottom)); z-index: 80; display: grid; gap: 8px; width: min(360px, calc(100vw - 24px)); pointer-events: none; }
.toast { padding: 11px 12px; border: 1px solid var(--line); border-radius: 11px; background: #211f1a; box-shadow: var(--shadow); animation: toast-in .2s ease; }
.toast.good { border-color: #5f936a; }
.toast.bad { border-color: #9d4d47; }
@keyframes toast-in { from { opacity: 0; transform: translateY(8px); } }

.settings-grid { display: grid; gap: 11px; }
.setting-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 10px; border: 1px solid var(--line-soft); border-radius: 10px; }
.setting-row select { min-height: 38px; border: 1px solid var(--line); background: #171510; color: var(--text); border-radius: 8px; padding: 5px 8px; }

@media (max-width: 1180px) {
  .camp-layout { grid-template-columns: 260px minmax(0,1fr); }
  .camp-layout > .right-column { grid-column: 1 / -1; }
  .inventory-grid { grid-template-columns: repeat(8, minmax(0,1fr)); }
  .mission-grid { grid-template-columns: repeat(2,1fr); }
  .combat-screen { grid-template-columns: 1fr; }
  .combat-log { height: 260px; }
}

@media (max-width: 780px) {
  :root { --radius: 13px; }
  .topbar { grid-template-columns: 1fr auto; }
  .brand { font-size: .82rem; }
  .resource-row { grid-column: 1 / -1; grid-row: 2; margin-top: 7px; }
  .camp-layout { grid-template-columns: 1fr; }
  .main { padding-top: 12px; }
  .hero-stage { min-height: 245px; }
  .paper-hero { transform: scale(.82); }
  .slot-grid { grid-template-columns: repeat(3, 1fr); }
  .nav-tabs { grid-template-columns: repeat(6, minmax(90px,1fr)); overflow-x: auto; }
  .mission-grid { grid-template-columns: 1fr; }
  .inventory-grid { grid-template-columns: repeat(4, minmax(0,1fr)); }
  .skill-layout, .planner-layout, .result-grid { grid-template-columns: 1fr; }
  .shop-grid, .rune-grid { grid-template-columns: 1fr 1fr; }
  .dungeon-map { min-height: 510px; }
  .map-node { width: 64px; min-height: 64px; }
  .combat-screen { min-height: auto; }
  .arena-wrap, #combatCanvas { min-height: 560px; }
  .combat-hud { grid-template-columns: 1fr auto; }
  .hud-card.right { display: none; }

/* v0.5.0 premium combat presentation */
.arena-wrap {
  isolation: isolate;
  background:
    radial-gradient(circle at 60% 45%, rgba(176,140,80,.055), transparent 42%),
    #0c0c0b;
}
.arena-wrap::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  border-radius: inherit;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.025), inset 0 -80px 120px rgba(0,0,0,.18);
}
.arena-wrap::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  opacity: .16;
  background-image: repeating-linear-gradient(0deg, rgba(255,255,255,.018) 0, rgba(255,255,255,.018) 1px, transparent 1px, transparent 3px);
  mix-blend-mode: soft-light;
}
.arena-wrap.impact-focus { box-shadow: 0 0 0 1px rgba(222,191,115,.22), 0 18px 48px rgba(0,0,0,.52), inset 0 0 52px rgba(210,165,80,.045); }

  backdrop-filter: blur(8px);
  background: linear-gradient(180deg, rgba(24,23,20,.91), rgba(14,14,12,.84));
  border-color: rgba(210,190,151,.2);
  box-shadow: 0 8px 24px rgba(0,0,0,.24);
}

  display: inline-flex;

  border: 1px solid rgba(210,190,151,.16);

  background: rgba(16,15,13,.8);

  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;

.ability-hud { z-index: 5; }

  overflow: hidden;
  backdrop-filter: blur(7px);
  background: linear-gradient(180deg, rgba(32,30,26,.94), rgba(15,14,12,.9));
  border-color: rgba(220,198,153,.22);
  box-shadow: 0 8px 20px rgba(0,0,0,.28), inset 0 1px rgba(255,255,255,.035);

/* v1.0.0 visual integration — occult strategy table */
:root {
  --bg: #080908;

  --panel: rgba(18, 18, 16, .975);
  --panel-2: rgba(27, 25, 21, .97);

  --good: #6fce7b;
  --violet: #9c5ad6;
  --teal: #5fc7bd;
  --danger: #cf746c;
  --radius: 12px;
  --shadow: 0 24px 70px rgba(0,0,0,.52);
}
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  min-height: 100dvh;
  background:
    radial-gradient(circle at 18% 12%, rgba(149, 99, 32, .09), transparent 34%),
    radial-gradient(circle at 80% 84%, rgba(78, 38, 112, .08), transparent 35%),
    repeating-linear-gradient(132deg, rgba(255,255,255,.008) 0 1px, transparent 1px 18px),
    #080908;
}
#app, .app-shell { width: 100%; height: 100dvh; min-height: 0; overflow: hidden; }
.app-shell { grid-template-rows: 62px minmax(0,1fr); }
.topbar {
  position: relative;
  min-height: 62px;
  padding: 7px 14px;
  background: linear-gradient(180deg, rgba(10,10,9,.99), rgba(9,9,8,.96));
  border-bottom: 1px solid rgba(211,169,79,.24);
  box-shadow: 0 10px 35px rgba(0,0,0,.32);
  backdrop-filter: blur(18px);
}
.brand { font-family: Georgia, 'Times New Roman', serif; font-size: .98rem; letter-spacing: .12em; color: #f0eadf; }
.brand-mark { width: 38px; border-color: #b88a31; box-shadow: inset 0 0 0 4px #0c0c0a, 0 0 18px rgba(205,157,57,.13); }
.resource-pill {
  position: relative;
  min-width: 104px;
  min-height: 38px;
  justify-content: center;
  border-radius: 8px;
  border-color: rgba(204,160,68,.27);
  background: linear-gradient(180deg, rgba(29,27,22,.94), rgba(13,13,11,.98));
  box-shadow: inset 0 1px rgba(255,255,255,.025), 0 5px 18px rgba(0,0,0,.2);
}
.resource-pill::before { content:""; position:absolute; inset:3px; border:1px solid rgba(223,184,99,.06); pointer-events:none; }
.resource-pill > span { color: #ad9d7b; font-size: .62rem; }
.resource-pill strong { color: #f3ead7; font-family: Georgia, serif; font-size: .9rem; }
.icon-button, .button {
  border-radius: 8px;
  border-color: rgba(211,173,88,.28);
  background: linear-gradient(180deg, rgba(37,34,28,.98), rgba(18,17,14,.98));
  box-shadow: inset 0 1px rgba(255,255,255,.025), 0 6px 15px rgba(0,0,0,.2);
}
.button:hover, .icon-button:hover { border-color: rgba(238,203,127,.58); background: linear-gradient(#3a3327,#211d17); }
.button.primary {
  color:#151006;
  background: linear-gradient(180deg,#e6c472,#a97827);
  border-color:#f1d486;
  box-shadow: inset 0 1px rgba(255,255,255,.35), 0 0 22px rgba(206,158,53,.18);
}
.main { width: 100%; max-width: none; height: 100%; min-height: 0; margin: 0; padding: 12px 16px 14px; overflow: hidden; }
.camp-layout {
  height: 100%; min-height: 0;
  grid-template-columns: minmax(250px, 292px) minmax(560px, 1fr) minmax(286px, 342px);
  gap: 12px; align-items: stretch;
}
.panel {
  min-height: 0;
  border-color: rgba(215,174,89,.2);
  border-radius: 12px;
  background:
    linear-gradient(145deg, rgba(255,255,255,.015), transparent 38%),
    linear-gradient(180deg, rgba(24,23,20,.98), rgba(13,14,13,.985));
  box-shadow: 0 18px 52px rgba(0,0,0,.42), inset 0 1px rgba(255,255,255,.022);
}
.panel::before { content:""; position:absolute; pointer-events:none; }
.hero-column, .workspace-panel, .right-column { height: 100%; min-height: 0; }
.hero-column, .right-column { overflow: auto; scrollbar-width: thin; scrollbar-color: #55472d transparent; }
.workspace-panel { overflow: hidden; }
.workspace-body { height: 100%; min-height: 0; display: flex; flex-direction: column; overflow: auto; scrollbar-width: thin; scrollbar-color: #55472d transparent; }
.right-column { position: static; max-height: none; }
.panel-header { min-height: 58px; padding: 12px 14px; background: linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,.004)); border-color: rgba(215,174,89,.17); }
.panel-header h2, .panel-header h3 { font-family: Georgia, 'Times New Roman', serif; font-size: 1.03rem; letter-spacing: .055em; }
.eyebrow { color: #ddaF4f; font-size: .67rem; }

/* Hero relic panel */
.hero-card { gap: 10px; }
.hero-stage {
  min-height: 300px;
  border-radius: 9px;
  border-color: rgba(213,173,88,.2);
  background:
    radial-gradient(circle at 50% 48%, rgba(125,61,172,.4), transparent 31%),
    radial-gradient(circle at 50% 48%, rgba(159,83,213,.14), transparent 53%),
    repeating-radial-gradient(circle at 50% 48%, transparent 0 43px, rgba(191,145,228,.055) 44px 45px),
    linear-gradient(180deg,#131312,#0b0c0b);
}
.hero-stage::before { content:""; position:absolute; inset:8%; border:1px solid rgba(214,173,88,.08); transform:rotate(45deg); }
.paper-hero { transform: scale(1.03); filter: drop-shadow(0 0 18px rgba(158,87,213,.5)) drop-shadow(0 15px 18px rgba(0,0,0,.65)); }
.hero-head { background:#242226; border-color:#716a70; }
.hero-helm,.hero-torso,.hero-arm,.hero-leg { box-shadow: inset 0 0 14px rgba(255,255,255,.045); }
.hero-aura { box-shadow: 0 0 50px rgba(163,85,224,.75); }
.slot-grid { gap: 7px; }
.equip-slot {
  position: relative;
  min-height: 62px;
  border-radius: 8px;
  border-color: rgba(211,173,88,.16);
  background: linear-gradient(145deg,rgba(255,255,255,.018),rgba(0,0,0,.12));
  transition: border-color .16s ease, box-shadow .16s ease, background .16s ease, transform .16s ease;
}
.equip-slot:hover { border-color: rgba(230,196,122,.5); background: rgba(44,38,29,.55); }
.slot-icon { overflow:hidden; background: radial-gradient(circle,rgba(213,173,88,.08),rgba(255,255,255,.015)); }
.slot-item-art { width: 29px; height: 34px; }
.slot-drag-hint { position:absolute; right:6px; top:5px; color:rgba(213,173,88,.35); font-size:.62rem; letter-spacing:-2px; }
.equip-slot.drop-compatible { border-color: rgba(96,202,116,.7); box-shadow: inset 0 0 0 1px rgba(96,202,116,.32), 0 0 18px rgba(57,159,77,.16); }
.equip-slot.drop-hover { background:rgba(32,72,39,.55); box-shadow: inset 0 0 0 2px #72d47e, 0 0 28px rgba(78,201,97,.35); transform: translateY(-1px); }
.workspace-panel.drop-compatible { box-shadow: inset 0 0 0 1px rgba(95,197,111,.24), var(--shadow); }
.workspace-panel.drop-hover { box-shadow: inset 0 0 0 2px #6ac877, 0 0 24px rgba(67,176,84,.22), var(--shadow); }

/* Navigation */
.nav-tabs { position: sticky; top: -14px; z-index: 8; margin: -14px -14px 13px; padding: 10px 12px 8px; grid-template-columns: repeat(7,minmax(0,1fr)); gap:5px; background:rgba(16,16,14,.96); border-bottom:1px solid rgba(211,173,88,.15); backdrop-filter:blur(12px); }
.nav-tab { min-height: 40px; border-radius: 7px; border-color: rgba(211,173,88,.15); background:rgba(255,255,255,.012); color:#b8ae9e; }
.nav-tab.active { border-color:#c8993b; color:#f0d78e; background:linear-gradient(180deg,rgba(100,76,30,.36),rgba(38,30,17,.65)); box-shadow: inset 0 0 0 1px rgba(240,202,114,.08), 0 0 16px rgba(206,158,53,.08); }

/* Collectible item cards */
.inventory-toolbar { margin-bottom:9px; }
.inventory-controls { padding:8px; border-radius:8px; background:rgba(255,255,255,.012); }
.inventory-controls select, .inventory-controls input { border-radius:7px; background:#0d0e0d; }
.inventory-grid { grid-template-columns: repeat(5,minmax(0,1fr)); gap:8px; align-content:start; }
.item-card {
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  grid-template-rows:94px auto auto auto;
  gap:5px 7px;
  min-height:190px;
  padding:8px 9px 9px 12px;
  border-radius:9px;
  background:
    radial-gradient(circle at 50% 32%, rgba(255,255,255,.035), transparent 44%),
    linear-gradient(155deg,#1c1b18,#10110f 78%);
  box-shadow: inset 0 1px rgba(255,255,255,.025);
  transition: border-color .15s ease, background .15s ease, transform .15s ease, box-shadow .15s ease;
  touch-action:none;
}
.item-card:hover { transform:translateY(-2px); background:linear-gradient(155deg,#25221c,#121210 78%); box-shadow:0 13px 25px rgba(0,0,0,.34), inset 0 1px rgba(255,255,255,.04); }
.item-card.selected { box-shadow:inset 0 0 0 1px #e0b65a,0 0 20px rgba(205,157,55,.18); }
.item-card.is-drag-source { opacity:.36; transform:scale(.97); }
.item-card .rarity-rail { width:3px; }
.item-level { top:7px!important; right:8px!important; font-size:.59rem!important; }
.drag-grip { position:absolute; top:8px; left:8px; color:rgba(214,173,88,.38); font-size:.62rem; letter-spacing:-2px; }
.item-visual { grid-column:1/3; grid-row:1; display:grid; place-items:center; overflow:hidden; border-bottom:1px solid rgba(214,173,88,.08); background:radial-gradient(circle,rgba(215,173,88,.05),transparent 63%); }
.item-art-svg { width:82px; height:90px; transform:translateY(2px); filter:drop-shadow(0 9px 9px rgba(0,0,0,.58)); }
.item-name { grid-column:1/3!important; grid-row:2!important; padding:0!important; min-height:32px; font-family:Georgia,'Times New Roman',serif; font-size:.73rem!important; line-height:1.22!important; letter-spacing:.015em; }
.item-meta { grid-column:1/3!important; grid-row:3!important; font-size:.56rem; }
.item-power { grid-column:1!important; grid-row:4!important; font-size:.72rem; }
.item-compare { grid-column:2!important; grid-row:4!important; }
.item-card .imprint-badge,.item-card .set-chip { position:absolute; left:8px; bottom:28px; max-width:calc(100% - 16px); margin:0; padding:2px 6px; border-radius:99px; font-size:.52rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.set-chip { color:#8fe39c; border:1px solid rgba(88,189,104,.48); background:rgba(18,53,25,.78); }
.item-card.empty { min-height:190px; border-style:solid; opacity:.23; background:linear-gradient(145deg,rgba(255,255,255,.012),transparent); }
.item-card.empty::after { content:"✦"; position:absolute; inset:0; display:grid; place-items:center; color:rgba(213,173,88,.16); font-size:1.5rem; }
.drag-ghost { position:fixed; z-index:150; width:150px; min-height:180px; pointer-events:none; transform:translate(-50%,-55%) rotate(1.5deg) scale(.94); opacity:.92; border:1px solid #e1b75b; border-radius:9px; background:#171713; box-shadow:0 28px 60px rgba(0,0,0,.65),0 0 24px rgba(207,159,55,.22); overflow:hidden; }
.drag-ghost .drag-grip,.drag-ghost .item-level { display:none; }
body.is-dragging-item { cursor:grabbing; }

/* Build analysis */
.right-column .panel-body { padding:13px; }
.right-column .stats-grid { gap:7px; }
.right-column .stat-tile { min-height:58px; border-radius:8px; background:linear-gradient(145deg,rgba(255,255,255,.018),rgba(0,0,0,.11)); }
.archetype-row { grid-template-columns:minmax(0,1fr) 1.5fr 34px; }
.identity-track { height:5px; background:#242117; }
.identity-track i { background:linear-gradient(90deg,#ad7d2b,#e5c266); box-shadow:0 0 8px rgba(218,173,74,.18); }
.right-column .route-entry { border-radius:7px; background:rgba(255,255,255,.012); }
.right-column .route-entry strong { color:#8fe29c; }

/* Clear state */
.mission-card.completed {
  border-color:rgba(78,205,100,.72);
  background:radial-gradient(circle at 100% 0%,rgba(67,177,87,.17),transparent 38%),#171b17;
  box-shadow:inset 0 0 0 1px rgba(86,211,105,.15),0 0 22px rgba(53,176,74,.17);
}
.mission-card.completed::after { content:""; position:absolute; inset:4px; border:1px solid rgba(96,222,116,.12); border-radius:10px; pointer-events:none; }
.mission-solved-badge { position:absolute; top:9px; right:9px; z-index:2; display:inline-flex; align-items:center; gap:4px; padding:4px 7px; border:1px solid rgba(102,225,120,.58); border-radius:99px; color:#b5f1bd; background:rgba(17,67,27,.82); box-shadow:0 0 16px rgba(65,194,84,.24); font-size:.59rem; font-weight:800; text-transform:uppercase; letter-spacing:.07em; }
.mission-solved-badge .ui-icon { width:12px; height:12px; }
.hunt-chip.cleared,.elite-ledger-card.cleared { box-shadow:0 0 15px rgba(71,191,89,.12); }

/* Route planner */
.modal-backdrop { overflow:hidden; padding:10px; background:rgba(3,4,3,.86); }
.route-planner-modal { width:calc(100vw - 20px)!important; height:calc(100dvh - 20px); max-height:none!important; overflow:hidden!important; border-radius:12px; border-color:rgba(214,173,88,.35); }
.route-planner-modal .modal-header { min-height:62px; background:#11120f; }
.route-planner-modal .modal-body { height:calc(100% - 62px); overflow:hidden; }
.planner-layout { height:100%; min-height:0; grid-template-columns:minmax(0,1fr) 320px; gap:12px; }
.planner-layout > div { min-height:0; display:grid; grid-template-rows:minmax(300px,1fr) auto; gap:10px; overflow:hidden; }
.planner-layout > aside { min-height:0; overflow:auto; padding:4px 8px 4px 2px; scrollbar-width:thin; }
.dungeon-map {
  min-height:0!important; height:100%;
  border-radius:10px;
  border-color:rgba(214,173,88,.24)!important;
  background:
    radial-gradient(circle at 52% 45%,rgba(91,50,121,.15),transparent 37%),
    repeating-radial-gradient(circle at 50% 50%,transparent 0 92px,rgba(213,173,88,.025) 93px 94px),
    repeating-linear-gradient(28deg,transparent 0 28px,rgba(255,255,255,.008) 29px 30px),
    #0d0f0e!important;
  overflow:hidden;
}
.map-edges { position:absolute; inset:0; width:100%; height:100%; z-index:0; overflow:visible; }
.map-edge { fill:none; stroke:rgba(194,186,166,.38); stroke-width:1.15; stroke-linecap:round; opacity:.78; }
.map-edge.route { stroke:#efbf57; stroke-width:2.1; opacity:1; filter:url(#routeGlow); stroke-dasharray:1.8 1; animation:route-flow 3.2s linear infinite; }
@keyframes route-flow { to { stroke-dashoffset:-14; } }
.map-node {
  width:74px; min-height:74px;
  border-width:1px;
  border-color:rgba(180,166,138,.45);
  background:radial-gradient(circle at 50% 38%,rgba(75,67,54,.72),rgba(15,16,14,.98) 70%);
  box-shadow:0 0 0 4px rgba(0,0,0,.22),0 10px 28px rgba(0,0,0,.48);
}
.map-node::before { content:""; position:absolute; inset:5px; border:1px solid rgba(255,255,255,.05); border-radius:50%; pointer-events:none; }
.map-node.start,.map-node.treasure { border-color:#d7a847; color:#efc86e; }
.map-node.shrine { border-color:#4ebeb6; color:#75e2d7; box-shadow:0 0 22px rgba(60,186,177,.17),0 10px 28px rgba(0,0,0,.5); }
.map-node.elite,.map-node.boss { border-color:#a05bcf; color:#cf8df1; box-shadow:0 0 22px rgba(145,72,194,.2),0 10px 28px rgba(0,0,0,.5); }
.map-node.selected { border-color:#f2c65e; box-shadow:0 0 0 4px rgba(229,179,69,.1),0 0 25px rgba(222,170,55,.3); }
.map-node.selected:not(.boss):not(.elite):not(.shrine):not(.treasure):not(.start) { border-color:#6acb78; color:#a4e9ad; box-shadow:0 0 20px rgba(71,188,87,.18),0 8px 20px rgba(0,0,0,.45); }
.map-node .node-label { color:#c1b6a2; font-size:.56rem; }
.map-node .node-svg { width:21px; height:21px; }
.contract-panel { max-height:210px; overflow:auto; border-radius:10px; scrollbar-width:thin; }
.contract-grid { grid-template-columns:repeat(4,minmax(0,1fr)); gap:7px; }
.contract-card { min-height:116px; border-radius:8px; background:linear-gradient(145deg,rgba(255,255,255,.016),rgba(0,0,0,.12)); }
.contract-card.active { border-color:#d5aa50; box-shadow:inset 0 0 0 1px rgba(216,174,82,.15),0 0 16px rgba(200,150,45,.1); }
.route-list { max-height:210px; overflow:auto; scrollbar-width:thin; }
.transition-preview { display:grid; grid-template-columns:1fr 44px 1fr; gap:5px; align-items:center; margin-bottom:9px; }
.preview-room { position:relative; height:50px; border:1px solid rgba(211,173,88,.18); border-radius:7px; overflow:hidden; background:linear-gradient(90deg,#13120f,#20172a,#13120f); }
.preview-room::after { content:""; position:absolute; left:50%; bottom:0; width:2px; height:100%; background:rgba(255,255,255,.025); }
.preview-hero { position:absolute; top:14px; width:10px; height:23px; border-radius:5px 5px 3px 3px; background:#b9a4c9; box-shadow:0 0 10px #a75ddb; }
.preview-hero::after { content:""; position:absolute; top:-6px; left:1px; width:8px; height:8px; border-radius:50%; background:#d8cedd; }
.preview-hero.exit { animation:preview-exit 2.4s ease-in-out infinite; }
.preview-hero.enter { animation:preview-enter 2.4s ease-in-out infinite; }
.preview-blur { height:14px; border-radius:50%; background:radial-gradient(ellipse,#a464d6,transparent 70%); filter:blur(4px); opacity:.55; }
.transition-preview small { grid-column:1/-1; color:var(--muted); text-align:center; font-size:.62rem; }
@keyframes preview-exit { 0%,20%{left:14%} 55%,100%{left:110%} }
@keyframes preview-enter { 0%,50%{left:-18%} 82%,100%{left:54%} }
.commit-button { width:100%; margin-top:9px; min-height:48px; font-family:Georgia,serif; letter-spacing:.05em; text-transform:uppercase; }

/* Combat shell */
.combat-screen { height:100%; min-height:0; grid-template-columns:minmax(0,1fr) 280px; }
.arena-wrap { min-height:0; height:100%; border-radius:11px; }
#combatCanvas { min-height:0; height:100%; }
.combat-screen > aside { height:100%; overflow:hidden; }
.combat-log { height:calc(100% - 58px); overflow:auto; }
.arena-wrap.impact-focus { box-shadow:0 0 0 1px rgba(222,191,115,.16),0 16px 40px rgba(0,0,0,.5),inset 0 0 36px rgba(210,165,80,.025); }
@keyframes arena-shake { 0%,100%{transform:translate(0,0)} 40%{transform:translate(-1px,.5px)} 70%{transform:translate(1px,-.5px)} }
.arena-wrap.is-shaking { animation-duration:.09s; }

/* Interaction and drag motion accessibility */
.reduce-motion .map-edge.route,.reduce-motion .preview-hero { animation:none; }
.reduce-motion .item-card,.reduce-motion .equip-slot { transition:none; }

@media (max-width: 1280px) {
  .camp-layout { grid-template-columns:250px minmax(500px,1fr) 300px; }
  .inventory-grid { grid-template-columns:repeat(4,minmax(0,1fr)); }
  .item-card { min-height:176px; grid-template-rows:80px auto auto auto; }
  .item-art-svg { width:72px; height:78px; }
  .contract-grid { grid-template-columns:repeat(3,minmax(0,1fr)); }
}
@media (max-width: 1040px) {
  html, body { overflow:hidden; }
  #app,.app-shell { height:100dvh; min-height:0; overflow:hidden; }
  .main { height:100%; min-height:0; overflow:auto; overscroll-behavior:contain; }
  .camp-layout { height:auto; grid-template-columns:250px minmax(0,1fr); }
  .right-column { grid-column:1/-1; height:auto; max-height:none; display:block; }
  .workspace-panel { min-height:720px; }
  .route-planner-modal { height:calc(100dvh - 12px); }
  .planner-layout { grid-template-columns:minmax(0,1fr) 285px; }
}
@media (max-width: 780px) {
  html,body { overflow:hidden; }
  #app,.app-shell { height:100dvh; overflow:hidden; }
  .app-shell { grid-template-rows:auto minmax(0,1fr); }
  .topbar { grid-template-columns:minmax(0,1fr) auto; }
  .main { height:100%; min-height:0; overflow:auto; padding:8px; }
  .camp-layout { display:block; height:auto; }
  .hero-column,.workspace-panel,.right-column { height:auto; margin-bottom:8px; }
  .workspace-panel { min-height:0; }
  .inventory-grid { grid-template-columns:repeat(3,minmax(0,1fr)); }
  .item-card { min-height:166px; grid-template-rows:72px auto auto auto; }
  .item-art-svg { width:65px; height:70px; }
  .route-planner-modal { width:100vw!important; height:100dvh; border-radius:0; }
  .route-planner-modal .modal-body { overflow:auto; }
  .planner-layout { height:auto; grid-template-columns:1fr; }
  .planner-layout > div { min-height:720px; }
  .planner-layout > aside { overflow:visible; }
  .dungeon-map { min-height:500px!important; }
  .contract-panel { max-height:none; }
  .contract-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
  .combat-screen { height:auto; grid-template-columns:1fr; }
  .arena-wrap { min-height:540px; height:70dvh; }
}
@media (max-width: 560px) {
  .inventory-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
  .item-card { min-height:174px; }
  .resource-pill { min-width:auto; }
  .contract-grid { grid-template-columns:1fr; }
  .planner-layout > div { min-height:760px; }
  .dungeon-map { min-height:450px!important; }
  .map-node { width:58px; min-height:58px; }
  .map-node .node-label { display:none; }
}
@media (max-height: 700px) and (min-width: 900px) {
  .topbar { min-height:54px; }
  .app-shell { grid-template-rows:54px minmax(0,1fr); }
  .main { padding-block:8px; }
  .hero-stage { min-height:218px; }
  .paper-hero { transform:scale(.78); }
  .equip-slot { min-height:54px; }
  .item-card { min-height:156px; grid-template-rows:64px auto auto auto; }
  .item-art-svg { width:60px; height:64px; }
  .contract-panel { max-height:170px; }
}


/* v1.0 interaction staging and app-shell lock */
.workspace-body, .hero-column, .right-column, .planner-layout > aside, .contract-panel, .route-list, .main { overscroll-behavior: contain; }
.item-card[draggable="true"], .equip-slot[draggable="true"] { touch-action: none; }
.item-card[draggable="true"]::after { content:"⋮⋮"; position:absolute; top:8px; right:8px; color:rgba(220,190,120,.34); font-size:.67rem; letter-spacing:-2px; }
.map-edge:not(.route) { filter: drop-shadow(0 0 2px rgba(227,211,176,.08)); }
.map-node.treasure { box-shadow:0 0 20px rgba(221,174,66,.15),0 10px 28px rgba(0,0,0,.48); }
.map-node.shrine { animation:well-breathe 3.8s ease-in-out infinite; }
@keyframes well-breathe { 50% { box-shadow:0 0 30px rgba(69,207,195,.23),0 10px 28px rgba(0,0,0,.5); } }
.reduce-motion .map-node.shrine { animation:none; }
.combat-screen .arena-wrap { background:radial-gradient(circle at 50% 48%,rgba(96,52,124,.05),transparent 42%),#0b0c0b; }
@media (max-width: 1040px) {
  .camp-layout { min-height:100%; }

    equipment.boots = starterItem('boots', 'Trail Boots', { moveSpeed: 0.05, commandPoints: 1 }, '⌁');
    equipment.ring1 = starterItem('ring1', 'Copper Ring', { minDamage: 1, maxDamage: 1 }, '○');

    const now = new Date().toISOString();
    const initial = {
      version: D.VERSION,
      schemaVersion: SAVE_SCHEMA_VERSION,

        recipes: [],
        lifetime: { kills: 0, deaths: 0, expeditions: 0, bosses: 0 }

        quests: {},
        storySeen: {},

        finalBossDefeated: false, finalRewardClaimed: false, missionRecords: {}, extractedDepth: 0, runewordsCrafted: 0
      },

      settings: {
        volume: .55, musicVolume: .28, reducedMotion: false, damageNumbers: true, autoPauseHidden: true,
        combatSpeed: 1, screenShake: true, highContrast: false, visualQuality: 'auto', cameraPunctuation: true, bossIntroductions: true,
        largeText: false, compactInventory: false, richTooltips: true, language: 'en', soundtrack: true, reducedHitFlash: true, roomTransitions: true
      },
      lastMission: null
    };
    // Fresh profiles only receive items that can be equipped immediately.
    initial.hero.inventory = [
      generateItem(1, rng(1101), { forceSlot: 'weapon', forceRarity: 'magic' }),
      generateItem(1, rng(1102), { forceSlot: 'armor', forceRarity: 'rare' }),
      generateItem(1, rng(1103), { forceSlot: 'ring1', forceRarity: 'magic' })

    initial.shop.stockLevel = initial.hero.level;

  }

  function isStateShape(candidate) {
    return Boolean(candidate && typeof candidate === 'object' && candidate.hero && typeof candidate.hero === 'object');
  }

  function migrateState(candidate) {
    if (!isStateShape(candidate)) throw new Error('Save payload has no hero state.');
    const migrated = deepClone(candidate);
    const fromVersion = migrated.version || 'pre-0.2.0';
    const schema = Number(migrated.schemaVersion || 1);
    if (schema > SAVE_SCHEMA_VERSION) throw new Error('Save was created by a newer game version.');
    if (schema < 2) {
      migrated.schemaVersion = 2;
      migrated.meta = { ...(migrated.meta || {}), migratedFrom: fromVersion, recoveryNotice: '' };
      migrated.onboarding = migrated.onboarding || {
        seen: Boolean(migrated.hero?.lifetime?.expeditions),
        completed: Boolean(migrated.hero?.lifetime?.expeditions),
        step: 0
      };
      migrated.progress = { ...(migrated.progress || {}), bossesSeen: migrated.progress?.bossesSeen || {}, campUpgrades: migrated.progress?.campUpgrades || {}, endlessRun: migrated.progress?.endlessRun || { active: false, depth: 0, gold: 0, xp: 0, loot: [], runes: {}, recipes: [] } };
      migrated.settings = {
        ...(migrated.settings || {}),
        combatSpeed: migrated.settings?.combatSpeed || 1,
        screenShake: migrated.settings?.screenShake !== false,
        highContrast: Boolean(migrated.settings?.highContrast)
      };
    }
    if (schema < 3) {
      migrated.schemaVersion = 3;
      migrated.meta = { ...(migrated.meta || {}), migratedFrom: migrated.meta?.migratedFrom || fromVersion };
      migrated.progress = {
        ...(migrated.progress || {}),
        contractMastery: migrated.progress?.contractMastery || {},
        endlessModifiersSeen: migrated.progress?.endlessModifiersSeen || {}
      };
    }
    if (schema < 4) {
      migrated.schemaVersion = 4;
      migrated.meta = { ...(migrated.meta || {}), migratedFrom: migrated.meta?.migratedFrom || fromVersion };
      migrated.progress = {
        ...(migrated.progress || {}),
        namedEliteClears: migrated.progress?.namedEliteClears || {},
        regionalFinds: migrated.progress?.regionalFinds || {},
        quests: migrated.progress?.quests || {},
        storySeen: migrated.progress?.storySeen || {},
        mountainSequence: Number(migrated.progress?.mountainSequence || 0)
      };
    }
    if (schema < 5) {
      migrated.schemaVersion = 5;
      migrated.meta = { ...(migrated.meta || {}), migratedFrom: migrated.meta?.migratedFrom || fromVersion };
      migrated.settings = {
        ...(migrated.settings || {}),
        visualQuality: ['auto', 'low', 'medium', 'high'].includes(migrated.settings?.visualQuality) ? migrated.settings.visualQuality : 'auto',
        cameraPunctuation: migrated.settings?.cameraPunctuation !== false,
        bossIntroductions: migrated.settings?.bossIntroductions !== false
      };
    }
    if (schema < 6) {
      migrated.schemaVersion = 6;
      migrated.meta = { ...(migrated.meta || {}), migratedFrom: migrated.meta?.migratedFrom || fromVersion };
      migrated.resources = { ...(migrated.resources || {}), essence: Math.max(0, Math.round(Number(migrated.resources?.essence || 0))) };
    }
    if (schema < 7) {
      migrated.schemaVersion = 7;
      migrated.meta = { ...(migrated.meta || {}), migratedFrom: migrated.meta?.migratedFrom || fromVersion };
      migrated.progress = {
        ...(migrated.progress || {}), achievements: migrated.progress?.achievements || {}, challenges: migrated.progress?.challenges || {},
        objectiveClears: migrated.progress?.objectiveClears || {}, endgameBossClears: migrated.progress?.endgameBossClears || {},
        archetypeWins: migrated.progress?.archetypeWins || {}, finalBossDefeated: Boolean(migrated.progress?.finalBossDefeated),
        finalRewardClaimed: Boolean(migrated.progress?.finalRewardClaimed), missionRecords: migrated.progress?.missionRecords || {},
        extractedDepth: Math.max(0, Number(migrated.progress?.extractedDepth || 0)), runewordsCrafted: Math.max(0, Number(migrated.progress?.runewordsCrafted || 0))
      };
    }
    if (schema < 8) {
      migrated.schemaVersion = 8;
      migrated.meta = { ...(migrated.meta || {}), migratedFrom: migrated.meta?.migratedFrom || fromVersion };
      migrated.settings = {
        ...(migrated.settings || {}),
        largeText: Boolean(migrated.settings?.largeText),
        compactInventory: Boolean(migrated.settings?.compactInventory),
        richTooltips: migrated.settings?.richTooltips !== false
      };
    }
    if (schema < 9) {
      migrated.schemaVersion = 9;
      migrated.meta = { ...(migrated.meta || {}), migratedFrom: migrated.meta?.migratedFrom || fromVersion };
      migrated.settings = {
        ...(migrated.settings || {}),
        musicVolume: Math.max(0, Math.min(1, Number(migrated.settings?.musicVolume ?? .28))),
        soundtrack: migrated.settings?.soundtrack !== false,
        language: D.LOCALIZATION.languages[migrated.settings?.language] ? migrated.settings.language : 'en'
      };
    }
    if (schema < 10) {
      migrated.schemaVersion = 10;
      migrated.meta = { ...(migrated.meta || {}), migratedFrom: migrated.meta?.migratedFrom || fromVersion };
      migrated.settings = {
        ...(migrated.settings || {}),
        reducedHitFlash: migrated.settings?.reducedHitFlash !== false,
        roomTransitions: migrated.settings?.roomTransitions !== false
      };
    }
    migrated.schemaVersion = SAVE_SCHEMA_VERSION;
    migrated.version = D.VERSION;
    return migrated;
  }

  function progressionBandForLevel(level) {
    const numeric = Math.max(1, Math.round(Number(level) || 1));
    return D.PROGRESSION_BANDS.find(band => numeric >= band.minLevel && numeric <= band.maxLevel) || D.PROGRESSION_BANDS[D.PROGRESSION_BANDS.length - 1];
  }

  function normalizeItem(item) {
    if (!item || typeof item !== 'object') return null;
    const normalized = item;
    const band = D.PROGRESSION_BANDS.find(entry => entry.id === normalized.bandId) || progressionBandForLevel(normalized.level);
    normalized.bandId = band.id;
    normalized.refinement = clamp(Math.round(Number(normalized.refinement || 0)), 0, band.refineCap);
    normalized.sockets = Math.max(0, Math.round(Number(normalized.sockets || 0)));
    normalized.stats = normalized.stats && typeof normalized.stats === 'object' ? normalized.stats : {};
    normalized.affixes = Array.isArray(normalized.affixes) ? normalized.affixes : [];
    return normalized;
  }

  function normalizeState(candidate) {
    const base = createDefaultState();
    if (!candidate || typeof candidate !== 'object') return base;
    let source;
    try { source = migrateState(candidate); }
    catch (error) { return base; }
    const merged = {
      ...base,
      ...source,
      meta: { ...base.meta, ...(source.meta || {}) },
      onboarding: { ...base.onboarding, ...(source.onboarding || {}) },
      hero: { ...base.hero, ...(source.hero || {}) },
      resources: { ...base.resources, ...(source.resources || {}) },
      progress: { ...base.progress, ...(source.progress || {}) },
      shop: { ...base.shop, ...(source.shop || {}) },
      settings: { ...base.settings, ...(source.settings || {}) }
    };
    merged.hero.equipment = { ...base.hero.equipment, ...(source.hero?.equipment || {}) };
    Object.keys(merged.hero.equipment).forEach(slot => { merged.hero.equipment[slot] = normalizeItem(merged.hero.equipment[slot]); });
    merged.hero.inventory = Array.isArray(source.hero?.inventory) ? source.hero.inventory.map(normalizeItem).filter(Boolean).slice(0, 120) : base.hero.inventory;
    merged.hero.ownedSkills = Array.isArray(source.hero?.ownedSkills) ? [...new Set(source.hero.ownedSkills)].filter(getSkillNode) : [];
    merged.hero.equippedAbilities = Array.isArray(source.hero?.equippedAbilities)
      ? [...new Set(source.hero.equippedAbilities)].filter(id => D.ABILITIES[id]).slice(0, 4)
      : base.hero.equippedAbilities;
    merged.hero.runes = { ...base.hero.runes, ...(source.hero?.runes || {}) };
    merged.hero.recipes = Array.isArray(source.hero?.recipes) ? [...new Set(source.hero.recipes)].filter(id => D.RUNEWORDS[id]) : [];
    merged.hero.lifetime = { ...base.hero.lifetime, ...(source.hero?.lifetime || {}) };
    merged.progress.bossesSeen = { ...base.progress.bossesSeen, ...(source.progress?.bossesSeen || {}) };
    merged.progress.campUpgrades = { ...base.progress.campUpgrades, ...(source.progress?.campUpgrades || {}) };
    merged.progress.contractMastery = { ...base.progress.contractMastery, ...(source.progress?.contractMastery || {}) };
    Object.keys(merged.progress.contractMastery).forEach(id => {
      if (!D.DIFFICULTY_CONTRACTS[id]) delete merged.progress.contractMastery[id];
      else merged.progress.contractMastery[id] = Math.max(0, Math.round(Number(merged.progress.contractMastery[id]) || 0));
    });
    merged.progress.endlessModifiersSeen = { ...base.progress.endlessModifiersSeen, ...(source.progress?.endlessModifiersSeen || {}) };
    Object.keys(merged.progress.endlessModifiersSeen).forEach(id => {
      if (!D.ENDLESS_MODIFIERS[id]) delete merged.progress.endlessModifiersSeen[id];
      else merged.progress.endlessModifiersSeen[id] = Math.max(0, Math.round(Number(merged.progress.endlessModifiersSeen[id]) || 0));
    });
    merged.progress.namedEliteClears = { ...base.progress.namedEliteClears, ...(source.progress?.namedEliteClears || {}) };
    Object.keys(merged.progress.namedEliteClears).forEach(id => {
      if (!D.NAMED_ELITES[id]) delete merged.progress.namedEliteClears[id];
      else merged.progress.namedEliteClears[id] = Math.max(0, Math.round(Number(merged.progress.namedEliteClears[id]) || 0));
    });
    merged.progress.regionalFinds = { ...base.progress.regionalFinds, ...(source.progress?.regionalFinds || {}) };
    Object.keys(merged.progress.regionalFinds).forEach(id => {
      if (!D.REGIONAL_LOOT[id]) delete merged.progress.regionalFinds[id];
      else merged.progress.regionalFinds[id] = Math.max(0, Math.round(Number(merged.progress.regionalFinds[id]) || 0));
    });
    merged.progress.quests = { ...base.progress.quests, ...(source.progress?.quests || {}) };
    Object.keys(merged.progress.quests).forEach(id => {
      if (!D.CAMP_QUESTS[id]) delete merged.progress.quests[id];
      else {
        const entry = merged.progress.quests[id] || {};
        merged.progress.quests[id] = {
          progress: Math.max(0, Number(entry.progress || 0)),
          claimed: Boolean(entry.claimed)
        };
      }
    });
    merged.progress.storySeen = { ...base.progress.storySeen, ...(source.progress?.storySeen || {}) };
    merged.progress.mountainSequence = clamp(Math.round(Number(source.progress?.mountainSequence || 0)), 0, D.MOUNTAIN_CAMPAIGN.length);
    merged.progress.achievements = { ...(source.progress?.achievements || {}) };
    Object.keys(merged.progress.achievements).forEach(id => { if (!D.ACHIEVEMENTS[id]) delete merged.progress.achievements[id]; });
    merged.progress.challenges = { ...(source.progress?.challenges || {}) };
    Object.keys(merged.progress.challenges).forEach(id => { if (!D.CHALLENGES[id]) delete merged.progress.challenges[id]; });
    merged.progress.objectiveClears = { ...(source.progress?.objectiveClears || {}) };
    merged.progress.endgameBossClears = { ...(source.progress?.endgameBossClears || {}) };
    merged.progress.archetypeWins = { ...(source.progress?.archetypeWins || {}) };
    merged.progress.finalBossDefeated = Boolean(source.progress?.finalBossDefeated);
    merged.progress.finalRewardClaimed = Boolean(source.progress?.finalRewardClaimed);
    merged.progress.missionRecords = { ...(source.progress?.missionRecords || {}) };
    merged.progress.extractedDepth = Math.max(0, Math.round(Number(source.progress?.extractedDepth || 0)));
    merged.progress.runewordsCrafted = Math.max(0, Math.round(Number(source.progress?.runewordsCrafted || 0)));
    Object.keys(merged.progress.campUpgrades).forEach(id => {
      if (!D.CAMP_UPGRADES[id]) delete merged.progress.campUpgrades[id];
      else merged.progress.campUpgrades[id] = clamp(Math.round(Number(merged.progress.campUpgrades[id]) || 0), 0, D.CAMP_UPGRADES[id].maxRank);
    });
    merged.progress.endlessRun = { ...base.progress.endlessRun, ...(source.progress?.endlessRun || {}) };
    merged.progress.endlessRun.loot = Array.isArray(source.progress?.endlessRun?.loot) ? source.progress.endlessRun.loot.map(normalizeItem).filter(Boolean).slice(0, 120) : [];
    merged.progress.endlessRun.runes = { ...(source.progress?.endlessRun?.runes || {}) };
    merged.progress.endlessRun.recipes = Array.isArray(source.progress?.endlessRun?.recipes) ? [...new Set(source.progress.endlessRun.recipes)].filter(id => D.RUNEWORDS[id]) : [];
    merged.progress.unlockedRegion = clamp(Math.round(Number(merged.progress.unlockedRegion) || 0), 0, D.REGIONS.length - 1);
    merged.settings.combatSpeed = [1, 2, 4].includes(Number(merged.settings.combatSpeed)) ? Number(merged.settings.combatSpeed) : 1;
    merged.settings.visualQuality = ['auto', 'low', 'medium', 'high'].includes(merged.settings.visualQuality) ? merged.settings.visualQuality : 'auto';
    merged.settings.cameraPunctuation = merged.settings.cameraPunctuation !== false;
    merged.settings.bossIntroductions = merged.settings.bossIntroductions !== false;
    merged.resources.gold = Math.max(0, Math.round(Number(merged.resources.gold) || 0));
    merged.resources.renown = Math.max(0, Math.round(Number(merged.resources.renown) || 0));
    merged.resources.essence = Math.max(0, Math.round(Number(merged.resources.essence) || 0));
    merged.shop.refreshes = Math.max(0, Math.round(Number(merged.shop.refreshes || 0)));
    merged.shop.stockLevel = Math.max(0, Math.round(Number(merged.shop.stockLevel || 0)));
    const staleMerchantStock = merged.shop.stockLevel !== merged.hero.level;
    if (!Array.isArray(merged.shop.items) || !merged.shop.items.length || staleMerchantStock) {
