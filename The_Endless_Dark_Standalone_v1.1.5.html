    plannerModal() {
      const dungeon = this.planner.dungeon;
      const routeSet = new Set(this.route);
      const current = this.route[this.route.length - 1];
      const adjacent = new Set(C.adjacentNodes(dungeon, current));
      const routeEdges = new Set(this.route.slice(1).map((node, index) => [this.route[index], node].sort((a,b) => a-b).join('-')));
      const used = this.route.length - 1;
      const lastIsObjective = this.route[this.route.length - 1] === dungeon.nodes[dungeon.nodes.length - 1].id;
      const finalNode = dungeon.nodes[dungeon.nodes.length - 1];
      const namedObjective = finalNode.namedEliteId ? D.NAMED_ELITES[finalNode.namedEliteId] : null;
      const boss = finalNode.type === 'boss' ? D.BOSSES[dungeon.bossId] : null;
      const objectiveDefinition = D.MISSION_OBJECTIVES[dungeon.mission.objectiveType] || D.MISSION_OBJECTIVES.clear;
      const objectiveName = namedObjective?.name || boss?.name || objectiveDefinition.name;
      const objectiveText = namedObjective?.text || boss?.mechanicText || objectiveDefinition.text;
      const selectedContracts = dungeon.mission.contracts || [];
      const modifiers = dungeon.mission.endlessModifiers || [];
      const inventoryUsed = C.getState().hero.inventory.length;
      const inventoryCapacity = C.inventoryCapacity();
      const inventoryFull = inventoryUsed >= inventoryCapacity;
      return `<div class="modal-backdrop"><section class="modal large route-planner-modal" role="dialog" aria-modal="true"><div class="modal-header"><div><div class="eyebrow">Route planning</div><h2>${esc(D.REGIONS[dungeon.regionIndex].name)} · ${esc(dungeon.mission.name)}</h2></div><button class="icon-button" data-action="close-planner" aria-label="Close route planner" ${tooltipAttrs('Close planner', 'Discard the current planned route.')}>${icon('close')}</button></div><div class="modal-body planner-layout">
        <div>
          <div class="dungeon-map">
            <svg class="map-edges" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
              <defs><filter id="routeGlow"><feGaussianBlur stdDeviation="0.65" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
              ${dungeon.edges.map(([a,b]) => {
                const A = dungeon.nodes[a]; const Bn = dungeon.nodes[b];
                const route = routeEdges.has([a,b].sort((x,y) => x-y).join('-'));
                const curve = Math.max(-7, Math.min(7, (Bn.y - A.y) * .12));
                const mx = (A.x + Bn.x) / 2; const my = (A.y + Bn.y) / 2 - curve;
                return `<path class="map-edge ${route ? 'route' : ''}" d="M ${A.x} ${A.y} Q ${mx} ${my} ${Bn.x} ${Bn.y}" vector-effect="non-scaling-stroke"/>`;
              }).join('')}
            </svg>
            ${dungeon.nodes.map(node => {
              const selected = routeSet.has(node.id);
              const available = node.id === 0 || (adjacent.has(node.id) && !selected && used < dungeon.commandPoints);
              const affixNames = (node.eliteAffixes || []).map(id => D.ELITE_AFFIXES[id]?.name).filter(Boolean);
              const affixIcons = (node.eliteAffixes || []).map(id => D.ELITE_AFFIXES[id]?.icon).filter(Boolean).join('');
              const nodeTitle = node.namedEliteId ? D.NAMED_ELITES[node.namedEliteId]?.name : node.hazard?.name || D.ROOM_TYPES[node.type].label;
              const nodeBody = node.namedEliteId ? D.NAMED_ELITES[node.namedEliteId]?.text : node.hazard?.text || `${D.ROOM_TYPES[node.type].label} · Risk ${node.risk.toFixed(1)}×`;
              return `<button class="map-node ${node.type} ${selected ? 'selected' : ''} ${available || selected ? '' : 'unavailable'}" style="left:${node.x}%;top:${node.y}%" data-action="route-node" data-node="${node.id}" ${available || selected ? '' : 'aria-disabled="true"'} ${tooltipAttrs(nodeTitle, nodeBody, affixNames.length ? `Affixes: ${affixNames.join(' · ')}` : selected ? 'Included in route' : 'Tap to add to route')}>
                <span class="node-icon">${roomSkinImage(node.type)}</span><span class="node-label">${esc(nodeTitle)}${affixIcons ? ` · ${esc(affixIcons)}` : ''}</span>
              </button>`;
            }).join('')}
          </div>
          <section class="contract-panel">
            <div class="contract-heading"><div><div class="eyebrow">Difficulty contracts</div><strong>${selectedContracts.length}/${dungeon.mission.contractLimit} selected</strong></div><span>Contracts are voluntary, readable rule changes that multiply rewards.</span></div>
            <div class="contract-grid">${Object.entries(D.DIFFICULTY_CONTRACTS).map(([id, contract]) => {
              const active = selectedContracts.includes(id);
              const atLimit = !active && selectedContracts.length >= dungeon.mission.contractLimit;
              return `<button class="contract-card ${active ? 'active' : ''}" data-action="toggle-contract" data-contract="${id}" ${atLimit ? 'aria-disabled="true"' : ''} ${tooltipAttrs(contract.name, contract.text, `Counter: ${contract.counter} · Reward +${Math.round((contract.reward - 1) * 100)}%`)}>
                <span class="contract-icon">${icon('risk')}</span><span><strong>${esc(contract.name)} · +${Math.round((contract.reward - 1) * 100)}%</strong><small>${esc(contract.text)}</small><em>Counter: ${esc(contract.counter)}</em></span>
              </button>`;
            }).join('')}</div>
            ${modifiers.length ? `<div class="endless-modifier-panel"><div class="eyebrow">Automatic depth modifiers</div>${modifiers.map(id => `<div class="modifier-row"><strong>${esc(D.ENDLESS_MODIFIERS[id].icon)} ${esc(D.ENDLESS_MODIFIERS[id].name)}</strong><span>${esc(D.ENDLESS_MODIFIERS[id].text)}</span></div>`).join('')}</div>` : ''}
          </section>
        </div>
        <aside>
          <div class="eyebrow">Command Points</div><div><strong>${used}/${dungeon.commandPoints} committed</strong></div>
          <div class="command-display">${Array.from({ length: dungeon.commandPoints }, (_, index) => `<div class="command-pip ${index < used ? 'used' : ''}"></div>`).join('')}</div>
          <div class="subtle">Every entered zone consumes one point. Gear and skills can change this budget.</div>
          <div class="divider"></div>
          <div class="contract-summary"><div><span>Final threat</span><strong>${dungeon.mission.threat.toFixed(2)}×</strong></div><div><span>Final reward</span><strong>${dungeon.mission.reward.toFixed(2)}×</strong></div></div>
          <div class="divider"></div>
          <div class="boss-intel"><div class="eyebrow">Objective · ${esc(objectiveName)}</div><strong>${esc(objectiveText)}</strong><span>${esc(dungeon.regionRule?.pressure || '')}</span></div>
          <div class="divider"></div><div class="eyebrow">Planned route</div>
          <div class="route-list">${this.route.map((nodeId, index) => {
            const node = dungeon.nodes.find(entry => entry.id === nodeId);
            const affixes = (node.eliteAffixes || []).map(id => D.ELITE_AFFIXES[id]?.name).filter(Boolean);
            const title = node.namedEliteId ? D.NAMED_ELITES[node.namedEliteId]?.name : D.ROOM_TYPES[node.type].label;
            return `<div class="route-entry"><span>${index}. ${esc(title)}${affixes.length ? `<small>${esc(affixes.join(' · '))}</small>` : ''}</span><strong>${node.type === 'start' ? 'Start' : `${node.risk.toFixed(1)}×`}</strong></div>`;
          }).join('')}</div>
          <div class="divider"></div>
          <div class="item-actions route-actions"><button class="button" data-action="route-undo" ${this.route.length <= 1 ? 'disabled' : ''}>Undo</button><button class="button" data-action="route-reset">Reset</button><button class="button auto-route-button" data-action="route-auto" ${tooltipAttrs('Auto-plan full route', 'Finds a valid route to the objective that spends every available Command Point whenever the dungeon graph permits it.', `${dungeon.commandPoints} Command Points available`)}>${icon('route', 'button-icon')} Auto-plan full route</button></div>
          <div class="divider"></div>
          <div class="transition-preview" aria-label="Room transition preview"><div class="preview-room"><span class="preview-hero exit"></span></div><span class="preview-blur"></span><div class="preview-room"><span class="preview-hero enter"></span></div><small>Exit right · soft veil · enter left</small></div>
          ${inventoryFull ? `<div class="inventory-capacity-warning">${icon('risk')}<div><strong>Inventory full · ${inventoryUsed}/${inventoryCapacity}</strong><span>New item rewards may be converted to gold. Clean the stash before committing for full loot control.</span></div></div>` : `<div class="inventory-capacity-ready">${icon('inventory')} ${inventoryUsed}/${inventoryCapacity} inventory slots used</div>`}
          ${lastIsObjective ? '<div class="subtle">Route reaches the objective. Combat will resolve automatically after commitment.</div>' : '<div class="subtle">The route must end at the final objective.</div>'}
          <button class="button primary commit-button" data-action="commit-route" ${lastIsObjective ? '' : 'disabled'}>Commit expedition</button>
        </aside>
      </div></section>
      ${this.inventoryWarning ? `<section class="planner-confirmation" role="alertdialog" aria-modal="true" aria-labelledby="inventoryWarningTitle"><div class="planner-confirmation-card"><span class="confirmation-icon">${icon('risk')}</span><div><div class="eyebrow">Inventory capacity warning</div><h2 id="inventoryWarningTitle">Your stash is completely full</h2><p>Items found during this expedition cannot enter the stash and will be converted to their sell value. The route is preserved while you decide.</p><div class="inventory-warning-actions"><button class="button" data-action="cancel-full-inventory">Return to planner</button><button class="button" data-action="open-inventory-from-planner">Clean inventory</button><button class="button danger" data-action="proceed-full-inventory">Proceed anyway</button></div></div></div></section>` : ''}
      </div>`;
    }

    renderCombatShell() {
      const state = C.getState();
      this.root.innerHTML = `<div class="app-shell">${this.topbar()}<main class="main"><div class="combat-screen">
        <section class="arena-wrap">
          <canvas id="combatCanvas" aria-label="Automatic combat arena"></canvas>
          <div class="combat-hud">
            <div class="hud-card"><strong>${esc(state.hero.name)}</strong><div id="heroHealthText">${number(this.combat.hero.hp)} / ${number(this.combat.hero.maxHp)}</div><div class="health-bar"><div id="heroHealthFill" class="health-fill"></div></div></div>
            <div class="combat-controls"><button class="button small" data-action="combat-pause">Pause</button>${[1,2,4].map(speed => `<button class="button small ${this.combat.speed === speed ? 'active-speed' : ''}" data-action="combat-speed" data-speed="${speed}">${speed}×</button>`).join('')}<span id="qualityTier" class="quality-tier">${esc(this.combat.visualQuality)}</span></div>
            <div class="hud-card right"><strong id="roomName">Travelling</strong><div id="roomProgress" class="subtle">Room 0/${this.route.length - 1}</div><div id="encounterIntel" class="encounter-intel"></div></div>
          </div>
          <section id="targetHealthHud" class="target-health-hud" hidden aria-live="polite" aria-label="Priority enemy health">
            <div class="target-health-heading"><span id="targetHealthRole">Elite target</span><strong id="targetHealthName">Target</strong><span id="targetHealthText">0 / 0</span></div>
            <div class="target-health-track"><div id="targetHealthFill" class="target-health-fill"></div><div id="targetBarrierFill" class="target-barrier-fill"></div></div>
            <div id="targetHealthAffixes" class="target-health-affixes"></div>
          </section>
          <div class="ability-hud">${state.hero.equippedAbilities.map(id => `<div class="ability-orb" id="ability_${id}" ${tooltipAttrs(D.ABILITIES[id].name, D.ABILITIES[id].text, `Base cooldown ${D.ABILITIES[id].cooldown}s · Hover, focus or tap to inspect`)}><strong>${icon(abilityIconKey(D.ABILITIES[id]), 'ability-hud-icon')}</strong><span class="ability-name">${esc(D.ABILITIES[id].name)}</span><div class="ability-cooldown"></div><span class="ability-cooldown-text">READY</span></div>`).join('')}</div>
        </section>
        <aside class="panel"><div class="panel-header"><div><div class="eyebrow">Combat telemetry</div><h2>Live resolution</h2></div></div><div id="combatLog" class="panel-body combat-log"></div></aside>
      </div></main></div>`;
      const canvas = document.getElementById('combatCanvas');
      if (!this.combat.canvas) {
        this.combat.options.onHud = snap => this.updateCombatHud(snap);
        this.combat.options.onLog = () => this.updateCombatLog();
        this.combat.options.onPresentationEvent = event => this.onPresentationEvent(event);
        this.combat.options.onComplete = result => this.onCombatComplete(result);
        this.combat.mount(canvas).start();
      } else {
        this.combat.canvas = canvas;
        this.combat.ctx = canvas.getContext('2d', { alpha: false });
        this.combat.resize();
      }
      this.updateCombatLog();
    }

    onPresentationEvent(event) {
      window.ED_APP?.audio?.playEvent(event);
      if (!event) return;
      const arena = document.querySelector('.arena-wrap');
      if (event.type === 'ability-cast' && event.id) {
        const orb = document.getElementById(`ability_${event.id}`);
        if (orb) {
          orb.classList.remove('is-casting');
          void orb.offsetWidth;
          orb.classList.add('is-casting');
          setTimeout(() => orb.classList.remove('is-casting'), 420);
        }
      }
      if (arena && ['boss-intro', 'boss-phase', 'boss-death', 'hero-crit'].includes(event.type)) {
        arena.classList.remove('impact-focus');
        void arena.offsetWidth;
        arena.classList.add('impact-focus');
        setTimeout(() => arena.classList.remove('impact-focus'), event.type === 'boss-intro' ? 900 : 280);
      }
    }

    updateCombatHud(snap) {
      const fill = document.getElementById('heroHealthFill');
      const text = document.getElementById('heroHealthText');
      const roomName = document.getElementById('roomName');
      const roomProgress = document.getElementById('roomProgress');
      const arena = document.querySelector('.arena-wrap');
      const encounterIntel = document.getElementById('encounterIntel');
      const qualityTier = document.getElementById('qualityTier');
      const targetHud = document.getElementById('targetHealthHud');
      const targetName = document.getElementById('targetHealthName');
      const targetRole = document.getElementById('targetHealthRole');
      const targetText = document.getElementById('targetHealthText');
      const targetFill = document.getElementById('targetHealthFill');
      const targetBarrier = document.getElementById('targetBarrierFill');
      const targetAffixes = document.getElementById('targetHealthAffixes');
      if (arena) {
        const currentSettings = C.getState().settings;
        arena.classList.toggle('is-shaking', Boolean(
          snap.shake > 0
          && currentSettings.screenShake
          && !currentSettings.cameraPunctuation
        ));
      }
      if (qualityTier) qualityTier.textContent = `${snap.visualQuality}${this.combat?.presentation?.degraded ? ' · adaptive' : ''}`;
      if (fill) fill.style.width = `${Math.max(0, snap.hp / snap.maxHp) * 100}%`;
      if (text) text.textContent = `${number(snap.hp)} / ${number(snap.maxHp)}${snap.barrier > 0 ? ` + ${number(snap.barrier)} barrier` : ''}`;
      if (roomName) roomName.textContent = snap.room?.namedEliteId ? D.NAMED_ELITES[snap.room.namedEliteId]?.name || 'Named elite' : snap.room?.type === 'boss' && this.combat?.dungeon?.bossId ? D.BOSSES[this.combat.dungeon.bossId].name : snap.room ? D.ROOM_TYPES[snap.room.type].label : 'Travelling';
      if (roomProgress) roomProgress.textContent = `Room ${snap.roomCursor}/${snap.roomCount} · ${snap.enemies} enemies`;
      if (encounterIntel) {
        const affixes = (snap.eliteAffixes || []).map(id => D.ELITE_AFFIXES[id]?.name).filter(Boolean);
        const roles = (snap.tacticalRoles || []).map(id => String(id).replace(/([A-Z])/g, ' $1')).slice(0, 3);
        encounterIntel.textContent = [...affixes, ...roles].join(' · ');
      }
      if (targetHud) {
        const target = snap.focusTarget;
        targetHud.hidden = !target;
        if (target) {
          const hpRatio = Math.max(0, Math.min(1, target.hp / Math.max(1, target.maxHp)));
          const barrierRatio = Math.max(0, Math.min(1, target.barrier / Math.max(1, target.maxHp)));
          if (targetName) targetName.textContent = `${target.icon || '◆'} ${target.name}`;
          if (targetRole) targetRole.textContent = target.role === 'boss' ? 'Boss' : target.namedEliteId ? 'Named elite' : 'Elite';
          if (targetText) targetText.textContent = `${number(target.hp)} / ${number(target.maxHp)}${target.barrier > 0 ? ` + ${number(target.barrier)} ward` : ''}`;
          if (targetFill) { targetFill.style.width = `${hpRatio * 100}%`; targetFill.classList.toggle('boss', target.role === 'boss'); }
          if (targetBarrier) targetBarrier.style.width = `${barrierRatio * 100}%`;
          if (targetAffixes) targetAffixes.textContent = (target.eliteAffixes || []).map(id => D.ELITE_AFFIXES[id]?.name).filter(Boolean).join(' · ');
        }
      }
      Object.entries(snap.cooldowns).forEach(([id, cd]) => {
        const orb = document.getElementById(`ability_${id}`);
        if (!orb) return;
        const max = D.ABILITIES[id].cooldown;
        const remaining = Math.max(0, Number(cd || 0));
        const cooldownLayer = orb.querySelector('.ability-cooldown');
        const cooldownText = orb.querySelector('.ability-cooldown-text');
        if (cooldownLayer) cooldownLayer.style.height = `${Math.min(100, remaining / max * 100)}%`;
        orb.classList.toggle('cooling', remaining > .05);
        orb.classList.toggle('ready', remaining <= .05);
        if (cooldownText) cooldownText.textContent = remaining > .05 ? `${remaining.toFixed(1)}s` : 'READY';
        orb.setAttribute('aria-label', `${D.ABILITIES[id].name}. ${D.ABILITIES[id].text}. ${remaining > .05 ? `${remaining.toFixed(1)} seconds remaining` : 'Ready'}.`);
      });
    }

    updateCombatLog() {
      const element = document.getElementById('combatLog');
      if (!element || !this.combat) return;
      const entries = this.combat.log.slice(-45);
      if (this.logRevision === entries.length && element.children.length) return;
      this.logRevision = entries.length;
      element.innerHTML = entries.map(entry => `<div class="log-entry"><strong>${seconds(entry.time)}</strong> ${esc(entry.message)}</div>`).join('');
      element.scrollTop = element.scrollHeight;
    }

    onCombatComplete(result) {
      const applied = C.completeExpedition(result);
      result.applied = applied;
      this.result = result;
      if (this.combat) this.combat.destroy();
      this.combat = null;
      this.render();
    }

    levelUpResultCard(result, applied) {
      const info = applied?.levelUp;
      if (!info) return '';
      const averageRoom = result.roomsCleared ? result.duration / result.roomsCleared : result.duration;
      return `<section class="level-up-card" aria-label="Level up rewards"><div class="level-up-emblem">${icon('level')}</div><div class="level-up-content"><div class="eyebrow">Hero progression</div><h2>Level ${info.previousLevel} → ${info.newLevel}</h2><p>The Wayfarer gained ${info.skillPointsGained} skill point${info.skillPointsGained === 1 ? '' : 's'} during a ${seconds(result.duration)} expedition.</p><div class="level-up-metrics"><span><strong>${result.roomsCleared}</strong> rooms</span><span><strong>${result.kills}</strong> kills</span><span><strong>${seconds(averageRoom)}</strong> per room</span></div>${info.unlockedSlots?.length ? `<div class="unlock-reveal"><div class="eyebrow">New equipment unlocked</div>${info.unlockedSlots.map(unlock => `<article>${icon(slotIconKey(unlock.slot))}<div><strong>${esc(unlock.label)}</strong><span>Equipment slot available from level ${unlock.level}</span></div></article>`).join('')}</div>` : `<div class="next-unlock-line">${info.nextUnlocks?.length ? `Next slot: ${esc(info.nextUnlocks[0].label)} at level ${info.nextUnlocks[0].level}.` : 'All equipment slots are unlocked.'}</div>`}</div></section>`;
    }

    runeRewardSection(runes = {}) {
      const entries = Object.entries(runes).filter(([id, count]) => D.RUNES[id] && Number(count) > 0);
      if (!entries.length) return '';
      return `<section class="rune-reward-section"><div><div class="eyebrow">Runes discovered</div><h3>${entries.reduce((sum, [, count]) => sum + Number(count), 0)} rune${entries.reduce((sum, [, count]) => sum + Number(count), 0) === 1 ? '' : 's'} secured</h3></div><div class="rune-reward-grid">${entries.map(([id, count]) => { const rune = D.RUNES[id]; return `<article ${tooltipAttrs(rune.name, rune.text || 'Used in runeword recipes and ritual crafting.', `${count} found this expedition`)}><span class="rune-reward-symbol">${esc(rune.symbol)}</span><div><strong>${esc(rune.name)}</strong><span>${count}× found</span></div></article>`; }).join('')}</div></section>`;
    }

    rewardItemCard(item, applied, endlessPending) {
      const state = C.getState();
      const accepted = new Set((applied?.acceptedLoot || []).map(entry => entry.id));
      const equipped = Object.values(state.hero.equipment).some(entry => entry?.id === item.id);
      const inStash = state.hero.inventory.some(entry => entry.id === item.id);
      const slotUnlocked = C.isSlotUnlocked(item.slot);
      let action = '';
      if (endlessPending) action = `<span class="reward-item-state at-risk">At risk until extraction</span>`;
      else if (equipped) action = `<span class="reward-item-state equipped">${icon('check')} Equipped</span>`;
      else if ((accepted.has(item.id) || inStash) && slotUnlocked) action = `<button class="button small primary" data-action="equip-reward-item" data-item="${item.id}">${icon('check', 'button-icon')} Equip now</button>`;
      else if ((accepted.has(item.id) || inStash) && !slotUnlocked) action = `<span class="reward-item-state locked">${icon('lock')} Slot unlocks L${D.SLOT_UNLOCK_LEVEL[item.slot]}</span>`;
      else action = `<span class="reward-item-state sold">Inventory overflow · converted to gold</span>`;
      return `<div class="reward-item-card">${this.itemCard(item, false, { clickable: false, tooltipContext: 'reward' })}<div class="reward-item-actions">${action}</div></div>`;
    }

    resultModal() {
      const r = this.result;
      const applied = r.applied || {};
      const topIncoming = Object.entries(r.telemetry.incomingBySource).sort((a,b) => b[1]-a[1])[0];
      const topProc = Object.entries(r.telemetry.abilityDamage).sort((a,b) => b[1]-a[1])[0];
      const endlessPending = Boolean(applied.endlessPending);
      const endlessFailed = Boolean(applied.endlessFailed);
      const rewardGold = endlessPending ? applied.cache.gold : (applied.gold ?? r.gold);
      const rewardXp = endlessPending ? applied.cache.xp : r.xp;
      return `<div class="modal-backdrop"><section class="modal large" role="dialog" aria-modal="true"><div class="modal-header"><h2>Expedition report</h2></div><div class="modal-body">
        <div class="result-grid">
          <div class="result-banner ${r.success ? '' : 'failure'}"><div class="eyebrow">${r.success ? 'Route cleared' : 'Expedition failed'}</div><h1>${r.success ? 'Success' : 'The build broke'}</h1><div class="subtle">${r.roomsCleared} rooms · ${r.kills} kills · ${seconds(r.duration)}${r.bossId ? ` · ${esc(D.BOSSES[r.bossId].name)}` : ''}</div></div>
          <div class="panel"><div class="panel-header"><h3>${endlessPending ? 'Haul currently at risk' : endlessFailed ? 'Consolation recovered' : 'Rewards secured'}</h3></div><div class="panel-body telemetry-list"><div class="telemetry-item"><span>Gold</span><strong>${number(rewardGold)}</strong></div><div class="telemetry-item"><span>Experience</span><strong>${number(rewardXp)}</strong></div><div class="telemetry-item"><span>Hero levels gained</span><strong>${endlessPending ? 'Pending' : applied.levels || 0}</strong></div><div class="telemetry-item"><span>Runes found</span><strong>${endlessPending ? Object.values(applied.cache.runes || {}).reduce((a,b)=>a+b,0) : Object.values(r.runes).reduce((a,b)=>a+b,0)}</strong></div></div></div>
        </div>
        ${!endlessPending ? this.levelUpResultCard(r, applied) : ''}
        ${endlessPending ? `<div class="risk-callout"><strong>Nothing above is secured yet.</strong><span>Extract now to bank the entire haul. Continuing starts the next descent with every cached reward at risk.</span></div>` : ''}
        ${endlessFailed && applied.lost?.active ? `<div class="risk-callout failure"><strong>The descent collapsed at depth ${applied.lost.depth}.</strong><span>${number(applied.lost.gold)} cached gold and ${applied.lost.loot.length} cached items were lost. A small gold and XP consolation was recovered.</span></div>` : ''}
        ${(r.contracts?.length || r.endlessModifiers?.length) ? `<div class="result-modifiers">${(r.contracts || []).map(id => `<span class="modifier-chip">Contract · ${esc(D.DIFFICULTY_CONTRACTS[id].name)}</span>`).join('')}${(r.endlessModifiers || []).map(id => `<span class="modifier-chip">Depth · ${esc(D.ENDLESS_MODIFIERS[id].name)}</span>`).join('')}</div>` : ''}
        ${r.objectiveType ? `<div class="campaign-result"><strong>${esc(D.MISSION_OBJECTIVES[r.objectiveType]?.icon || '◇')} ${esc(D.MISSION_OBJECTIVES[r.objectiveType]?.name || r.objectiveType)}</strong><span>${r.success ? 'Objective completed.' : 'Objective failed before extraction.'}${r.finalBoss && r.success ? ' The First Witness has fallen; the principal campaign is complete.' : ''}</span></div>` : ''}
        ${r.namedElitesKilled?.length ? `<div class="named-victory"><div class="eyebrow">Named victories</div><strong>${r.namedElitesKilled.map(id => esc(D.NAMED_ELITES[id]?.name || id)).join(' · ')}</strong></div>` : ''}
        ${r.campaignStage ? `<div class="campaign-result"><strong>Great Mountains ascent ${r.campaignStage}/${D.MOUNTAIN_CAMPAIGN.length} ${r.success ? 'cleared' : 'attempted'}</strong><span>${r.campaignFinal && r.success ? 'The Gate of the Deep is open. The Endless Dark is now reachable.' : 'The next gate opens only after this stage is cleared.'}</span></div>` : ''}
        ${this.runeRewardSection(r.runes)}
        <div class="divider"></div>
        <div class="eyebrow">${endlessPending ? 'Loot added to the at-risk haul' : 'Loot · inspect, compare and equip immediately'}</div><div class="loot-row reward-loot-grid" style="margin-top:9px">${r.loot.length ? r.loot.map(item => this.rewardItemCard(item, applied, endlessPending)).join('') : '<div class="empty-state">No item was secured from the cleared rooms.</div>'}</div>
        ${r.recipes.length ? `<div class="divider"></div><div class="result-banner"><div class="eyebrow">Runeword recipe discovered</div><h2 class="set-name">${r.recipes.map(id => esc(D.RUNEWORDS[id].name)).join(', ')}</h2></div>` : ''}
        <div class="divider"></div>
        <div class="result-grid">
          <section><div class="eyebrow">Why this happened</div><div class="telemetry-list" style="margin-top:9px">${r.diagnosis.map(line => `<div class="telemetry-item"><span>${esc(line)}</span></div>`).join('')}</div></section>
          <section><div class="eyebrow">Build performance</div><div class="telemetry-list" style="margin-top:9px">
            <div class="telemetry-item"><span>Damage dealt</span><strong>${number(r.telemetry.damageDealt)}</strong></div>
            <div class="telemetry-item"><span>Damage taken</span><strong>${number(r.telemetry.damageTaken)}</strong></div>
            <div class="telemetry-item"><span>Healing</span><strong>${number(r.telemetry.healing)}</strong></div>
            <div class="telemetry-item"><span>Damage prevented</span><strong>${number(r.telemetry.blocked + r.telemetry.dodged)}</strong></div>
            <div class="telemetry-item"><span>Largest hit</span><strong>${number(r.telemetry.largestHit)}</strong></div>
            <div class="telemetry-item"><span>Top incoming source</span><strong>${topIncoming ? esc(topIncoming[0]) : 'None'}</strong></div>
            <div class="telemetry-item"><span>Strongest proc</span><strong>${topProc ? esc(topProc[0]) : 'Basic attacks'}</strong></div>
            <div class="telemetry-item"><span>Elite affix triggers</span><strong>${number(Object.values(r.telemetry.eliteAffixTriggers || {}).reduce((a,b)=>a+b,0))}</strong></div>
            <div class="telemetry-item"><span>Tactical abilities seen</span><strong>${number(Object.values(r.telemetry.tacticalBehaviors || {}).reduce((a,b)=>a+b,0))}</strong></div>
          </div></section>
        </div>
        <div class="divider"></div>
        ${endlessPending ? `<div class="endless-result-actions"><button class="button" data-action="extract-endless-result">Extract complete haul</button><button class="button primary" data-action="continue-endless">Risk it and descend again</button></div>` : `<button class="button primary" style="width:100%" data-action="close-result">Return to camp and rebuild</button>`}
      </div></section></div>`;
    }

    onTooltipEnter(event, immediate = false) {
      const target = event.target?.closest?.('[data-tooltip-title], [data-tooltip-kind="item"]');
      if (!target || C.getState().settings.richTooltips === false) return;
      clearTimeout(this.tooltipTimer);
      this.tooltipTimer = setTimeout(() => this.showTooltip(target), immediate ? 0 : 180);
    }

    onTooltipLeave(event) {
      const target = event.target?.closest?.('[data-tooltip-title], [data-tooltip-kind="item"]');
      if (!target) return;
      if (event.relatedTarget && target.contains?.(event.relatedTarget)) return;
      clearTimeout(this.tooltipTimer);
      this.tooltipTimer = setTimeout(() => this.hideTooltip(), 80);
    }

    showTooltip(target) {
      if (!target?.isConnected || C.getState().settings.richTooltips === false) return;
      this.hideTooltip();
      const tooltip = document.createElement('div');
      tooltip.id = 'uiTooltip';
      tooltip.className = 'ui-tooltip';
      tooltip.setAttribute('role', 'tooltip');
      const kind = target.dataset.tooltipKind || '';
      const title = target.dataset.tooltipTitle || '';
      const body = target.dataset.tooltipBody || '';
      const meta = target.dataset.tooltipMeta || '';
      if (kind === 'item') {
        const item = this.findTooltipItem(target.dataset.tooltipItemId || '');
        tooltip.classList.add('wow-item-tooltip');
        tooltip.innerHTML = item ? this.itemTooltipHtml(item, target.dataset.tooltipContext || '') : '<strong>Item unavailable</strong><span>This item is no longer present.</span>';
      } else {
        tooltip.innerHTML = `<strong>${esc(title)}</strong>${body ? `<span>${esc(body)}</span>` : ''}${meta ? `<small>${esc(meta)}</small>` : ''}`;
      }
      document.body.appendChild(tooltip);
      this.tooltipElement = tooltip;
      target.setAttribute('aria-describedby', tooltip.id);
      tooltip.style.visibility = 'hidden';
      const rect = target.getBoundingClientRect();
      const tipRect = tooltip.getBoundingClientRect();
      const position = computeTooltipPosition(rect, tipRect, { width: window.innerWidth, height: window.innerHeight });
      tooltip.style.left = `${position.left}px`;
      tooltip.style.top = `${position.top}px`;
      tooltip.style.visibility = 'visible';
      if (window.matchMedia?.('(pointer: coarse)').matches) this.tooltipTimer = setTimeout(() => this.hideTooltip(), 4200);
    }

    hideTooltip() {
      clearTimeout(this.tooltipTimer);
      if (this.tooltipElement) {
        document.querySelectorAll?.('[aria-describedby="uiTooltip"]').forEach(element => element.removeAttribute('aria-describedby'));
        this.tooltipElement.remove?.();
        this.tooltipElement = null;
      }
    }

    dragPayloadFromElement(element) {
      if (!element) return null;
      if (element.dataset.dragItem) return { kind: 'inventory', itemId: element.dataset.dragItem, slot: C.getState().hero.inventory.find(item => item.id === element.dataset.dragItem)?.slot || '' };
      if (element.dataset.dragEquipped) return { kind: 'equipped', slot: element.dataset.dragEquipped, itemId: C.getState().hero.equipment[element.dataset.dragEquipped]?.id || '' };
      return null;
    }

    markDropTargets(payload, active = true) {
      document.body?.classList?.toggle?.('is-dragging-item', active);
      this.root.querySelectorAll?.('[data-drop-slot]').forEach(slot => {
        const compatible = payload?.kind === 'inventory' && slot.dataset.dropSlot === payload.slot && slot.getAttribute('aria-disabled') !== 'true';
        slot.classList.toggle('drop-compatible', active && compatible);
        if (!active) slot.classList.remove('drop-hover');
      });
      this.root.querySelectorAll?.('[data-drop-inventory]').forEach(area => area.classList.toggle('drop-compatible', active && payload?.kind === 'equipped'));
    }

    onDragStart(event) {
      const source = event.target?.closest?.('[data-drag-item],[data-drag-equipped]');
      const payload = this.dragPayloadFromElement(source);
      if (!payload) return;
      this.dragState = { ...payload, source, native: true };
      event.dataTransfer?.setData?.('application/x-endless-dark-item', JSON.stringify(payload));
      if (event.dataTransfer) event.dataTransfer.effectAllowed = 'move';
      source.classList.add('is-drag-source');
      this.markDropTargets(payload, true);
      this.hideTooltip();
    }

    onDragOver(event) {
      if (!this.dragState) return;
      const slot = event.target?.closest?.('[data-drop-slot]');
      const stash = event.target?.closest?.('[data-drop-inventory]');
      const validSlot = slot && this.dragState.kind === 'inventory' && slot.dataset.dropSlot === this.dragState.slot && slot.getAttribute('aria-disabled') !== 'true';
      const validStash = stash && this.dragState.kind === 'equipped';
      if (!validSlot && !validStash) return;
      event.preventDefault();
      if (event.dataTransfer) event.dataTransfer.dropEffect = 'move';
      this.root.querySelectorAll?.('.drop-hover').forEach(entry => entry.classList.remove('drop-hover'));
      (validSlot ? slot : stash).classList.add('drop-hover');
    }

    onDragLeave(event) {
      const target = event.target?.closest?.('.drop-hover');
      if (target && !target.contains(event.relatedTarget)) target.classList.remove('drop-hover');
    }

    onDrop(event) {
      if (!this.dragState) return;
      const slot = event.target?.closest?.('[data-drop-slot]');
      const stash = event.target?.closest?.('[data-drop-inventory]');
      if (slot && this.dragState.kind === 'inventory' && slot.dataset.dropSlot === this.dragState.slot) {
        event.preventDefault();
        this.handleResult(C.equipItem(this.dragState.itemId));
      } else if (stash && this.dragState.kind === 'equipped') {
        event.preventDefault();
        this.handleResult(C.unequip(this.dragState.slot));
      }
      this.endItemDrag();
    }

    endItemDrag() {
      this.dragState?.source?.classList?.remove?.('is-drag-source');
      this.dragState = null;
      this.markDropTargets(null, false);
      this.dragGhost?.remove?.();
      this.dragGhost = null;
      this.root.querySelectorAll?.('.drop-hover').forEach(entry => entry.classList.remove('drop-hover'));
    }

    onPointerDown(event) {
      if (event.pointerType === 'touch') this.onTooltipEnter(event, true);
      const source = event.target?.closest?.('[data-drag-item],[data-drag-equipped]');
      const payload = this.dragPayloadFromElement(source);
      if (!payload || event.button > 0) return;
      this.dragState = { ...payload, source, pointerId: event.pointerId, startX: event.clientX, startY: event.clientY, x: event.clientX, y: event.clientY, active: false, native: false };
      source.setPointerCapture?.(event.pointerId);
    }

    onPointerMove(event) {
      const drag = this.dragState;
      if (!drag || drag.native || drag.pointerId !== event.pointerId) return;
      drag.x = event.clientX; drag.y = event.clientY;
      const moved = Math.hypot(drag.x - drag.startX, drag.y - drag.startY);
      if (!drag.active && moved < 9) return;
      if (!drag.active) {
        drag.active = true;
        this.suppressClickUntil = Date.now() + 350;
        this.markDropTargets(drag, true);
        const ghost = drag.source.cloneNode(true);
        ghost.className = 'drag-ghost';
        ghost.removeAttribute?.('id');
        document.body.appendChild(ghost);
        this.dragGhost = ghost;
        this.hideTooltip();
      }
      event.preventDefault();
      if (this.dragGhost) { this.dragGhost.style.left = `${event.clientX}px`; this.dragGhost.style.top = `${event.clientY}px`; }
      const hit = document.elementFromPoint?.(event.clientX, event.clientY);
      this.root.querySelectorAll?.('.drop-hover').forEach(entry => entry.classList.remove('drop-hover'));
      const slot = hit?.closest?.('[data-drop-slot]');
      const stash = hit?.closest?.('[data-drop-inventory]');
      if (slot && drag.kind === 'inventory' && slot.dataset.dropSlot === drag.slot && slot.getAttribute('aria-disabled') !== 'true') slot.classList.add('drop-hover');
      else if (stash && drag.kind === 'equipped') stash.classList.add('drop-hover');
    }

    onPointerUp(event) {
      const drag = this.dragState;
      if (!drag || drag.native || drag.pointerId !== event.pointerId) return;
      if (drag.active) {
        const hit = document.elementFromPoint?.(event.clientX, event.clientY);
        const slot = hit?.closest?.('[data-drop-slot]');
        const stash = hit?.closest?.('[data-drop-inventory]');
        if (slot && drag.kind === 'inventory' && slot.dataset.dropSlot === drag.slot && slot.getAttribute('aria-disabled') !== 'true') this.handleResult(C.equipItem(drag.itemId));
        else if (stash && drag.kind === 'equipped') this.handleResult(C.unequip(drag.slot));
      }
      this.endItemDrag();
    }

    onKeyDown(event) {
      const tab = event.target?.closest?.('[role="tab"]');
      if (tab && ['ArrowRight', 'ArrowLeft', 'Home', 'End'].includes(event.key)) {
        const tabs = [...tab.parentElement.querySelectorAll('[role="tab"]')].filter(entry => !entry.disabled);
        const current = tabs.indexOf(tab);
        let next = current;
        if (event.key === 'ArrowRight') next = (current + 1) % tabs.length;
        else if (event.key === 'ArrowLeft') next = (current - 1 + tabs.length) % tabs.length;
        else if (event.key === 'Home') next = 0;
        else if (event.key === 'End') next = tabs.length - 1;
        event.preventDefault();
        tabs[next]?.focus();
        tabs[next]?.click();
      }
      if (event.key === 'Escape') this.hideTooltip();
    }

    onInput(event) {
      const control = event.target?.closest?.('[data-inventory-filter="query"]');
      if (!control) return;
      this.inventoryFilters.query = control.value;
      this.selectedItemId = null;
      const selection = control.selectionStart ?? control.value.length;
      this.render();
      const restored = this.root.querySelector?.('[data-inventory-filter="query"]');
      if (restored) {
        restored.focus();
        restored.setSelectionRange?.(selection, selection);
      }
    }

    onClick(event) {
      if (Date.now() < this.suppressClickUntil) { event.preventDefault(); return; }
      const button = event.target.closest('[data-action]');
      if (!button) return;
      if (button.getAttribute('aria-disabled') === 'true') { event.preventDefault(); return; }
      const action = button.dataset.action;
      window.ED_APP?.audio?.tone(210, .025, 'sine');

      this.hideTooltip();
      if (action === 'tab') { this.tab = button.dataset.tab; this.selectedItemId = null; this.selectedEquipmentSlot = null; this.render(); }
      else if (action === 'clear-inventory-filters') { this.inventoryFilters = { query: '', slot: 'all', rarity: 'all', sort: 'power-desc' }; this.selectedItemId = null; this.render(); }
      else if (action === 'select-region') { this.selectedRegionIndex = Number(button.dataset.region); this.render(); }
      else if (action === 'select-item') { this.selectedItemId = button.dataset.item; this.selectedEquipmentSlot = null; if (this.result) return; this.render(); }
      else if (action === 'select-equipment') { this.selectedEquipmentSlot = button.dataset.slot; this.selectedItemId = null; this.render(); }
      else if (action === 'clear-selection') { this.selectedItemId = null; this.selectedEquipmentSlot = null; this.render(); }
      else if (action === 'equip-item') this.handleResult(C.equipItem(button.dataset.item));
      else if (action === 'equip-reward-item') { const result = C.equipItem(button.dataset.item); this.toast(result.message, result.ok ? 'good' : 'bad'); this.render(); }
      else if (action === 'unequip') this.handleResult(C.unequip(button.dataset.slot));
      else if (action === 'sell-item') this.handleResult(C.sellItem(button.dataset.item));
      else if (action === 'bulk-sell') {
        const mode = button.dataset.mode;
        const preview = C.bulkSellPreview(mode);
        if (!preview.count) { this.handleResult(C.bulkSellItems(mode)); return; }
        const needsConfirmation = mode !== 'trash';
        const label = mode === 'worse' ? 'all unprotected items worse than equipped gear' : 'every unequipped inventory item, including set and unique pieces';
        if (needsConfirmation && !window.confirm(`Sell ${label}?\n\n${preview.count} items for ${preview.gold} gold.`)) return;
        this.handleResult(C.bulkSellItems(mode));
      }
      else if (action === 'salvage-item') { this.handleResult(C.salvageItem(button.dataset.item)); this.selectedItemId = null; }
      else if (action === 'refine-item') this.handleResult(C.refineItem(button.dataset.item));
      else if (action === 'select-skill-branch') { this.skillBranch = button.dataset.branch; this.render(); }
      else if (action === 'buy-skill') this.handleResult(C.buySkill(button.dataset.skill));
      else if (action === 'respec-skills') {
        const refund = C.allocatedSkillPoints();
        if (!refund) { this.handleResult(C.respecSkills()); return; }
        if (!window.confirm(`Refund all ${refund} allocated skill point${refund === 1 ? '' : 's'}?

Abilities that are no longer unlocked will be removed from the active loadout.`)) return;
        this.handleResult(C.respecSkills());
      }
      else if (action === 'toggle-ability') this.handleResult(C.toggleAbility(button.dataset.ability));
      else if (action === 'buy-camp-upgrade') this.handleResult(C.buyCampUpgrade(button.dataset.upgrade));
      else if (action === 'claim-quest') this.handleResult(C.claimCampQuest(button.dataset.quest));
      else if (action === 'claim-challenge') this.handleResult(C.claimChallenge(button.dataset.challenge));
      else if (action === 'restock-shop') this.handleResult(C.restockShop());
      else if (action === 'buy-shop') this.handleResult(C.buyShopItem(button.dataset.item));
      else if (action === 'craft-runeword') this.handleResult(C.craftRuneword(button.dataset.recipe));
      else if (action === 'open-help') { this.modal = 'help'; this.render(); }
      else if (action === 'open-settings') { this.modal = 'settings'; this.render(); }
      else if (action === 'close-modal') { this.modal = null; this.render(); }
      else if (action === 'complete-onboarding') { C.completeOnboarding(); this.modal = null; this.render(); }
      else if (action === 'dismiss-recovery') { C.dismissRecoveryNotice(); this.render(); }
      else if (action === 'plan-mission') this.openPlanner(button.dataset.mission);
      else if (action === 'close-planner') { this.planner = null; this.route = [0]; this.contracts = []; this.inventoryWarning = false; this.inventoryWarningBypassed = false; this.render(); }
      else if (action === 'toggle-contract') this.toggleContract(button.dataset.contract);
      else if (action === 'route-node') this.addRouteNode(Number(button.dataset.node));
      else if (action === 'route-undo') { if (this.route.length > 1) this.route.pop(); this.render(); }
      else if (action === 'route-reset') { this.route = [0]; this.render(); }
      else if (action === 'route-auto') this.applyAutoRoute();
      else if (action === 'commit-route') this.commitRoute();
      else if (action === 'cancel-full-inventory') { this.inventoryWarning = false; this.render(); }
      else if (action === 'open-inventory-from-planner') { this.inventoryWarning = false; this.inventoryWarningBypassed = false; this.planner = null; this.route = [0]; this.tab = 'inventory'; this.render(); }
      else if (action === 'proceed-full-inventory') { this.inventoryWarning = false; this.inventoryWarningBypassed = true; this.commitRoute(true); }
      else if (action === 'combat-pause') { this.combat?.togglePause(); button.textContent = this.combat?.paused ? 'Resume' : 'Pause'; }
      else if (action === 'combat-speed') { const speed = Number(button.dataset.speed); this.combat?.setSpeed(speed); C.setSetting('combatSpeed', speed); button.parentElement?.querySelectorAll('[data-action=\"combat-speed\"]').forEach(entry => entry.classList.toggle('active-speed', entry === button)); }
      else if (action === 'extract-endless') this.handleResult(C.extractEndlessRun());
      else if (action === 'extract-endless-result') { const extracted = C.extractEndlessRun(); this.toast(extracted.message, extracted.ok ? 'good' : 'bad'); if (extracted.ok) { this.result = null; this.tab = 'inventory'; } this.render(); }
      else if (action === 'continue-endless') { this.result = null; this.tab = 'map'; this.selectedRegionIndex = D.REGIONS.findIndex(region => region.id === 'endless'); this.render(); }
      else if (action === 'close-result') { this.result = null; this.selectedItemId = null; this.tab = 'inventory'; this.render(); }
      else if (action === 'run-readiness') { this.releaseReport = releaseDiagnostics(); const area = document.getElementById('diagnosticsText'); if (area) area.value = this.releaseReport; this.toast('Local readiness report created.', 'good'); }
      else if (action === 'apply-update') { if (window.ED_RELEASE?.applyUpdate) window.ED_RELEASE.applyUpdate(); else this.toast('No downloaded update is waiting.', 'bad'); }
      else if (action === 'export-save') this.exportSave();
      else if (action === 'import-save') this.importSave();
      else if (action === 'reset-save') this.resetSave();
    }

    onChange(event) {
      const inventoryControl = event.target.closest('[data-inventory-filter]');
      if (inventoryControl) {
        const key = inventoryControl.dataset.inventoryFilter;
        this.inventoryFilters[key] = inventoryControl.value;
        this.selectedItemId = null;
        this.render();
        return;
      }
      const control = event.target.closest('[data-setting]');
      if (!control) return;
      let value = control.value;
      if (value === 'true') value = true;
      else if (value === 'false') value = false;
      else if (!Number.isNaN(Number(value))) value = Number(value);
      C.setSetting(control.dataset.setting, value);
      document.body.classList.toggle('reduce-motion', Boolean(C.getState().settings.reducedMotion));
      document.body.classList.toggle('high-contrast', Boolean(C.getState().settings.highContrast));
      document.body.classList.toggle('large-text', Boolean(C.getState().settings.largeText));
      document.body.classList.toggle('compact-inventory', Boolean(C.getState().settings.compactInventory));
      if (control.dataset.setting === 'richTooltips' && value === false) this.hideTooltip();
      if (control.dataset.setting === 'language') { this.releaseReport = ''; this.render(); }
      if (['soundtrack', 'musicVolume', 'volume'].includes(control.dataset.setting)) window.ED_APP?.music?.sync?.();
      if (this.combat && control.dataset.setting === 'visualQuality') this.combat.setVisualQuality(value);
    }

    handleResult(result) {
      this.toast(result.message, result.ok ? 'good' : 'bad');
      if (result.ok) { this.selectedItemId = null; this.selectedEquipmentSlot = null; }
      this.render();
    }

    openPlanner(missionId) {
      const missions = C.missionDefinitions(this.selectedRegionIndex);
      const mission = missions.find(entry => entry.id === missionId);
      if (!mission || mission.locked) return;
      const seed = C.hashString(`${mission.id}_${Date.now()}_${C.getState().hero.lifetime.expeditions}`);
      this.contracts = [...(mission.contracts || [])];
      const contracted = C.applyMissionContracts(mission, this.contracts);
      this.planner = { seed, baseMission: mission, dungeon: C.generateDungeon(this.selectedRegionIndex, contracted, seed) };
      this.route = [0];
      this.inventoryWarning = false;
      this.inventoryWarningBypassed = false;
      this.render();
    }

    toggleContract(contractId) {
      if (!this.planner || !D.DIFFICULTY_CONTRACTS[contractId]) return;
      const index = this.contracts.indexOf(contractId);
      if (index >= 0) this.contracts.splice(index, 1);
      else if (this.contracts.length < C.contractLimit(this.planner.baseMission)) this.contracts.push(contractId);
      const mission = C.applyMissionContracts(this.planner.baseMission, this.contracts);
      this.planner.dungeon = C.generateDungeon(this.selectedRegionIndex, mission, this.planner.seed);
      this.route = [0];
      this.inventoryWarning = false;
      this.inventoryWarningBypassed = false;
      this.render();
    }

    addRouteNode(nodeId) {
      if (!this.planner) return;
      if (this.route.includes(nodeId)) {
        if (nodeId === this.route[this.route.length - 1] && this.route.length > 1) this.route.pop();
        this.render();
        return;
      }
      const dungeon = this.planner.dungeon;
      const current = this.route[this.route.length - 1];
      if (!C.adjacentNodes(dungeon, current).includes(nodeId)) return;
      if (this.route.length - 1 >= dungeon.commandPoints) return;
      this.route.push(nodeId);
      this.render();
    }

    applyAutoRoute() {

  class AdaptiveMusicManager {
