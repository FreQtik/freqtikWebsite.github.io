      this.root.addEventListener('input', this.boundInput);
      this.root.addEventListener('pointerover', this.boundPointerOver);
      this.root.addEventListener('pointerout', this.boundPointerOut);
      this.root.addEventListener('pointerdown', this.boundPointerDown);
      this.root.addEventListener('pointermove', this.boundPointerMove);
      this.root.addEventListener('pointerup', this.boundPointerUp);
      this.root.addEventListener('pointercancel', this.boundPointerUp);
      this.root.addEventListener('dragstart', this.boundDragStart);
      this.root.addEventListener('dragover', this.boundDragOver);
      this.root.addEventListener('dragleave', this.boundDragLeave);
      this.root.addEventListener('drop', this.boundDrop);
      this.root.addEventListener('dragend', this.boundDragEnd);
      this.root.addEventListener('focusin', this.boundFocusIn);
      this.root.addEventListener('focusout', this.boundFocusOut);
      this.root.addEventListener('keydown', this.boundKeyDown);
      C.subscribe((_state, reason) => {
        if (!this.combat && reason !== 'setting') this.render();
      });
      this.render();
    }

    toast(message, type = '') {
      const id = C.uid('toast');
      this.toasts.push({ id, message, type });
      this.renderToasts();
      setTimeout(() => {
        this.toasts = this.toasts.filter(toast => toast.id !== id);
        this.renderToasts();
      }, 2600);
    }

    renderToasts() {
      let stack = document.querySelector('.toast-stack');
      if (!stack) {
        stack = document.createElement('div');
        stack.className = 'toast-stack';
        document.body.appendChild(stack);
      }
      stack.innerHTML = this.toasts.map(toast => `<div class="toast ${esc(toast.type)}">${esc(toast.message)}</div>`).join('');
    }

    render() {
      const state = C.getState();
      this.hideTooltip();
      document.body.classList.toggle('reduce-motion', Boolean(state.settings.reducedMotion));
      document.body.classList.toggle('high-contrast', Boolean(state.settings.highContrast));
      document.body.classList.toggle('large-text', Boolean(state.settings.largeText));
      document.body.classList.toggle('compact-inventory', Boolean(state.settings.compactInventory));
      if (this.combat) this.renderCombatShell();
      else this.renderCamp();
      applyLanguage(this.root, state.settings.language);
      this.renderToasts();
    }

    topbar() {
      const state = C.getState();
      const build = C.calculateStats();
      const resource = (iconName, label, value, extra = '', body = '', meta = '') => `<div class="resource-pill ${extra}" ${tooltipAttrs(label, body || `${label}: ${value}`, meta)}>${icon(iconName, 'resource-icon')}<span>${esc(label)}</span><strong>${esc(value)}</strong></div>`;
      return `
        <header class="topbar">
          <a class="skip-link" href="#campContent">Skip to camp content</a>
          <div class="brand"><div class="brand-mark"><span>${icon('runes', 'brand-icon')}</span></div><span>The Endless Dark</span></div>
          <div class="resource-row" aria-label="Hero resources">
            ${resource('gold', 'Gold', number(state.resources.gold), '', 'General currency used by the merchant, item refinement and service costs.', 'Earned from expeditions, loot overflow and selling equipment.')}
            ${resource('renown', 'Renown', number(state.resources.renown), '', 'Permanent camp-progression currency. Spend it in the Camp tab to upgrade the Forge, Merchant, Training Ground and other facilities.', 'Earned from successful expeditions, bosses and Endless Dark extraction.')}
            ${resource('essence', 'Essence', number(state.resources.essence), '', 'Item-crafting material used together with gold to refine equipment in the item-detail panel.', 'Gain it by salvaging equipment and from selected expedition or quest rewards.')}
            ${resource('level', 'Level', String(state.hero.level))}
            ${resource('power', 'Power', number(build.stats.power))}
            ${state.progress.endlessRun?.active ? resource('risk', 'At risk', `${number(state.progress.endlessRun.gold)}g · D${state.progress.endlessRun.depth}`, 'at-risk') : ''}
          </div>
          <div class="top-actions">
            <button class="icon-button" data-action="open-help" aria-label="Open field guide" ${tooltipAttrs('Field guide', 'Review controls, build logic and progression rules.')}>${icon('help')}</button>
            <button class="icon-button" data-action="open-settings" aria-label="Open settings" ${tooltipAttrs('Settings', 'Audio, accessibility, interface and save controls.')}>${icon('settings')}</button>
          </div>
        </header>`;
    }

    renderCamp() {
      const state = C.getState();
      this.root.innerHTML = `
        <div class="app-shell">
          ${this.topbar()}
          <main class="main" id="campContent">
            ${state.meta?.recoveryNotice ? `<div class="recovery-banner" role="status"><div><strong>Save recovery</strong><span>${esc(state.meta.recoveryNotice)}</span></div><button class="button small" data-action="dismiss-recovery">Dismiss</button></div>` : ''}
            <div class="camp-layout">
              <section class="panel hero-column">${this.heroPanel(state)}</section>
              <section class="panel workspace-panel" data-drop-inventory="true">
                <div class="panel-body workspace-body">
                  ${this.navTabs()}
                  ${this.tabContent(state)}
                </div>
              </section>
              <aside class="panel right-column">${this.rightPanel(state)}</aside>
            </div>
          </main>
        </div>
        ${this.modalHtml()}`;
    }

    heroPanel(state) {
      const build = C.calculateStats();
      const rarityRank = ['normal', 'magic', 'rare', 'epic', 'legendary', 'ancient'];
      const equipped = Object.values(state.hero.equipment).filter(Boolean);
      const top = equipped.sort((a, b) => rarityRank.indexOf(b.rarity) - rarityRank.indexOf(a.rarity))[0];
      const palette = {
        normal: ['#53514b', '#9f998d', 'transparent'], magic: ['#40526b', '#81a9df', '#6a9ed7'],
        rare: ['#675d30', '#dfc760', '#d5ad58'], epic: ['#60496d', '#b677d7', '#a66fca'],
        legendary: ['#704526', '#dc8b48', '#df8b46'], ancient: ['#70332f', '#ef7a69', '#ed6e5f']
      }[top?.rarity || 'normal'];
      const cape = state.hero.equipment.cape?.rarity === 'ancient' ? '#6c2928' : state.hero.equipment.cape ? '#443743' : '#312b28';
      const xp = C.xpNeeded(state.hero.level);
      return `
        <div class="panel-header"><div><div class="eyebrow">Persistent hero</div><h2>${esc(state.hero.name)}</h2></div><span class="subtle">${number(state.hero.xp)}/${number(xp)} XP</span></div>
        <div class="panel-body hero-card">
          <div class="hero-stage">
            <div class="paper-hero" style="--gear-main:${palette[0]};--gear-edge:${palette[1]};--aura:${palette[2]};--cape:${cape}">
              <div class="hero-aura"></div><div class="hero-cape"></div><div class="hero-head"></div><div class="hero-helm"></div>
              <div class="hero-torso"></div><div class="hero-belt"></div><div class="hero-arm left"></div><div class="hero-arm right"></div>
              <div class="hero-leg left"></div><div class="hero-leg right"></div><div class="hero-weapon"></div>
            </div>
          </div>
          <div class="slot-grid">
            ${D.SLOTS.map(([slot, label]) => {
              const unlocked = C.isSlotUnlocked(slot);
              const item = state.hero.equipment[slot];
              const tipTitle = unlocked ? `${label}${item ? ` · ${item.name}` : ''}` : `${label} · Locked`;
              const tipBody = item ? '' : unlocked ? 'No item equipped in this slot.' : `Unlocks at hero level ${D.SLOT_UNLOCK_LEVEL[slot]}.`;
              return `<button class="equip-slot ${item ? rarityClass(item) : ''} ${item?.setId ? 'set-piece' : ''}" data-action="select-equipment" data-slot="${slot}" data-drop-slot="${slot}" ${item ? `draggable="true" data-drag-equipped="${slot}"` : ''} ${unlocked ? '' : 'aria-disabled="true"'} aria-label="${esc(tipTitle)}" ${item ? itemTooltipAttrs(item, 'equipped') : tooltipAttrs(tipTitle, tipBody, unlocked ? 'Drop a compatible item here' : '')}>
                <span class="slot-icon">${item ? itemArtSvg(item, 'slot-item-art') : icon(slotIconKey(slot))}</span>
                <span class="slot-copy"><span class="slot-name">${esc(label)}${unlocked ? '' : ` · L${D.SLOT_UNLOCK_LEVEL[slot]}`}</span>
                <span class="slot-item ${item ? (item.setId ? 'set-name' : rarityClass(item)) : 'subtle'}">${item ? esc(item.name) : unlocked ? 'Drop item' : 'Locked'}</span></span>
                ${item ? '<span class="slot-drag-hint" aria-hidden="true">⋮⋮</span>' : ''}
              </button>`;
            }).join('')}
          </div>
          <div class="stats-grid">
            <div class="stat-tile icon-stat">${icon('health')}<span>Health</span><strong>${number(build.stats.maxHealth)}</strong></div>
            <div class="stat-tile icon-stat">${icon('damage')}<span>Damage</span><strong>${number(build.stats.minDamage)}–${number(build.stats.maxDamage)}</strong></div>
            <div class="stat-tile icon-stat">${icon('speed')}<span>Attack speed</span><strong>${build.stats.attackSpeed.toFixed(2)}/s</strong></div>
            <div class="stat-tile icon-stat">${icon('command')}<span>Command</span><strong>${build.stats.commandPoints}</strong></div>
          </div>
        </div>`;
    }

    navTabs() {
      const tabs = [['map', 'Map', 'map'], ['inventory', 'Inventory', 'inventory'], ['skills', 'Skills', 'skills'], ['camp', 'Camp', 'camp'], ['journal', 'Journal', 'journal'], ['shop', 'Merchant', 'shop'], ['runes', 'Runes', 'runes']];
      const unspent = Math.max(0, Number(C.getState().hero.skillPoints || 0));
      return `<nav class="nav-tabs" role="tablist" aria-label="Camp sections">${tabs.map(([id, label, iconName]) => {
        const skillAlert = id === 'skills' && unspent > 0;
        const tooltipBody = skillAlert ? `You have ${unspent} unspent skill point${unspent === 1 ? '' : 's'}. Open Skills to allocate them.` : `Open the ${label.toLowerCase()} section.`;
        return `<button class="nav-tab ${this.tab === id ? 'active' : ''} ${skillAlert ? 'skill-points-attention' : ''}" role="tab" aria-selected="${this.tab === id}" data-action="tab" data-tab="${id}" ${tooltipAttrs(label, tooltipBody, skillAlert ? `${unspent} unspent` : '')}>${icon(iconName, 'nav-icon')}<span>${label}</span>${skillAlert ? `<strong class="skill-point-badge" aria-label="${unspent} unspent skill points">${unspent}</strong>` : ''}</button>`;
      }).join('')}</nav>`;
    }

    tabContent(state) {
      if (this.tab === 'inventory') return this.inventoryTab(state);
      if (this.tab === 'skills') return this.skillsTab(state);
      if (this.tab === 'camp') return this.campTab(state);
      if (this.tab === 'journal') return this.journalTab(state);
      if (this.tab === 'shop') return this.shopTab(state);
      if (this.tab === 'runes') return this.runesTab(state);
      return this.mapTab(state);
    }

    mapTab(state) {
      const regionIndex = Math.min(this.selectedRegionIndex, state.progress.unlockedRegion);
      const region = D.REGIONS[regionIndex];
      const missions = C.missionDefinitions(regionIndex);
      const endlessRun = state.progress.endlessRun;
      const chapter = D.CAMPAIGN_CHAPTERS.find(entry => entry.regionId === region.id);
      const lootIdentity = D.REGIONAL_LOOT[region.id];
      const hunts = Object.entries(D.NAMED_ELITES).filter(([, elite]) => elite.regionId === region.id);
      const mountainProgress = Number(state.progress.mountainSequence || 0);
      return `
        <div class="panel-header" style="margin:-14px -14px 14px"><div><div class="eyebrow">Expedition map</div><h2>${esc(region.name)}</h2></div><span class="subtle">Plan before committing</span></div>
        <div class="region-strip">
          ${D.REGIONS.map((entry, index) => {
            const locked = index > state.progress.unlockedRegion;
            return `<button class="region-card ${index === regionIndex ? 'active' : ''} ${locked ? 'locked' : ''}" data-action="select-region" data-region="${index}" ${locked ? 'disabled' : ''}>
              <strong>${locked ? '◇ ' : ''}${esc(entry.name)}</strong><span>${locked ? 'Complete the previous campaign gate' : esc(entry.subtitle)}</span>
            </button>`;
          }).join('')}
        </div>
        ${chapter ? `<section class="campaign-callout"><div><div class="eyebrow">Campaign chapter</div><h3>${esc(chapter.title)}</h3><p>${esc(chapter.text)}</p></div>${region.id === 'mountains' ? `<div class="mountain-progress"><strong>${mountainProgress}/${D.MOUNTAIN_CAMPAIGN.length}</strong><span>ascent gates cleared</span></div>` : ''}</section>` : ''}
        <div class="region-pressure"><div><div class="eyebrow">Regional pressure · ${esc(D.REGION_RULES[region.id].name)}</div><strong>${esc(D.REGION_RULES[region.id].pressure)}</strong></div><span>${esc(D.REGION_RULES[region.id].navigation)}</span></div>
        ${lootIdentity ? `<section class="regional-loot-card"><div><div class="eyebrow">Regional loot identity · ${esc(lootIdentity.name)}</div><strong>${esc(lootIdentity.text)}</strong><span>Favoured slots: ${lootIdentity.slots.map(slotLabel).join(' · ')}</span></div><div class="hunt-chips">${hunts.map(([id, elite]) => `<span class="hunt-chip ${state.progress.namedEliteClears[id] ? 'cleared' : ''}">${esc(elite.icon)} ${esc(elite.name)}${state.progress.namedEliteClears[id] ? ` · ×${state.progress.namedEliteClears[id]}` : ''}</span>`).join('')}</div></section>` : ''}
        ${region.id === 'endless' && endlessRun?.active ? `<div class="endless-haul"><div><div class="eyebrow">Unextracted haul · Depth ${endlessRun.depth}</div><strong>${number(endlessRun.gold)} gold · ${number(endlessRun.xp)} XP · ${endlessRun.loot.length} items</strong><span>Continue deeper to multiply the opportunity, or extract now. Failure keeps only a small consolation.</span></div><button class="button primary" data-action="extract-endless">Extract safely</button></div>` : ''}
        <div class="mission-grid">
          ${missions.map(mission => {
            const status = mission.locked ? 'Locked' : mission.completed ? 'Cleared' : mission.namedHunt ? 'Named hunt' : mission.campaignStage ? `Ascent ${mission.campaignStage}` : (D.MISSION_OBJECTIVES[mission.objectiveType]?.name || mission.difficulty);
            const target = mission.forcedNamedEliteId ? D.NAMED_ELITES[mission.forcedNamedEliteId] : mission.forcedBossId ? D.BOSSES[mission.forcedBossId] : null;
            return `<article class="mission-card ${mission.locked ? 'locked' : ''} ${mission.completed ? 'completed' : ''}">${mission.completed ? `<span class="mission-solved-badge">${icon('check')} Solved</span>` : ''}
              <span class="difficulty">${esc(status)}</span>
              <h3>${esc(mission.name)}</h3>
              <div class="subtle">${esc(mission.description)}</div>
              ${target ? `<div class="mission-target"><strong>${icon('target', 'inline-icon')} ${esc(target.name)}</strong><span>${esc(target.text || target.mechanicText || '')}</span></div>` : `<div class="mission-target objective"><strong>${icon(objectiveIconKey(mission.objectiveType), 'inline-icon')} ${esc(D.MISSION_OBJECTIVES[mission.objectiveType]?.name || 'Route clear')}</strong><span>${esc(D.MISSION_OBJECTIVES[mission.objectiveType]?.text || '')}</span></div>`}
              <div class="stat-line"><span>Threat</span><strong>${mission.threat.toFixed(2)}×</strong></div>
              <div class="stat-line"><span>Reward</span><strong>${mission.reward.toFixed(2)}×</strong></div>
              <div class="stat-line"><span>Contract slots</span><strong>${mission.contractLimit}</strong></div>
              <div class="stat-line"><span>Recommended power</span><strong>${number(85 + mission.level * 54)}</strong></div>
              ${mission.endlessModifiers?.length ? `<div class="modifier-chips">${mission.endlessModifiers.map(id => `<span class="modifier-chip">${esc(D.ENDLESS_MODIFIERS[id].icon)} ${esc(D.ENDLESS_MODIFIERS[id].name)}</span>`).join('')}</div>` : ''}
              <button class="button ${mission.locked ? '' : 'primary'}" data-action="plan-mission" data-mission="${esc(mission.id)}" ${mission.locked ? 'disabled' : ''}>${mission.locked ? 'Clear previous ascent' : mission.completed ? 'Replay expedition' : 'Plan route'}</button>
            </article>`;
          }).join('')}
        </div>`;
    }

    inventoryItems(state) {
      const filter = this.inventoryFilters;
      const rarityRank = ['normal', 'magic', 'rare', 'epic', 'legendary', 'ancient'];
      const query = filter.query.trim().toLowerCase();
      const items = state.hero.inventory.filter(item => {
        const searchable = [item.name, slotLabel(item.slot), item.rarity, item.legendary?.name, item.runeword?.name, item.setId ? D.SETS[item.setId]?.name : '', item.regionalImprint?.name].filter(Boolean).join(' ').toLowerCase();
        return (!query || searchable.includes(query))
          && (filter.slot === 'all' || item.slot === filter.slot || (filter.slot === 'ring' && ['ring1', 'ring2'].includes(item.slot)))
          && (filter.rarity === 'all' || item.rarity === filter.rarity);
      });
      const sorter = {
        'power-desc': (a, b) => C.itemScore(b) - C.itemScore(a),
        'power-asc': (a, b) => C.itemScore(a) - C.itemScore(b),
        'level-desc': (a, b) => b.level - a.level || C.itemScore(b) - C.itemScore(a),
        'rarity-desc': (a, b) => rarityRank.indexOf(b.rarity) - rarityRank.indexOf(a.rarity) || C.itemScore(b) - C.itemScore(a),
        'slot-asc': (a, b) => slotLabel(a.slot).localeCompare(slotLabel(b.slot)) || C.itemScore(b) - C.itemScore(a),
        'name-asc': (a, b) => a.name.localeCompare(b.name)
      }[filter.sort] || ((a, b) => C.itemScore(b) - C.itemScore(a));
      return [...items].sort(sorter);
    }

    inventoryTab(state) {
      const capacity = C.inventoryCapacity();
      const items = this.inventoryItems(state);
      const total = state.hero.inventory.length;
      const activeFilters = Boolean(this.inventoryFilters.query || this.inventoryFilters.slot !== 'all' || this.inventoryFilters.rarity !== 'all' || this.inventoryFilters.sort !== 'power-desc');
      const trashPreview = C.bulkSellPreview('trash');
      const worsePreview = C.bulkSellPreview('worse');
      const allPreview = C.bulkSellPreview('all');
      return `
        <div class="inventory-toolbar"><div><div class="eyebrow">Stash inventory</div><strong>${total}/${capacity} slots · ${number(state.resources.essence)} essence</strong></div><div class="subtle">${items.length === total ? 'Drag to equip, inspect, compare, refine or salvage equipment.' : `${items.length} of ${total} items match the current view.`}</div></div>
        <section class="inventory-cleanup" aria-label="Inventory cleanup actions">
          <div><div class="eyebrow">Quick cleanup</div><span>Set, runeword, legendary-effect and Ancient items are protected by Sell Trash and Sell Worse.</span></div>
          <div class="inventory-cleanup-actions">
            <button class="button small cleanup-trash" data-action="bulk-sell" data-mode="trash" ${trashPreview.count ? '' : 'disabled'} ${tooltipAttrs('Sell Trash', `Sell all grey Normal items that are not special build pieces.`, `${trashPreview.count} items · ${trashPreview.gold} gold`)}>${icon('gold', 'button-icon')} Sell Trash · ${trashPreview.count}</button>
            <button class="button small" data-action="bulk-sell" data-mode="worse" ${worsePreview.count ? '' : 'disabled'} ${tooltipAttrs('Sell Worse', 'Sell unprotected inventory items with lower power than the item equipped in the same slot.', `${worsePreview.count} items · ${worsePreview.gold} gold`)}>${icon('compare', 'button-icon')} Sell Worse · ${worsePreview.count}</button>
            <button class="button small danger" data-action="bulk-sell" data-mode="all" ${allPreview.count ? '' : 'disabled'} ${tooltipAttrs('Sell All Unequipped', 'Sell every item currently in the stash, including set and unique build pieces. A confirmation is required.', `${allPreview.count} items · ${allPreview.gold} gold`)}>${icon('inventory', 'button-icon')} Sell All Unequipped · ${allPreview.count}</button>
          </div>
        </section>
        <section class="inventory-controls" aria-label="Inventory filters">
          <label class="inventory-search"><span>${icon('search')}</span><input type="search" value="${esc(this.inventoryFilters.query)}" placeholder="Search items, sets or effects" data-inventory-filter="query" aria-label="Search inventory"></label>
          <label><span>Slot</span><select data-inventory-filter="slot"><option value="all">All slots</option><option value="ring" ${this.inventoryFilters.slot === 'ring' ? 'selected' : ''}>Both rings</option>${D.SLOTS.filter(([slot]) => !['ring1','ring2'].includes(slot)).map(([slot,label]) => `<option value="${slot}" ${this.inventoryFilters.slot === slot ? 'selected' : ''}>${esc(label)}</option>`).join('')}</select></label>
          <label><span>Rarity</span><select data-inventory-filter="rarity"><option value="all">All rarities</option>${Object.entries(D.RARITIES).map(([id, rarity]) => `<option value="${id}" ${this.inventoryFilters.rarity === id ? 'selected' : ''}>${esc(rarity.label)}</option>`).join('')}</select></label>
          <label><span>Sort</span><select data-inventory-filter="sort"><option value="power-desc" ${this.inventoryFilters.sort === 'power-desc' ? 'selected' : ''}>Power: high first</option><option value="power-asc" ${this.inventoryFilters.sort === 'power-asc' ? 'selected' : ''}>Power: low first</option><option value="level-desc" ${this.inventoryFilters.sort === 'level-desc' ? 'selected' : ''}>Item level</option><option value="rarity-desc" ${this.inventoryFilters.sort === 'rarity-desc' ? 'selected' : ''}>Rarity</option><option value="slot-asc" ${this.inventoryFilters.sort === 'slot-asc' ? 'selected' : ''}>Slot</option><option value="name-asc" ${this.inventoryFilters.sort === 'name-asc' ? 'selected' : ''}>Name</option></select></label>
          <button class="button small" data-action="clear-inventory-filters" ${activeFilters ? '' : 'disabled'}>${icon('filter', 'button-icon')} Clear</button>
        </section>
        <div class="inventory-result-line" aria-live="polite"><span>${icon('sort')} Showing ${items.length} item${items.length === 1 ? '' : 's'}</span><span>Drag cards onto matching equipment slots. Cards show power versus equipped gear.</span></div>
        <div class="inventory-grid">
          ${items.length ? items.map(item => this.itemCard(item, this.selectedItemId === item.id)).join('') : '<div class="empty-state inventory-empty">No equipment matches these filters.</div>'}
          ${!activeFilters ? Array.from({ length: Math.max(0, capacity - total) }, () => '<div class="item-card empty" aria-hidden="true"></div>').join('') : ''}
        </div>`;
    }

    itemTooltipBody(item) {
      const effective = C.effectiveItemStats(item);
      const stats = Object.entries(effective).slice(0, 4).map(([stat, value]) => `${D.STAT_LABELS[stat] || stat}: ${this.formatItemStat(stat, value, true)}`);
      if (item.legendary) stats.push(item.legendary.text);
      if (item.runeword) stats.push(item.runeword.text);
      if (item.setId) stats.push(`${D.SETS[item.setId].name} set piece`);
      return stats.join(' · ') || `${D.RARITIES[item.rarity]?.label || item.rarity} ${slotLabel(item.slot)}`;
    }

    formatItemStat(stat, value, signed = false) {
      const numeric = Number(value || 0);
      const percentStats = new Set(['attackSpeed', 'moveSpeed', 'critChance', 'critDamage', 'lifesteal', 'blockChance', 'dodgeChance', 'abilityPower', 'goldFind', 'hazardResist', 'potionPower', 'runeFind', 'recipeFind', 'restockDiscount']);
      const sign = signed && numeric > 0 ? '+' : '';
      if (percentStats.has(stat)) return `${sign}${(numeric * 100).toFixed(Math.abs(numeric * 100) < 10 ? 1 : 0)}%`;
      if (Math.abs(numeric) < 1 && numeric !== 0) return `${sign}${numeric.toFixed(2)}`;
      return `${sign}${number(numeric)}`;
    }

    findTooltipItem(itemId) {
      const state = C.getState();
      const pools = [
        state.hero.inventory,
        Object.values(state.hero.equipment || {}),
        state.shop.items,
        state.progress.endlessRun?.loot,
        this.result?.loot,
        this.result?.applied?.acceptedLoot
      ];
      for (const pool of pools) {
        const item = Array.isArray(pool) ? pool.find(entry => entry?.id === itemId) : null;
        if (item) return item;
      }
      return null;
    }

    itemComparison(item) {
      const state = C.getState();
      const equipped = state.hero.equipment[item.slot] || null;
      const candidatePower = C.itemScore(item);
      const equippedPower = equipped ? C.itemScore(equipped) : 0;
      const delta = equipped?.id === item.id ? 0 : candidatePower - equippedPower;
      return { equipped, candidatePower, equippedPower, delta, isEquipped: equipped?.id === item.id };
    }

    itemTooltipHtml(item, context = '') {
      const comparison = this.itemComparison(item);
      const candidate = C.effectiveItemStats(item);
      const equippedStats = comparison.equipped && !comparison.isEquipped ? C.effectiveItemStats(comparison.equipped) : {};
      const keys = [...new Set([...Object.keys(candidate), ...Object.keys(equippedStats)])];
      const rarity = D.RARITIES[item.rarity]?.label || item.rarity;
      const titleClass = item.setId ? 'set-name' : rarityClass(item);
      const statRows = Object.entries(candidate).map(([stat, value]) => `<div class="wow-item-stat"><span>${esc(this.formatItemStat(stat, value, true))} ${esc(D.STAT_LABELS[stat] || stat)}</span></div>`).join('');
      const changes = keys.map(stat => {
        const delta = Number(candidate[stat] || 0) - Number(equippedStats[stat] || 0);
        if (Math.abs(delta) < .0005) return '';
        const cls = delta > 0 ? 'gain' : 'loss';
        const arrow = delta > 0 ? '▲' : '▼';
        return `<div class="wow-compare-row ${cls}"><span>${arrow} ${esc(D.STAT_LABELS[stat] || stat)}</span><strong>${esc(this.formatItemStat(stat, delta, true))}</strong></div>`;
      }).filter(Boolean).join('');
      const powerClass = comparison.delta > 0 ? 'gain' : comparison.delta < 0 ? 'loss' : 'neutral';
      const compareLabel = comparison.isEquipped ? 'Currently equipped' : comparison.equipped ? `Compared with ${comparison.equipped.name}` : 'Compared with empty slot';
      const powerText = comparison.isEquipped ? 'Equipped' : `${comparison.delta > 0 ? '+' : ''}${number(comparison.delta)} item power`;
      const special = [
        item.legendary ? `<div class="wow-special legendary">${esc(item.legendary.name || 'Legendary effect')}: ${esc(item.legendary.text)}</div>` : '',
        item.runeword ? `<div class="wow-special runeword">${esc(item.runeword.name)}: ${esc(item.runeword.text)}</div>` : '',
        item.setId ? `<div class="wow-special set">Set: ${esc(D.SETS[item.setId]?.name || item.setId)}${D.SETS[item.setId]?.bonuses ? ` · ${esc(Object.values(D.SETS[item.setId].bonuses).map(entry => entry.text).join(' · '))}` : ''}</div>` : '',
        item.regionalImprint ? `<div class="wow-special imprint">${esc(item.regionalImprint.name)}: ${esc(item.regionalImprint.text || 'Regional imprint')}</div>` : ''
      ].filter(Boolean).join('');
      const locked = !C.isSlotUnlocked(item.slot) ? `<div class="wow-requirement">Requires hero level ${D.SLOT_UNLOCK_LEVEL[item.slot]} to unlock ${esc(slotLabel(item.slot))}.</div>` : '';
      const value = item.price ? `Merchant price: ${number(item.price)} gold` : `Sell value: ${number(item.sellValue || 0)} gold`;
      return `<div class="wow-tooltip-header"><strong class="${titleClass}">${esc(item.name)}</strong><span>Item Level ${number(item.level)}</span></div>
        <div class="wow-tooltip-type"><span>${esc(slotLabel(item.slot))}</span><span>${esc(rarity)}</span></div>
        <div class="wow-tooltip-power"><span>Item Power</span><strong>${number(comparison.candidatePower)}</strong></div>
        ${statRows ? `<div class="wow-tooltip-stats">${statRows}</div>` : ''}
        ${special}
        ${locked}
        <div class="wow-tooltip-divider"></div>
        <div class="wow-compare-heading"><span>${esc(compareLabel)}</span><strong class="${powerClass}">${esc(powerText)}</strong></div>
        ${!comparison.isEquipped && changes ? `<div class="wow-compare-list">${changes}</div>` : `<div class="wow-compare-empty">${comparison.isEquipped ? 'This is the item currently supplying this slot.' : 'No individual stat changes.'}</div>`}
        <div class="wow-tooltip-footer"><span>${esc(value)}</span><span>${esc(context === 'merchant' ? 'Merchant stock' : item.source || 'Equipment')}</span></div>`;
    }

    itemCard(item, selected = false, options = {}) {
      const current = C.getState().hero.equipment[item.slot];
      const score = C.itemScore(item);
      const delta = current && current.id !== item.id ? score - C.itemScore(current) : null;
      const slotUnlocked = C.isSlotUnlocked(item.slot);
      const clickable = options.clickable !== false;
      const tag = clickable ? 'button' : 'article';
      const action = clickable ? `data-action="select-item" data-item="${item.id}"${slotUnlocked ? ` data-drag-item="${item.id}" draggable="true"` : ''}` : '';
      const compareText = delta === null ? (current?.id === item.id ? 'Equipped' : 'Empty slot') : `${delta > 0 ? '+' : ''}${number(delta)}`;
      const lockText = slotUnlocked ? '' : `Unlocks at hero level ${D.SLOT_UNLOCK_LEVEL[item.slot]}.`;
      const aria = `${item.name}, ${D.RARITIES[item.rarity]?.label || item.rarity} ${slotLabel(item.slot)}, power ${number(score)}, ${compareText}${lockText ? `, ${lockText}` : ''}`;
      const band = D.PROGRESSION_BANDS.find(entry => entry.id === item.bandId)?.name || 'Initiate';
      return `<${tag} class="item-card ${selected ? 'selected' : ''} ${rarityClass(item)} ${item.setId ? 'set-piece' : ''} ${slotUnlocked ? '' : 'locked-slot-item'}" ${action} aria-label="${esc(aria)}" ${itemTooltipAttrs(item, options.tooltipContext || 'inventory')}>
        <span class="rarity-rail" aria-hidden="true"></span>
        <span class="item-level">L${item.level}${item.refinement ? ` · +${item.refinement}` : ''}</span>
        ${slotUnlocked ? '<span class="drag-grip" aria-hidden="true">⋮⋮</span>' : `<span class="locked-item-badge">${icon('lock')} Unlocks L${D.SLOT_UNLOCK_LEVEL[item.slot]}</span>`}
        <span class="item-visual">${itemArtSvg(item)}</span>
        <span class="item-name ${item.setId ? 'set-name' : rarityClass(item)}">${esc(item.name)}</span>
        <span class="item-meta"><span>${esc(slotLabel(item.slot))}</span><span>${esc(band)}</span></span>
        <span class="item-power">${icon('power')} ${number(score)}</span>
        <span class="item-compare ${delta === null ? 'neutral' : delta > 0 ? 'up' : delta < 0 ? 'down' : 'neutral'}">${compareText}</span>
        ${item.setId ? `<span class="set-chip">${esc(D.SETS[item.setId]?.name || 'Set')}</span>` : item.regionalImprint ? `<span class="imprint-badge">${esc(item.regionalImprint.name)}</span>` : ''}
      </${tag}>`;
    }

    skillsTab(state) {
      const available = C.availableAbilities();
      const selectedId = D.SKILL_BRANCHES[this.skillBranch] ? this.skillBranch : Object.keys(D.SKILL_BRANCHES)[0];
      const branch = D.SKILL_BRANCHES[selectedId];
      const analysis = C.analyzeBuild();
      const refund = C.allocatedSkillPoints(state);
      return `
        <div class="skill-workspace">
          <div class="inventory-toolbar"><div><div class="eyebrow">Skill tree</div><strong>${state.hero.skillPoints} points available · ${state.hero.ownedSkills.length}/${Object.values(D.SKILL_BRANCHES).reduce((sum, entry) => sum + entry.nodes.length, 0)} learned</strong></div><div class="skill-toolbar-actions"><span class="subtle">Choose one branch at a time. Nothing is hidden beyond the right edge.</span><button class="button small" data-action="respec-skills" ${refund ? '' : 'disabled'} ${tooltipAttrs('Respec Skills', refund ? `Refund all ${refund} allocated skill points and rebuild the Wayfarer.` : 'No allocated skill points to refund.', 'Equipped abilities that are no longer unlocked will be removed safely.')}>Respec Skills · ${refund}</button></div></div>
          <nav class="skill-branch-tabs" role="tablist" aria-label="Skill branches">
            ${Object.entries(D.SKILL_BRANCHES).map(([branchId, entry]) => {
              const owned = entry.nodes.filter(node => state.hero.ownedSkills.includes(node.id)).length;
              return `<button class="skill-branch-tab ${branchId === selectedId ? 'active' : ''}" role="tab" aria-selected="${branchId === selectedId}" data-action="select-skill-branch" data-branch="${branchId}" style="--branch:${entry.color}" ${tooltipAttrs(entry.name, `Open this discipline. ${owned} of ${entry.nodes.length} nodes learned.`)}><span class="skill-tab-icon">${icon('skills')}</span><strong>${esc(entry.name)}</strong><span>${owned}/${entry.nodes.length}</span></button>`;
            }).join('')}
          </nav>
          <div class="skill-layout">
            <section class="skill-branch-focus" style="--branch:${branch.color}">
              <div class="skill-branch-heading"><div><div class="eyebrow">${esc(branch.name)} discipline</div><h3>${esc(D.BUILD_ARCHETYPES[Object.keys(D.BUILD_ARCHETYPES).find(id => D.BUILD_ARCHETYPES[id].branch === selectedId)]?.name || branch.name)}</h3></div><span>${branch.nodes.length} nodes</span></div>
              <div class="skill-node-grid">
                ${branch.nodes.map((node, index) => {
                  const owned = state.hero.ownedSkills.includes(node.id);
                  const locked = node.requires && !state.hero.ownedSkills.includes(node.requires);
                  const ability = node.unlockAbility ? D.ABILITIES[node.unlockAbility] : null;
                  return `<button class="skill-node ${owned ? 'owned' : ''} ${locked ? 'locked' : ''}" data-action="buy-skill" data-skill="${node.id}" ${owned || locked ? 'aria-disabled="true"' : ''} ${tooltipAttrs(node.name, node.text, owned ? 'Learned' : locked ? 'Requires the previous node' : `${node.cost} skill point${node.cost === 1 ? '' : 's'}`)}>
                    <span class="skill-tier">${String(index + 1).padStart(2, '0')}</span>
                    <span class="skill-node-icon">${icon(ability ? abilityIconKey(ability) : node.proc ? 'power' : 'skills')}</span>
                    <strong>${owned ? '✓ ' : ''}${esc(node.name)}</strong>
                    <small>${esc(node.text)}</small>
                    <span class="skill-cost">${owned ? 'Learned' : `${node.cost} point${node.cost === 1 ? '' : 's'}`}</span>
                  </button>`;
                }).join('')}
              </div>
            </section>
            <aside class="ability-library">
              <div class="eyebrow">Equipped abilities</div>
              <div class="ability-slots">${Array.from({ length: 4 }, (_, index) => {
                const id = state.hero.equippedAbilities[index];
                return `<div class="ability-slot" ${id ? tooltipAttrs(D.ABILITIES[id].name, D.ABILITIES[id].text, `Cooldown ${D.ABILITIES[id].cooldown}s`) : ''}>${id ? `<span class="ability-slot-icon">${icon(abilityIconKey(D.ABILITIES[id]))}</span><strong>${esc(D.ABILITIES[id].name)}</strong><div class="subtle">${esc(D.ABILITIES[id].text)}</div>` : '<span class="subtle">Empty slot</span>'}</div>`;
              }).join('')}</div>
              <div class="eyebrow">Ability library</div>
              <div class="ability-card-list">${available.map(id => {
                const ability = D.ABILITIES[id];
                const equipped = state.hero.equippedAbilities.includes(id);
                return `<button class="ability-card ${equipped ? 'equipped' : ''}" data-action="toggle-ability" data-ability="${id}" ${tooltipAttrs(ability.name, ability.text, `Cooldown ${ability.cooldown}s · ${equipped ? 'Equipped' : 'Available'}`)}><span class="ability-card-icon">${icon(abilityIconKey(ability))}</span><span><strong>${esc(ability.name)}</strong><small>${esc(ability.text)}</small></span></button>`;
              }).join('')}</div>
            </aside>
          </div>
          <section class="build-identity-strip">
            <div><div class="eyebrow">Current build identity</div><strong>${esc(analysis.primary?.name || 'Unformed build')}</strong><span>${esc(analysis.primary?.text || 'Equip and skill toward a coherent engine.')}</span></div>
            <div class="identity-bars">${analysis.archetypes.slice(0, 3).map(entry => `<div><span>${esc(entry.name)}</span><div class="identity-track"><i style="width:${Math.max(4, entry.share * 100)}%"></i></div><strong>${Math.round(entry.share * 100)}%</strong></div>`).join('')}</div>
          </section>
        </div>`;
    }

    campTab(state) {
      const build = C.calculateStats();
      const totalRanks = Object.keys(D.CAMP_UPGRADES).reduce((sum, id) => sum + C.getCampUpgradeRank(id), 0);
      const maximumRanks = Object.values(D.CAMP_UPGRADES).reduce((sum, upgrade) => sum + upgrade.maxRank, 0);
      const quests = C.availableCampQuests();
      const ready = quests.filter(quest => quest.state.complete && !quest.state.claimed).length;
      return `
        <div class="inventory-toolbar"><div><div class="eyebrow">Permanent camp progression</div><strong>${totalRanks}/${maximumRanks} upgrade ranks</strong></div><div class="subtle">Renown primarily expands strategic options and preparation quality.</div></div>
        <div class="camp-summary">
          <div class="stat-tile"><span>Renown available</span><strong>${number(state.resources.renown)}</strong></div>
          <div class="stat-tile"><span>Forge essence</span><strong>${number(state.resources.essence)}</strong></div>
          <div class="stat-tile"><span>Inventory</span><strong>${C.inventoryCapacity()} slots</strong></div>
          <div class="stat-tile"><span>Merchant offers</span><strong>${number(6 + build.stats.shopSlots)}</strong></div>
          <div class="stat-tile"><span>Quest rewards ready</span><strong>${ready}</strong></div>
        </div>
        <div class="camp-upgrade-grid">${Object.entries(D.CAMP_UPGRADES).map(([id, upgrade]) => {
          const rank = C.getCampUpgradeRank(id);
          const complete = rank >= upgrade.maxRank;
          const cost = complete ? 0 : upgrade.costs[rank];
          return `<article class="camp-upgrade ${complete ? 'complete' : ''}">
            <div class="upgrade-heading"><span>${upgrade.icon}</span><div><div class="eyebrow">Rank ${rank}/${upgrade.maxRank}</div><h3>${esc(upgrade.name)}</h3></div></div>
            <p>${esc(upgrade.text)}</p>
            <div class="upgrade-ranks">${upgrade.rankText.map((text, index) => `<div class="${index < rank ? 'owned' : index === rank ? 'next' : ''}"><span>${index < rank ? '✓' : index === rank ? '→' : '○'}</span><span>${esc(text)}</span></div>`).join('')}</div>
            <button class="button ${!complete && state.resources.renown >= cost ? 'primary' : ''}" data-action="buy-camp-upgrade" data-upgrade="${id}" ${complete || state.resources.renown < cost ? 'disabled' : ''}>${complete ? 'Fully upgraded' : `Upgrade · ${cost} renown`}</button>
          </article>`;
        }).join('')}</div>
        <div class="divider"></div>
        <div class="inventory-toolbar"><div><div class="eyebrow">Camp quest ledger</div><strong>${quests.filter(quest => quest.state.claimed).length}/${quests.length} claimed</strong></div><div class="subtle">Authored objectives connect regional hunts, loot and campaign progress.</div></div>
        <div class="quest-grid">${quests.map(quest => {
          const progress = Math.min(quest.target, quest.state.progress);
          const percentage = Math.max(0, Math.min(100, progress / quest.target * 100));
          return `<article class="quest-card ${quest.state.claimed ? 'claimed' : quest.state.complete ? 'ready' : ''}">
            <div class="quest-heading"><div><div class="eyebrow">${esc(D.REGIONS.find(region => region.id === quest.regionId)?.name || quest.regionId)}</div><h3>${esc(quest.name)}</h3></div><strong>${progress}/${quest.target}</strong></div>
            <p>${esc(quest.text)}</p>
            <div class="quest-progress"><span style="width:${percentage}%"></span></div>
            <div class="quest-reward"><span>Reward</span><strong>${esc(questRewardText(quest.reward))}</strong></div>
            <button class="button ${quest.state.complete && !quest.state.claimed ? 'primary' : ''}" data-action="claim-quest" data-quest="${quest.id}" ${quest.state.complete && !quest.state.claimed ? '' : 'disabled'}>${quest.state.claimed ? 'Reward claimed' : quest.state.complete ? 'Claim reward' : 'In progress'}</button>
          </article>`;
        }).join('')}</div>`;
    }

    journalTab(state) {
      const unlocked = Math.min(D.REGIONS.length - 1, state.progress.unlockedRegion);
      const chapters = D.CAMPAIGN_CHAPTERS.map((chapter, index) => ({ ...chapter, index, unlocked: index <= unlocked }));
      const elites = Object.entries(D.NAMED_ELITES).filter(([, elite]) => D.REGIONS.findIndex(region => region.id === elite.regionId) <= unlocked);
      const totalClears = Object.values(state.progress.namedEliteClears || {}).reduce((sum, value) => sum + Number(value || 0), 0);
      const achievements = Object.entries(D.ACHIEVEMENTS);
      const challenges = Object.entries(D.CHALLENGES);
      return `
        <div class="inventory-toolbar"><div><div class="eyebrow">Wayfarer journal</div><strong>${unlocked + 1}/${D.REGIONS.length} chapters reached</strong></div><div class="subtle">The campaign records what the build has proven, not merely what the player has seen.</div></div>
        <div class="journal-summary">
          <div class="stat-tile"><span>Named elite victories</span><strong>${number(totalClears)}</strong></div>
          <div class="stat-tile"><span>Regional relics found</span><strong>${number(Object.values(state.progress.regionalFinds || {}).reduce((a,b)=>a+Number(b||0),0))}</strong></div>
          <div class="stat-tile"><span>Mountain ascent</span><strong>${number(state.progress.mountainSequence || 0)}/${D.MOUNTAIN_CAMPAIGN.length}</strong></div>
          <div class="stat-tile"><span>Deepest descent</span><strong>${number(state.progress.endlessDepth || 0)}</strong></div>
          <div class="stat-tile"><span>Achievements</span><strong>${achievements.filter(([id]) => state.progress.achievements?.[id]?.unlockedAt).length}/${achievements.length}</strong></div>
          <div class="stat-tile"><span>Challenges</span><strong>${challenges.filter(([id]) => C.challengeState(id).complete).length}/${challenges.length}</strong></div>
        </div>
        <div class="journal-grid">${chapters.map(chapter => `<article class="chapter-card ${chapter.unlocked ? '' : 'locked'}"><div class="eyebrow">${chapter.unlocked ? esc(D.REGIONS[chapter.index].name) : 'Unreached chapter'}</div><h3>${chapter.unlocked ? esc(chapter.title) : 'Sealed'}</h3><p>${chapter.unlocked ? esc(chapter.text) : 'Complete the previous campaign gate to reveal this passage.'}</p></article>`).join('')}</div>
        ${state.progress.finalBossDefeated ? `<section class="final-epilogue"><span>${icon('target')}</span><div><div class="eyebrow">Principal campaign complete</div><h3>The witness can no longer call the descent inevitable.</h3><p>The Endless Dark remains open as a build-validation endgame. The Crown of the First Witness is secured only after its haul is extracted.</p></div></section>` : ''}
        <div class="divider"></div>
        <div class="inventory-toolbar"><div><div class="eyebrow">Named elite ledger</div><strong>${elites.filter(([id]) => state.progress.namedEliteClears[id]).length}/${elites.length} discovered through victory</strong></div><div class="subtle">Each hunt is a deterministic authored test with disclosed counterplay.</div></div>
        <div class="named-elite-ledger">${elites.map(([id, elite]) => {
          const clears = Number(state.progress.namedEliteClears[id] || 0);
          return `<article class="elite-ledger-card ${clears ? 'cleared' : ''}"><span class="elite-ledger-icon" ${tooltipAttrs(elite.name, elite.text, clears ? `${clears} clear${clears === 1 ? '' : 's'}` : 'Uncleared')}>${icon('target')}</span><div><strong>${esc(elite.name)}</strong><p>${esc(elite.text)}</p><small>${esc(D.REGIONS.find(region => region.id === elite.regionId)?.name || '')} · ${clears ? `${clears} clear${clears === 1 ? '' : 's'}` : 'Uncleared'}</small></div></article>`;
        }).join('')}</div>
        <div class="divider"></div>
        <div class="inventory-toolbar"><div><div class="eyebrow">Achievements</div><strong>${achievements.filter(([id]) => state.progress.achievements?.[id]?.unlockedAt).length}/${achievements.length} proven</strong></div><div class="subtle">Permanent records have no power reward.</div></div>
        <div class="achievement-grid">${achievements.map(([id, achievement]) => { const progress = C.achievementProgress(id); const unlocked = Boolean(state.progress.achievements?.[id]?.unlockedAt); return `<article class="achievement-card ${unlocked ? 'unlocked' : ''}"><span ${tooltipAttrs(achievement.name, achievement.text, unlocked ? 'Proven' : `${Math.min(progress, achievement.target)}/${achievement.target}`)}>${icon(unlocked ? 'check' : 'lock')}</span><div><strong>${esc(achievement.name)}</strong><p>${esc(achievement.text)}</p><small>${unlocked ? 'Proven' : `${Math.min(progress, achievement.target)}/${achievement.target}`}</small></div></article>`; }).join('')}</div>
        <div class="divider"></div>
        <div class="inventory-toolbar"><div><div class="eyebrow">Challenge board</div><strong>${challenges.filter(([id]) => C.challengeState(id).claimed).length}/${challenges.length} rewards claimed</strong></div><div class="subtle">Optional feats reward deliberate build and route constraints.</div></div>
        <div class="challenge-grid">${challenges.map(([id, challenge]) => { const status = C.challengeState(id); return `<article class="challenge-card ${status.complete ? 'complete' : ''} ${status.claimed ? 'claimed' : ''}"><div class="challenge-heading"><span ${tooltipAttrs(challenge.name, challenge.text, `Reward: ${questRewardText(challenge.reward)}`)}>${icon(status.complete ? 'check' : 'target')}</span><div><strong>${esc(challenge.name)}</strong><p>${esc(challenge.text)}</p><small>Reward · ${esc(questRewardText(challenge.reward))}</small></div></div><button class="button ${status.complete && !status.claimed ? 'primary' : ''}" data-action="claim-challenge" data-challenge="${id}" ${status.complete && !status.claimed ? '' : 'disabled'}>${status.claimed ? 'Claimed' : status.complete ? 'Claim reward' : 'In progress'}</button></article>`; }).join('')}</div>`;
    }

    shopTab(state) {
      const cost = C.shopRestockCost();
      const stockLevel = Number(state.shop.stockLevel || state.hero.level);
      return `
        <div class="inventory-toolbar merchant-toolbar"><div><div class="eyebrow">Travelling merchant</div><strong>Equipment curated for hero level ${state.hero.level}</strong><span class="subtle">Stock level ${stockLevel}. New stock is prepared automatically whenever the hero levels up.</span></div><button class="button small" data-action="restock-shop">Restock · ${cost} gold</button></div>
        <div class="merchant-legend"><span class="merchant-compare up">▲ Upgrade</span><span class="merchant-compare down">▼ Downgrade</span><span class="merchant-compare empty">◇ Empty slot</span><span>Hover or focus any item for full vertical comparison.</span></div>
        <div class="shop-grid">${state.shop.items.length ? state.shop.items.map(item => {
          const comparison = this.itemComparison(item);
          const compareClass = comparison.isEquipped || comparison.delta === 0 ? 'neutral' : comparison.delta > 0 ? 'up' : 'down';
          const compareText = comparison.isEquipped ? 'Equipped' : !comparison.equipped ? 'Empty slot' : comparison.delta > 0 ? `+${number(comparison.delta)} power` : `${number(comparison.delta)} power`;
          const equippedName = comparison.equipped ? comparison.equipped.name : 'Nothing equipped';
          const effective = C.effectiveItemStats(item);
          return `<article class="shop-card ${item.setId ? 'set-piece' : ''}" ${itemTooltipAttrs(item, 'merchant')}>
            <div class="shop-item-head"><span class="shop-item-art">${itemArtSvg(item, 'shop-item-art-svg')}</span><div><strong class="${item.setId ? 'set-name' : rarityClass(item)}">${esc(item.name)}</strong><span>Level ${item.level} · ${esc(D.RARITIES[item.rarity].label)} ${esc(slotLabel(item.slot))}</span></div><span class="merchant-compare ${compareClass}">${compareClass === 'up' ? '▲' : compareClass === 'down' ? '▼' : '◇'} ${esc(compareText)}</span></div>
            <div class="shop-versus"><span>Currently equipped</span><strong>${esc(equippedName)}</strong></div>
            <div class="shop-stat-preview">${Object.entries(effective).slice(0, 4).map(([stat, value]) => `<div class="stat-line"><span>${esc(D.STAT_LABELS[stat] || stat)}</span><strong>${esc(this.formatItemStat(stat, value, true))}</strong></div>`).join('')}</div>
            <button class="button ${state.resources.gold >= item.price ? 'primary' : ''}" data-action="buy-shop" data-item="${item.id}" ${state.resources.gold < item.price ? 'disabled' : ''}>Buy · ${number(item.price)} gold</button>
          </article>`;
        }).join('') : '<div class="empty-state">The merchant has sold out. Restock to generate a new selection.</div>'}</div>`;
    }

    runesTab(state) {
      const known = state.hero.recipes;
      return `
        <div class="inventory-toolbar"><div><div class="eyebrow">Rune altar</div><strong>Recipes turn socketed bases into build-defining items.</strong></div><div class="subtle">Recipes drop from bosses and elites.</div></div>
        <div class="rune-pouch">${Object.entries(D.RUNES).map(([id, rune]) => `<div class="rune-chip" ${tooltipAttrs(rune.name, rune.text || 'A crafting rune recovered from expeditions.', `Owned ×${state.hero.runes[id] || 0}`)}><span class="rune-symbol">${icon('rune', 'rune-svg')}<i>${esc(rune.symbol)}</i></span><span>${esc(rune.name)}</span><strong>×${state.hero.runes[id] || 0}</strong></div>`).join('')}</div>
        <div class="rune-grid">${Object.entries(D.RUNEWORDS).map(([id, recipe]) => {
          const discovered = known.includes(id);
          const requirement = recipe.runes.map(rune => D.RUNES[rune].symbol).join(' · ');
          return `<article class="recipe-card ${discovered ? '' : 'subtle'}">
            <div class="eyebrow">${discovered ? 'Discovered runeword' : 'Unknown recipe'}</div>
            <h3>${discovered ? esc(recipe.name) : '???'}</h3>
            <div>${discovered ? esc(recipe.text) : 'Defeat region bosses to discover this recipe.'}</div>
            <div class="divider"></div><div class="stat-line"><span>Rune order</span><strong>${discovered ? requirement : 'Hidden'}</strong></div>
            <div class="stat-line"><span>Compatible</span><strong>${discovered ? recipe.slots.map(slotLabel).join(', ') : 'Hidden'}</strong></div>
            <button class="button ${discovered ? 'primary' : ''}" data-action="craft-runeword" data-recipe="${id}" ${discovered ? '' : 'disabled'}>Craft on compatible base</button>
          </article>`;
        }).join('')}</div>`;
    }

    procDetails(proc, state = C.getState(), build = C.analyzeBuild()) {
      const title = String(proc || 'proc').replace(/([A-Z])/g, ' $1').replace(/^./, char => char.toUpperCase()).trim();
      const sources = [];
      const effects = [];
      Object.values(state.hero.equipment || {}).filter(Boolean).forEach(item => {
        if (item.legendary?.proc === proc) { sources.push(item.legendary.name || item.name); if (item.legendary.text) effects.push(item.legendary.text); }
        if (item.runeword?.proc === proc) { sources.push(item.runeword.name || item.name); if (item.runeword.text) effects.push(item.runeword.text); }
      });
      (state.hero.ownedSkills || []).forEach(nodeId => {
        const node = C.getSkillNode(nodeId);
        if (node?.proc === proc) { sources.push(node.name); if (node.text) effects.push(node.text); }
      });
      Object.entries(build.setCounts || {}).forEach(([setId, count]) => {
        const set = D.SETS[setId];
        if (!set) return;
        Object.entries(set.bonuses || {}).forEach(([threshold, bonus]) => {
          if (count >= Number(threshold) && bonus.proc === proc) { sources.push(`${set.name} ${threshold}-piece`); if (bonus.text) effects.push(bonus.text); }
        });
      });
      if (!effects.length) {
        Object.values(D.LEGENDARY_EFFECTS || {}).forEach(effect => { if (effect.proc === proc && effect.text) effects.push(effect.text); });
        Object.values(D.RUNEWORDS || {}).forEach(recipe => { if (recipe.proc === proc && recipe.text) effects.push(recipe.text); });
      }
      const uniqueEffects = [...new Set(effects.filter(Boolean))];
      const uniqueSources = [...new Set(sources.filter(Boolean))];
      return {
        title,
        body: uniqueEffects.join(' ') || 'A build-defining combat effect that activates automatically when its condition is met.',
        meta: uniqueSources.length ? `Source: ${uniqueSources.join(' · ')}` : 'Active from the current build'
      };
    }

    rightPanel(state) {
      const item = this.selectedItemId ? state.hero.inventory.find(entry => entry.id === this.selectedItemId) : null;
      const equipped = this.selectedEquipmentSlot ? state.hero.equipment[this.selectedEquipmentSlot] : null;
      if (item) return this.itemDetail(item, false);
      if (equipped) return this.itemDetail(equipped, true);
      const build = C.analyzeBuild();
      return `
        <div class="panel-header"><div><div class="eyebrow">Build analysis</div><h2>${esc(build.primary?.name || 'Current configuration')}</h2></div></div>
        <div class="panel-body">
          <div class="stats-grid">
            ${[
              ['maxHealth', build.stats.maxHealth], ['armor', build.stats.armor], ['critChance', build.stats.critChance],
              ['critDamage', build.stats.critDamage], ['lifesteal', build.stats.lifesteal], ['blockChance', build.stats.blockChance],
              ['dodgeChance', build.stats.dodgeChance], ['abilityPower', build.stats.abilityPower]
            ].map(([stat, value]) => `<div class="stat-tile icon-stat" ${tooltipAttrs(D.STAT_LABELS[stat] || stat, `Current build value: ${statValue(stat, value)}`)}>${icon(statIconKey(stat))}<span>${esc(D.STAT_LABELS[stat] || stat)}</span><strong>${statValue(stat, value)}</strong></div>`).join('')}
          </div>
          <div class="divider"></div>
          <div class="eyebrow">Archetype balance</div>
          <div class="archetype-list">${build.archetypes.map(entry => `<div class="archetype-row"><span>${esc(entry.name)}</span><div class="identity-track"><i style="width:${Math.max(3, entry.share * 100)}%"></i></div><strong>${Math.round(entry.share * 100)}%</strong></div>`).join('')}</div>
          ${build.gaps.length ? `<div class="build-gaps"><strong>Current gaps</strong>${build.gaps.map(gap => `<span>${esc(gap)}</span>`).join('')}</div>` : ''}
          <div class="divider"></div>
          <div class="eyebrow">Active sets</div>
          ${Object.keys(build.setCounts).length ? Object.entries(build.setCounts).map(([setId, count]) => `<div style="margin-top:10px"><strong class="set-name">${esc(D.SETS[setId].name)} · ${count}/${D.SETS[setId].slots.length}</strong>${Object.entries(D.SETS[setId].bonuses).map(([threshold, bonus]) => `<div class="subtle" style="margin-top:4px">${count >= Number(threshold) ? '✓' : '○'} ${threshold}: ${esc(bonus.text)}</div>`).join('')}</div>`).join('') : '<div class="empty-state" style="margin-top:10px">No set threshold is active yet.</div>'}
          <div class="divider"></div>
          <div class="eyebrow">Behavioural procs</div>
          <div class="proc-list">${build.procs.length ? build.procs.map(proc => {
            const details = this.procDetails(proc, state, build);
            return `<button class="route-entry proc-entry" ${tooltipAttrs(details.title, details.body, details.meta)} aria-label="${esc(`${details.title}. ${details.body}. ${details.meta}`)}"><span>${icon('power', 'proc-entry-icon')}<span><strong>${esc(details.title)}</strong><small>${esc(details.meta)}</small></span></span><em>Inspect</em></button>`;
          }).join('') : '<div class="empty-state" style="margin-top:10px">Equip legendaries, sets or major skills to add build-defining procs.</div>'}</div>
        </div>`;
    }

    itemDetail(item, equipped) {
      const current = C.getState().hero.equipment[item.slot];
      const effective = C.effectiveItemStats(item);
      const currentEffective = current ? C.effectiveItemStats(current) : null;
      const band = D.PROGRESSION_BANDS.find(entry => entry.id === item.bandId) || C.progressionBandForLevel(item.level);
      const refineCap = C.maximumRefinement(item);
      const refineCost = C.refinementCost(item);
      const score = C.itemScore(item);
      const currentScore = current ? C.itemScore(current) : 0;
      const slotUnlocked = C.isSlotUnlocked(item.slot);
      const scoreDiff = !equipped ? score - currentScore : 0;
      const compareStats = !equipped ? [...new Set([...Object.keys(effective), ...Object.keys(currentEffective || {})])]
        .sort((a, b) => Math.abs(Number(effective[b] || 0) - Number(currentEffective?.[b] || 0)) - Math.abs(Number(effective[a] || 0) - Number(currentEffective?.[a] || 0)))
        .slice(0, 8) : [];
      return `
        <div class="panel-header item-detail-header"><div><div class="eyebrow">${equipped ? slotLabel(item.slot) : `${D.RARITIES[item.rarity].label} item`}</div><h2 class="${item.setId ? 'set-name' : rarityClass(item)}">${esc(item.name)}</h2></div><span class="detail-slot-icon">${icon(slotIconKey(item.slot))}</span></div>
        <div class="panel-body item-detail">
          ${!equipped ? `<section class="comparison-overview" aria-label="Item comparison">
            <article class="comparison-card candidate"><div class="comparison-label">Candidate</div><div class="comparison-item"><span>${icon(slotIconKey(item.slot))}</span><div><strong class="${item.setId ? 'set-name' : rarityClass(item)}">${esc(item.name)}</strong><small>Power ${number(score)}</small></div></div></article>
            <div class="comparison-delta ${scoreDiff > 0 ? 'up' : scoreDiff < 0 ? 'down' : 'neutral'}">${icon('compare')}<strong>${scoreDiff > 0 ? '+' : ''}${number(scoreDiff)}</strong><span>power</span></div>
            <article class="comparison-card equipped"><div class="comparison-label">Currently equipped</div>${current ? `<div class="comparison-item"><span>${icon(slotIconKey(current.slot))}</span><div><strong class="${current.setId ? 'set-name' : rarityClass(current)}">${esc(current.name)}</strong><small>Power ${number(currentScore)}</small></div></div>` : `<div class="comparison-item empty"><span>${icon(slotIconKey(item.slot))}</span><div><strong>Empty slot</strong><small>Every listed stat is gained</small></div></div>`}</article>
          </section>
          ${compareStats.length ? `<section class="comparison-stat-grid">${compareStats.map(stat => {
            const next = Number(effective[stat] || 0); const old = Number(currentEffective?.[stat] || 0); const diff = next - old;
            return `<div class="comparison-stat ${diff > 0 ? 'up' : diff < 0 ? 'down' : 'neutral'}">${icon(statIconKey(stat))}<span>${esc(D.STAT_LABELS[stat] || stat)}</span><strong>${statValue(stat, next)}</strong><small>${diff === 0 ? 'No change' : `${diff > 0 ? '+' : ''}${statValue(stat, diff)}`}</small></div>`;
          }).join('')}</section>` : ''}` : ''}
          <div class="detail-facts">
            <div class="stat-line"><span>Item level</span><strong>${item.level} · ${esc(band.name)}</strong></div>
            <div class="stat-line"><span>Item power</span><strong>${number(score)}</strong></div>
            <div class="stat-line"><span>Refinement</span><strong>+${item.refinement || 0}/${refineCap}</strong></div>
            <div class="stat-line"><span>Slot</span><strong>${icon(slotIconKey(item.slot), 'inline-icon')} ${esc(slotLabel(item.slot))}</strong></div>
            <div class="stat-line"><span>Sockets</span><strong>${item.sockets || 0}</strong></div>
          </div>
          <div class="divider"></div>
          <div class="stat-list">${Object.entries(effective).map(([stat, value]) => {
            const old = !equipped && currentEffective ? Number(currentEffective[stat] || 0) : null;
            const diff = old === null ? 0 : Number(value) - old;
            return `<div class="stat-line item-stat-line"><span>${icon(statIconKey(stat), 'inline-icon')} ${esc(D.STAT_LABELS[stat] || stat)}</span><strong>${statValue(stat, value)} ${old !== null && diff !== 0 ? `<small class="${diff > 0 ? 'compare-up' : 'compare-down'}">(${diff > 0 ? '+' : ''}${statValue(stat, diff)})</small>` : ''}</strong></div>`;
          }).join('')}</div>
          ${item.regionalImprint ? `<div class="divider"></div><div class="regional-imprint"><div class="eyebrow">Regional imprint · ${esc(D.REGIONS.find(region => region.id === item.regionId)?.name || 'Unknown region')}</div><strong>${esc(item.regionalImprint.name)}</strong><div class="subtle">${esc(item.regionalImprint.text)}</div>${Object.entries(item.regionalImprint.stats || {}).map(([stat, value]) => `<div class="stat-line"><span>${icon(statIconKey(stat), 'inline-icon')} ${esc(D.STAT_LABELS[stat] || stat)}</span><strong>+${statValue(stat, value)}</strong></div>`).join('')}</div>` : ''}
          ${item.legendary ? `<div class="divider"></div><div class="effect-block legendary-effect">${icon('power')}<div><div class="eyebrow">Legendary effect</div><strong>${esc(item.legendary.name)}</strong><div class="subtle">${esc(item.legendary.text)}</div></div></div>` : ''}
          ${item.runeword ? `<div class="divider"></div><div class="effect-block runeword-effect">${icon('runes')}<div><div class="eyebrow">Runeword · ${item.runeword.runes.map(rune => D.RUNES[rune].symbol).join(' ')}</div><strong class="set-name">${esc(item.runeword.name)}</strong><div class="subtle">${esc(item.runeword.text)}</div></div></div>` : ''}
          ${item.setId ? `<div class="divider"></div><div class="effect-block set-effect">${icon('crown')}<div><div class="eyebrow">Set piece</div><strong class="set-name">${esc(D.SETS[item.setId].name)}</strong>${Object.entries(D.SETS[item.setId].bonuses).map(([threshold, bonus]) => `<div class="subtle">${threshold} pieces: ${esc(bonus.text)}</div>`).join('')}</div></div>` : ''}
          ${!equipped && !slotUnlocked ? `<div class="locked-slot-callout">${icon('lock')}<div><strong>${esc(slotLabel(item.slot))} unlocks at level ${D.SLOT_UNLOCK_LEVEL[item.slot]}</strong><span>This item is safe in the stash, but cannot be equipped until that hero level.</span></div></div>` : ''}
          <div class="divider"></div>
          <div class="item-actions sticky-actions">
            ${equipped ? `<button class="button" data-action="unequip" data-slot="${item.slot}">Unequip</button>` : `<button class="button ${slotUnlocked ? 'primary' : ''}" data-action="equip-item" data-item="${item.id}" ${slotUnlocked ? '' : 'disabled'}>${slotUnlocked ? `${icon('check', 'button-icon')} Equip` : `${icon('lock', 'button-icon')} Unlocks L${D.SLOT_UNLOCK_LEVEL[item.slot]}`}</button><button class="button danger" data-action="sell-item" data-item="${item.id}">Sell · ${item.sellValue}</button><button class="button" data-action="salvage-item" data-item="${item.id}">Salvage</button>`}
            <button class="button ${item.refinement < refineCap ? 'primary' : ''}" data-action="refine-item" data-item="${item.id}" ${item.refinement < refineCap ? '' : 'disabled'}>${refineCap <= 0 ? 'Forge upgrade required' : item.refinement >= refineCap ? 'Refinement capped' : `Refine · ${refineCost.gold}g + ${refineCost.essence} essence`}</button>
            <button class="button" data-action="clear-selection">Close</button>
          </div>
        </div>`;
    }

    modalHtml() {

      if (this.modal === 'help') return this.helpModal();
