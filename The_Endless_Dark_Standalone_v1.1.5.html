        merged.shop.seed = hashString(`${merged.shop.seed || 'shop'}_level_${merged.hero.level}`);
        merged.shop.refreshes = 0;
      }
      merged.shop.items = generateShop(merged, merged.shop.seed);
      merged.shop.stockLevel = merged.hero.level;
    }
    merged.schemaVersion = SAVE_SCHEMA_VERSION;
    merged.version = D.VERSION;
    return merged;
  }

  function quarantineCorrupt(raw) {
    if (!raw) return;
    try { localStorage.setItem(CORRUPT_KEY, String(raw).slice(0, 500000)); } catch (error) { /* Recovery is best-effort. */ }
  }

  function parseStored(raw) {
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!isStateShape(parsed)) throw new Error('Stored payload has an invalid shape.');
    return normalizeState(parsed);
  }

  function loadState() {
    let primaryRaw = null;
    try {
      primaryRaw = localStorage.getItem(SAVE_KEY);
      if (primaryRaw) return parseStored(primaryRaw);
    } catch (error) {
      console.warn('Primary save could not be loaded.', error);
      quarantineCorrupt(primaryRaw);
      try { localStorage.removeItem(SAVE_KEY); } catch (ignored) { /* no-op */ }
    }
    try {
      const backupRaw = localStorage.getItem(BACKUP_KEY);
      if (backupRaw) {
        const recovered = parseStored(backupRaw);
        recovered.meta.recoveryNotice = 'The primary save was damaged. The most recent automatic backup was restored.';
        return recovered;
      }
    } catch (error) {
      console.warn('Backup save could not be loaded.', error);
    }
    const fresh = createDefaultState();
    if (primaryRaw) fresh.meta.recoveryNotice = 'The previous save could not be repaired, so a clean profile was created. A quarantined copy remains in this browser.';
    return fresh;
  }

  let state = loadState();

  function emit(reason = 'change') {
    for (const fn of listeners) {
      try { fn(state, reason); } catch (error) { console.error(error); }
    }
  }

  function save(reason = 'save') {
    state.version = D.VERSION;
    state.schemaVersion = SAVE_SCHEMA_VERSION;
    state.meta = { ...state.meta, saveRevision: (Number(state.meta?.saveRevision) || 0) + 1, lastSavedAt: new Date().toISOString() };
    try {
      const previous = localStorage.getItem(SAVE_KEY);
      if (previous) localStorage.setItem(BACKUP_KEY, previous);
      localStorage.setItem(SAVE_KEY, JSON.stringify(state));
    } catch (error) {
      console.warn('Save failed.', error);
      state.meta.recoveryNotice = 'Progress could not be written to browser storage. Export a save from Settings before closing the game.';
    }
    emit(reason);
  }

  function subscribe(fn) { listeners.add(fn); return () => listeners.delete(fn); }
  function getState() { return state; }

  function replaceState(next, reason = 'replace') {
    state = normalizeState(next);
    save(reason);
  }

  function dismissRecoveryNotice() {
    state.meta.recoveryNotice = '';
    save('recovery-dismissed');
  }

  function completeOnboarding() {
    state.onboarding = { seen: true, completed: true, step: 3 };
    save('onboarding-complete');
  }

  function rarityForLevel(random, level, luck = 0, forced = null) {
    if (forced && D.RARITIES[forced]) return forced;
    const entries = Object.entries(D.RARITIES).map(([key, value]) => ({
      value: key,
      weight: key === 'ancient'
        ? (level >= 10 ? clamp((level - 9) * 0.45 + luck * 8, 0.4, 5) : 0)
        : value.weight * (key === 'normal' ? clamp(1 - level * .02, .45, 1) : 1 + luck)
    }));
    return weightedPick(random, entries);
  }

  function affixValue(random, affix, level, multiplier) {
    const raw = affix.min + random() * (affix.max - affix.min);
    const scaled = raw * (1 + Math.max(0, level - 1) * .055) * multiplier;
    const isFraction = Math.abs(affix.max) < 1;
    return round(scaled, isFraction ? 3 : 0);
  }

  function generateItem(level, random = Math.random, options = {}) {
    const region = Number.isInteger(options.regionIndex) ? D.REGIONS[options.regionIndex] : null;
    const regional = region ? D.REGIONAL_LOOT[region.id] : null;
    const dropTable = region ? D.REGIONAL_DROP_TABLES?.[region.id] : null;
    const band = progressionBandForLevel(level);
    const unlockedSlots = D.SLOTS.map(([slot]) => slot).filter(slot => D.SLOT_UNLOCK_LEVEL[slot] <= Math.max(1, level));
    const preferredSlots = regional?.slots?.filter(slot => unlockedSlots.includes(slot)) || [];
    const slot = options.forceSlot || (preferredSlots.length && random() < .58 ? pick(random, preferredSlots) : pick(random, unlockedSlots));
    const rarityLuck = Number(options.luck || 0) + Number(band.luck || 0) + Number(dropTable?.rarityLuck || 0) + Number(options.ancientLuck || 0);
    const rarity = rarityForLevel(random, level, rarityLuck, options.forceRarity);
    const rarityData = D.RARITIES[rarity];
    const basePool = D.ITEM_BASES[slotBaseKey(slot)];
    const regionalBases = region ? basePool.filter(entry => entry.region === region.id) : [];
    const base = regionalBases.length && random() < .62 ? pick(random, regionalBases) : pick(random, basePool);
    const scale = 1 + Math.max(0, level - 1) * .115;
    const stats = {};
    Object.entries(base.stats).forEach(([stat, value]) => {
      stats[stat] = round(value * scale * rarityData.mult, Math.abs(value) < 1 ? 3 : 0);
    });

    const affixPool = [...D.AFFIXES];
    const affixes = [];
    const rarityRank = Object.keys(D.RARITIES).indexOf(rarity);
    const affixCount = Math.min(5, rarityData.affixes + (rarityRank >= 2 ? Number(band.affixBonus || 0) : 0));
    for (let i = 0; i < affixCount && affixPool.length; i += 1) {
      let index = Math.floor(random() * affixPool.length);
      if (regional?.affixes?.length && i === 0 && random() < .62) {
        const matches = affixPool.map((entry, entryIndex) => regional.affixes.includes(entry.id) ? entryIndex : -1).filter(entryIndex => entryIndex >= 0);
        if (matches.length) index = pick(random, matches);
      }
      const affix = affixPool.splice(index, 1)[0];
      const value = affixValue(random, affix, level, rarityData.mult);
      stats[affix.stat] = round((stats[affix.stat] || 0) + value, Math.abs(value) < 1 ? 3 : 0);
      affixes.push({ id: affix.id, label: affix.label, stat: affix.stat, value });
    }

    let setId = null;
    const eligibleSets = Object.entries(D.SETS).filter(([, set]) => set.slots.includes(slot));
    const preferredSets = eligibleSets.filter(([id]) => regional?.setIds?.includes(id));
    const setChance = options.forceSet ? 1 : (['rare', 'epic', 'legendary', 'ancient'].includes(rarity) ? .12 : .025);
    if (eligibleSets.length && random() < setChance) {
      setId = options.forceSet || (preferredSets.length && random() < .7 ? pick(random, preferredSets)[0] : pick(random, eligibleSets)[0]);
    }

    let legendary = null;
    if (rarity === 'legendary' || rarity === 'ancient') {
      const preferred = D.LEGENDARY_EFFECTS.filter(effect => regional?.legendaryIds?.includes(effect.id));
      legendary = deepClone(preferred.length && random() < .68 ? pick(random, preferred) : pick(random, D.LEGENDARY_EFFECTS));
    }

    let regionalImprint = null;
    const imprintChance = options.forceRegional ? 1 : options.source === 'boss' || options.source === 'named-elite' ? .68 : .34;
    if (regional && random() < imprintChance) {
      regionalImprint = { regionId: region.id, name: regional.imprint.name, text: regional.imprint.text, stats: {} };
      Object.entries(regional.imprint.stats || {}).forEach(([stat, value]) => {
        const scaled = Math.abs(value) < 1 ? value * (1 + Math.max(0, level - 1) * .018) : value * (1 + Math.max(0, level - 1) * .06);
        const applied = round(scaled, Math.abs(value) < 1 ? 3 : 0);
        stats[stat] = round((stats[stat] || 0) + applied, Math.abs(value) < 1 ? 3 : 0);
        regionalImprint.stats[stat] = applied;
      });
    }

    const prefix = {
      normal: '', magic: 'Glimmering ', rare: 'Hardened ', epic: 'Exalted ',
      legendary: legendary ? `${legendary.name} ` : 'Legendary ', ancient: legendary ? `Ancient ${legendary.name} ` : 'Ancient '
    }[rarity];
    const setPrefix = setId ? `${D.SETS[setId].name} ` : '';
    const item = {
      id: uid('item'), slot, name: `${setPrefix}${regionalImprint ? `${regionalImprint.name} ` : ''}${prefix}${base.name}`.trim(), icon: base.icon,
      level, rarity, stats, affixes, setId, legendary, runeword: null,
      regionalImprint, regionId: regionalImprint ? region.id : null, bandId: band.id, refinement: 0,
      sockets: rarity === 'normal' ? randomInt(random, 1, Math.min(3, 1 + Math.floor(level / 4))) : (random() < Number(dropTable?.socketChance || 0) + Number(options.socketFind || 0) ? 1 : 0),
      sellValue: Math.max(4, Math.round((8 + level * 4) * rarityData.sell * (1 + D.PROGRESSION_BANDS.indexOf(band) * .08) * (regionalImprint ? 1.18 : 1))), source: options.source || 'loot'
    };
    return item;
  }

  function getSkillNode(id) {
    for (const branch of Object.values(D.SKILL_BRANCHES)) {
      const found = branch.nodes.find(node => node.id === id);
      if (found) return found;
    }
    return null;
  }

  function effectiveItemStats(item) {
    const stats = {};
    const refinement = Math.max(0, Math.round(Number(item?.refinement || 0)));
    const multiplier = 1 + refinement * .065;
    Object.entries(item?.stats || {}).forEach(([stat, value]) => {
      const scalable = !['commandPoints', 'reveal', 'inventoryCapacity', 'shopSlots', 'restockDiscount', 'maxRefinement', 'salvageYield', 'trainingPoint', 'endlessIntel'].includes(stat);
      stats[stat] = round(Number(value || 0) * (scalable ? multiplier : 1), Math.abs(value) < 1 ? 3 : 0);
    });
    return stats;
  }

  function itemScore(item) {
    if (!item) return 0;
    const weights = {
      maxHealth: 1.2, minDamage: 6, maxDamage: 5, attackSpeed: 115, critChance: 520, critDamage: 38,
      lifesteal: 760, armor: 8, blockChance: 620, dodgeChance: 610, moveSpeed: 92, abilityPower: 360,
      commandPoints: 48, goldFind: 90, hazardResist: 150, potionPower: 80, reveal: 18, runeFind: 130, recipeFind: 130
    };
    const base = Object.entries(effectiveItemStats(item)).reduce((sum, [stat, value]) => sum + Number(value || 0) * Number(weights[stat] || 1), 0);
    const procBonus = item.legendary?.proc || item.runeword?.proc ? 42 : 0;
    const setBonus = item.setId ? 24 : 0;
    return Math.max(0, Math.round(base + procBonus + setBonus + Number(item.sockets || 0) * 10));
  }

  function calculateStats(inputState = state) {
    const stats = deepClone(D.BASE_STATS);
    const procs = new Set();
    const setCounts = {};
    const sources = [];

    function applyStats(obj, source) {
      if (!obj) return;
      Object.entries(obj).forEach(([stat, value]) => {
        stats[stat] = round((stats[stat] || 0) + Number(value || 0), Math.abs(value) < 1 ? 3 : 0);
      });
      if (source) sources.push(source);
    }

    Object.values(inputState.hero.equipment).filter(Boolean).forEach(item => {
      applyStats(effectiveItemStats(item), `${item.name}${item.refinement ? ` +${item.refinement}` : ''}`);
      if (item.legendary?.proc) procs.add(item.legendary.proc);
      if (item.runeword?.proc) procs.add(item.runeword.proc);
      if (item.setId) setCounts[item.setId] = (setCounts[item.setId] || 0) + 1;
    });

    inputState.hero.ownedSkills.forEach(id => {
      const node = getSkillNode(id);
      if (!node) return;
      applyStats(node.stats, node.name);
      if (node.proc) procs.add(node.proc);
    });

    Object.entries(setCounts).forEach(([setId, count]) => {
      const set = D.SETS[setId];
      Object.entries(set.bonuses).forEach(([threshold, bonus]) => {
        if (count >= Number(threshold)) {
          applyStats(bonus.stats, `${set.name} ${threshold}`);
          if (bonus.proc) procs.add(bonus.proc);
        }
      });
    });

    Object.entries(inputState.progress?.campUpgrades || {}).forEach(([upgradeId, rank]) => {
      const upgrade = D.CAMP_UPGRADES[upgradeId];
      if (!upgrade) return;
      for (let index = 0; index < Math.min(Number(rank) || 0, upgrade.maxRank); index += 1) {
        applyStats(upgrade.effects[index], `${upgrade.name} ${index + 1}`);
      }
    });

    stats.maxHealth += (inputState.hero.level - 1) * 5;
    stats.minDamage += Math.floor((inputState.hero.level - 1) * 1.1);
    stats.maxDamage += Math.floor((inputState.hero.level - 1) * 1.6);
    stats.armor += Math.floor((inputState.hero.level - 1) * 1.2);
    stats.attackSpeed = clamp(stats.attackSpeed, .35, 3.5);
    stats.critChance = clamp(stats.critChance, 0, .85);
    stats.blockChance = clamp(stats.blockChance, 0, .65);
    stats.dodgeChance = clamp(stats.dodgeChance, 0, .5);
    stats.lifesteal = clamp(stats.lifesteal, 0, .35);
    stats.moveSpeed = clamp(stats.moveSpeed, .5, 2.5);
    stats.commandPoints = Math.max(3, Math.round(stats.commandPoints));
    stats.power = Math.round(
      (stats.minDamage + stats.maxDamage) * stats.attackSpeed * (1 + stats.critChance * stats.critDamage) * 3
      + stats.maxHealth * .65 + stats.armor * 2.4 + stats.lifesteal * 220 + stats.blockChance * 150
      + stats.abilityPower * 130
    );
    return { stats, procs: [...procs], setCounts, sources };
  }

  function analyzeBuild(inputState = state) {
    const build = calculateStats(inputState);
    const scores = Object.entries(D.BUILD_ARCHETYPES).map(([id, archetype]) => {
      let score = Object.entries(archetype.statWeights || {}).reduce((sum, [stat, weight]) => sum + Number(build.stats[stat] || 0) * Number(weight || 0), 0);
      score += (archetype.procs || []).filter(proc => build.procs.includes(proc)).length * 95;
      score += inputState.hero.equippedAbilities.filter(abilityId => D.ABILITIES[abilityId]?.branch === archetype.branch).length * 55;
      return { id, name: archetype.name, text: archetype.text, score: Math.max(0, Math.round(score)) };
    }).sort((a, b) => b.score - a.score);
    const total = scores.reduce((sum, entry) => sum + entry.score, 0) || 1;
    scores.forEach(entry => { entry.share = round(entry.score / total, 3); });
    const primary = scores[0];
    const gaps = [];
    if (build.stats.lifesteal < .03 && build.stats.blockChance < .08 && build.stats.dodgeChance < .08) gaps.push('Low sustain and avoidance');
    if (build.stats.abilityPower < .12 && build.stats.attackSpeed < 1.18) gaps.push('Limited combat tempo');
    if (build.stats.commandPoints <= 6 && build.stats.reveal <= 0) gaps.push('Minimal route flexibility');
    if (!build.procs.length) gaps.push('No build-defining proc engine');
    return { ...build, archetypes: scores, primary, gaps: gaps.slice(0, 3) };
  }

  function inventoryCapacity(inputState = state) {
    return Math.max(30, Math.round(calculateStats(inputState).stats.inventoryCapacity || 30));
  }

  function getCampUpgradeRank(upgradeId, inputState = state) {
    return Math.max(0, Math.round(Number(inputState.progress?.campUpgrades?.[upgradeId]) || 0));
  }

  function buyCampUpgrade(upgradeId) {
    const upgrade = D.CAMP_UPGRADES[upgradeId];
    if (!upgrade) return { ok: false, message: 'Unknown camp upgrade.' };
    const rank = getCampUpgradeRank(upgradeId);
    if (rank >= upgrade.maxRank) return { ok: false, message: `${upgrade.name} is fully upgraded.` };
    const cost = upgrade.costs[rank];
    if (state.resources.renown < cost) return { ok: false, message: `Need ${cost} renown.` };
    state.resources.renown -= cost;
    state.progress.campUpgrades[upgradeId] = rank + 1;
    const gainedTraining = Math.max(0, Math.round(Number(upgrade.effects?.[rank]?.trainingPoint || 0)));
    if (gainedTraining) state.hero.skillPoints += gainedTraining;
    if (upgradeId === 'merchant') { state.shop.items = generateShop(state, state.shop.seed); state.shop.stockLevel = state.hero.level; }
    save('camp-upgrade');
    return { ok: true, message: `${upgrade.name} reached rank ${rank + 1}.` };
  }

  function isSlotUnlocked(slot, inputState = state) {
    return inputState.hero.level >= D.SLOT_UNLOCK_LEVEL[slot];
  }

  function slotUnlocksBetween(fromLevel, toLevel) {
    const from = Math.max(0, Math.round(Number(fromLevel || 0)));
    const to = Math.max(from, Math.round(Number(toLevel || from)));
    return D.SLOTS
      .filter(([slot]) => D.SLOT_UNLOCK_LEVEL[slot] > from && D.SLOT_UNLOCK_LEVEL[slot] <= to)
      .map(([slot, label, glyph]) => ({ slot, label, glyph, level: D.SLOT_UNLOCK_LEVEL[slot] }));
  }

  function equipItem(itemId) {
    const index = state.hero.inventory.findIndex(item => item.id === itemId);
    if (index < 0) return { ok: false, message: 'Item not found.' };
    const item = state.hero.inventory[index];
    if (!isSlotUnlocked(item.slot)) return { ok: false, message: `Unlocks at hero level ${D.SLOT_UNLOCK_LEVEL[item.slot]}.` };
    const old = state.hero.equipment[item.slot];
    state.hero.equipment[item.slot] = item;
    state.hero.inventory.splice(index, 1);
    if (old) state.hero.inventory.push(old);
    save('equip');
    return { ok: true, message: `${item.name} equipped.` };
  }

  function unequip(slot) {
    const item = state.hero.equipment[slot];
    if (!item) return { ok: false, message: 'Slot is empty.' };
    if (state.hero.inventory.length >= inventoryCapacity()) return { ok: false, message: 'Inventory is full.' };
    state.hero.inventory.push(item);
    state.hero.equipment[slot] = null;
    save('unequip');
    return { ok: true, message: `${item.name} unequipped.` };
  }

  function sellItem(itemId) {
    const index = state.hero.inventory.findIndex(item => item.id === itemId);
    if (index < 0) return { ok: false, message: 'Item not found.' };
    const [item] = state.hero.inventory.splice(index, 1);
    const value = Math.max(0, Math.round(Number(item.sellValue || 0)));
    state.resources.gold += value;
    save('sell');
    return { ok: true, message: `${item.name} sold for ${value} gold.`, count: 1, gold: value };
  }

  function isBulkProtectedItem(item) {
    return Boolean(item?.setId || item?.runeword || item?.legendary || item?.rarity === 'ancient');
  }

  function bulkSellCandidates(mode, inputState = state) {
    const inventory = Array.isArray(inputState?.hero?.inventory) ? inputState.hero.inventory : [];
    if (mode === 'all') return [...inventory];
    if (mode === 'trash') {
      return inventory.filter(item => item?.rarity === 'normal' && !isBulkProtectedItem(item));
    }
    if (mode === 'worse') {
      return inventory.filter(item => {
        if (!item || isBulkProtectedItem(item)) return false;
        const equipped = inputState.hero.equipment?.[item.slot];
        if (!equipped) return false;
        return itemScore(item) < itemScore(equipped);
      });
    }
    return [];
  }

  function bulkSellPreview(mode, inputState = state) {
    const items = bulkSellCandidates(mode, inputState);
    const gold = items.reduce((sum, item) => sum + Math.max(0, Math.round(Number(item.sellValue || 0))), 0);
    return { mode, count: items.length, gold, itemIds: items.map(item => item.id) };
  }

  function bulkSellItems(mode) {
    if (!['trash', 'worse', 'all'].includes(mode)) return { ok: false, message: 'Unknown inventory cleanup mode.', count: 0, gold: 0 };
    const preview = bulkSellPreview(mode);
    if (!preview.count) {
      const emptyMessage = mode === 'trash'
        ? 'No grey trash items are available to sell.'
        : mode === 'worse'
          ? 'No unprotected items are worse than their equipped counterpart.'
          : 'The inventory is already empty.';
      return { ok: false, message: emptyMessage, count: 0, gold: 0 };
    }
    const ids = new Set(preview.itemIds);
    state.hero.inventory = state.hero.inventory.filter(item => !ids.has(item.id));
    state.resources.gold += preview.gold;
    save(`bulk-sell-${mode}`);
    const label = mode === 'trash' ? 'trash item' : mode === 'worse' ? 'inferior item' : 'unequipped item';
    return {
      ok: true,
      message: `Sold ${preview.count} ${label}${preview.count === 1 ? '' : 's'} for ${preview.gold} gold.`,
      count: preview.count,
      gold: preview.gold,
      mode
    };
  }

  function maximumRefinement(item, inputState = state) {
    const band = D.PROGRESSION_BANDS.find(entry => entry.id === item?.bandId) || progressionBandForLevel(item?.level || 1);
    const forgeLimit = Math.max(0, Math.round(calculateStats(inputState).stats.maxRefinement || 0));
    return Math.min(Number(band.refineCap || 0), forgeLimit);
  }

  function refinementCost(item, inputState = state) {
    const next = Math.max(1, Math.round(Number(item?.refinement || 0)) + 1);
    const rarityRank = Math.max(0, Object.keys(D.RARITIES).indexOf(item?.rarity || 'normal'));
    return {
      gold: Math.round((18 + Number(item?.level || 1) * 7 + next * next * 16) * (1 + rarityRank * .22)),
      essence: Math.max(1, Math.round(next * (1 + rarityRank * .72)))
    };
  }

  function refineItem(itemId) {
    const item = state.hero.inventory.find(entry => entry.id === itemId) || Object.values(state.hero.equipment).find(entry => entry?.id === itemId);
    if (!item) return { ok: false, message: 'Item not found.' };
    const cap = maximumRefinement(item);
    if (cap <= 0) return { ok: false, message: 'Upgrade the Wayfarer Forge to refine equipment.' };
    if ((item.refinement || 0) >= cap) return { ok: false, message: `This ${D.PROGRESSION_BANDS.find(entry => entry.id === item.bandId)?.name || ''} item is at its current refinement cap.` };
    const cost = refinementCost(item);
    if (state.resources.gold < cost.gold || state.resources.essence < cost.essence) return { ok: false, message: `Need ${cost.gold} gold and ${cost.essence} essence.` };
    state.resources.gold -= cost.gold;
    state.resources.essence -= cost.essence;
    item.refinement = Math.max(0, Number(item.refinement || 0)) + 1;
    item.sellValue = Math.round(item.sellValue * 1.12);
    save('item-refine');
    return { ok: true, message: `${item.name} refined to +${item.refinement}.`, item };
  }

  function salvageItem(itemId) {
    const index = state.hero.inventory.findIndex(item => item.id === itemId);
    if (index < 0) return { ok: false, message: 'Only unequipped inventory items can be salvaged.' };
    const [item] = state.hero.inventory.splice(index, 1);
    const rarityYield = { normal: 1, magic: 2, rare: 4, epic: 8, legendary: 14, ancient: 24 }[item.rarity] || 1;
    const bonus = clamp(calculateStats().stats.salvageYield || 0, 0, .75);
    const essence = Math.max(1, Math.round((rarityYield + item.level * .45 + Number(item.refinement || 0) * 3) * (1 + bonus)));
    state.resources.essence += essence;
    save('item-salvage');
    return { ok: true, message: `${item.name} salvaged for ${essence} essence.`, essence };
  }

  function availableAbilities(inputState = state) {
    const unlocked = new Set(['cleave', 'ironWard', 'stormArc', 'shadowstep', 'rally']);
    inputState.hero.ownedSkills.forEach(id => {
      const node = getSkillNode(id);
      if (node?.unlockAbility) unlocked.add(node.unlockAbility);
    });
    return [...unlocked].filter(id => D.ABILITIES[id]);
  }

  function toggleAbility(abilityId) {
    if (!availableAbilities().includes(abilityId)) return { ok: false, message: 'Ability is not unlocked.' };
    const list = state.hero.equippedAbilities;
    const index = list.indexOf(abilityId);
    if (index >= 0) {
      list.splice(index, 1);
      save('ability');
      return { ok: true, message: `${D.ABILITIES[abilityId].name} removed.` };
    }
    if (list.length >= 4) return { ok: false, message: 'Only four abilities can be equipped.' };
    list.push(abilityId);
    save('ability');
    return { ok: true, message: `${D.ABILITIES[abilityId].name} equipped.` };
  }

  function buySkill(nodeId) {
    const node = getSkillNode(nodeId);
    if (!node) return { ok: false, message: 'Unknown skill.' };
    if (state.hero.ownedSkills.includes(nodeId)) return { ok: false, message: 'Already learned.' };
    if (node.requires && !state.hero.ownedSkills.includes(node.requires)) return { ok: false, message: 'Previous node required.' };
    if (state.hero.skillPoints < node.cost) return { ok: false, message: 'Not enough skill points.' };
    state.hero.skillPoints -= node.cost;
    state.hero.ownedSkills.push(nodeId);
    save('skill');
    return { ok: true, message: `${node.name} learned.` };
  }

  function allocatedSkillPoints(inputState = state) {
    return (inputState.hero.ownedSkills || []).reduce((sum, nodeId) => sum + Math.max(0, Number(getSkillNode(nodeId)?.cost || 0)), 0);
  }

  function respecSkills() {
    const refund = allocatedSkillPoints();
    if (!refund && !state.hero.ownedSkills.length) return { ok: false, message: 'No allocated skill points to refund.', refund: 0 };
    state.hero.ownedSkills = [];
    state.hero.skillPoints += refund;
    const available = availableAbilities(state);
    const retained = (state.hero.equippedAbilities || []).filter(id => available.includes(id));
    for (const id of ['cleave', 'ironWard', 'stormArc', 'shadowstep', 'rally']) {
      if (retained.length >= 4) break;
      if (available.includes(id) && !retained.includes(id)) retained.push(id);
    }
    state.hero.equippedAbilities = retained.slice(0, 4);
    save('skill-respec');
    return { ok: true, message: `${refund} skill point${refund === 1 ? '' : 's'} refunded. Rebuild your Wayfarer.`, refund };
  }


  function generateShop(inputState, seed) {
    const random = rng(seed);
    const level = inputState.hero.level;
    const profile = calculateStats(inputState).stats;
    const shopSlots = Math.max(6, Math.round(6 + profile.shopSlots));
    return Array.from({ length: shopSlots }, (_, index) => {
      const item = generateItem(level + (index > 3 ? 1 : 0), random, { luck: .08, source: 'merchant', regionIndex: Math.min(inputState.progress.unlockedRegion, D.REGIONS.length - 1), socketFind: profile.socketFind, ancientLuck: profile.ancientLuck });
      item.price = Math.round(item.sellValue * 2.5);
      return item;
    });
  }

  function shopRestockCost(inputState = state) {
    const discount = clamp(calculateStats(inputState).stats.restockDiscount || 0, 0, .4);
    return Math.max(5, Math.round((20 + inputState.shop.refreshes * 10) * (1 - discount)));
  }

  function restockShop() {
    const cost = shopRestockCost();
    if (state.resources.gold < cost) return { ok: false, message: `Need ${cost} gold.` };
    state.resources.gold -= cost;
    state.shop.refreshes += 1;
    state.shop.seed = hashString(`${state.shop.seed}_${Date.now()}_${state.shop.refreshes}`);
    state.shop.items = generateShop(state, state.shop.seed);
    state.shop.stockLevel = state.hero.level;
    save('shop-restock');
    return { ok: true, message: 'Merchant inventory refreshed.' };
  }

  function buyShopItem(itemId) {
    const index = state.shop.items.findIndex(item => item.id === itemId);
    if (index < 0) return { ok: false, message: 'Shop item not found.' };
    const item = state.shop.items[index];
    if (state.resources.gold < item.price) return { ok: false, message: 'Not enough gold.' };
    if (state.hero.inventory.length >= inventoryCapacity()) return { ok: false, message: 'Inventory is full.' };
    state.resources.gold -= item.price;
    delete item.price;
    item.source = 'merchant';
    state.hero.inventory.push(item);
    state.shop.items.splice(index, 1);
    save('shop-buy');
    return { ok: true, message: `${item.name} purchased.` };
  }

  function xpNeeded(level) { return 70 + level * 45; }

  function grantXp(amount) {
    state.hero.xp += Math.max(0, Math.round(amount));
    let levels = 0;
    while (state.hero.xp >= xpNeeded(state.hero.level)) {
      state.hero.xp -= xpNeeded(state.hero.level);
      state.hero.level += 1;
      state.hero.skillPoints += 2;
      levels += 1;
    }
    if (levels > 0) {
      state.shop.seed = hashString(`${state.shop.seed || 'shop'}_level_${state.hero.level}_${Date.now()}`);
      state.shop.refreshes = 0;
      state.shop.items = generateShop(state, state.shop.seed);
      state.shop.stockLevel = state.hero.level;
    }
    return levels;
  }

  function contractLimit(mission) {
    return { easy: 1, normal: 2, hard: 3, endless: 2 }[mission?.difficulty] || 1;
  }

  function normalizeContractIds(mission, ids = []) {
    const limit = contractLimit(mission);
    return [...new Set((ids || []).filter(id => D.DIFFICULTY_CONTRACTS[id]))].slice(0, limit);
  }

  function endlessModifierIds(depth, seed = 0) {
    const ids = Object.keys(D.ENDLESS_MODIFIERS);
    const count = Math.min(4, 1 + Math.floor(Math.max(1, Number(depth || 1)) / 3));
    const random = rng(hashString(`endless-modifiers_${depth}_${seed}`));
    const pool = [...ids];
    const chosen = [];
    while (chosen.length < count && pool.length) chosen.push(pool.splice(Math.floor(random() * pool.length), 1)[0]);
    return chosen;
  }

  function applyMissionContracts(mission, ids = []) {
    const contracts = normalizeContractIds(mission, ids);
    const baseThreat = Number(mission.baseThreat ?? mission.threat ?? 1);
    const baseReward = Number(mission.baseReward ?? mission.reward ?? 1);
    const reward = contracts.reduce((mult, id) => mult * Number(D.DIFFICULTY_CONTRACTS[id].reward || 1), baseReward);
    return {
      ...deepClone(mission),
      baseThreat, baseReward,
      contracts,
      threat: round(baseThreat * (1 + contracts.length * .045), 3),
      reward: round(reward, 3),
      contractLimit: contractLimit(mission)
    };
  }

  function missionModifiers(mission) {
    const contractIds = normalizeContractIds(mission, mission?.contracts || []);
    const endlessIds = [...new Set((mission?.endlessModifiers || []).filter(id => D.ENDLESS_MODIFIERS[id]))];
    const combined = {
      contracts: contractIds,
      endless: endlessIds,
      enemy: { health: 1, damage: 1, armor: 0, count: 1, attackSpeed: 1, speed: 1 },
      hero: { maxHealthMult: 1, healingMult: 1, cooldownMult: 1 },
      eliteAffixBonus: 0,
      forcedEliteAffixes: [],
      periodicDamage: 0
    };
    const entries = [
      ...contractIds.map(id => D.DIFFICULTY_CONTRACTS[id]),
      ...endlessIds.map(id => D.ENDLESS_MODIFIERS[id])
    ];
    entries.forEach(entry => {
      if (!entry) return;
      Object.entries(entry.enemy || {}).forEach(([key, value]) => {
        if (['health', 'damage', 'count', 'attackSpeed', 'speed'].includes(key)) combined.enemy[key] *= Number(value || 1);
        else combined.enemy[key] += Number(value || 0);
      });
      Object.entries(entry.hero || {}).forEach(([key, value]) => { combined.hero[key] *= Number(value || 1); });
      combined.eliteAffixBonus += Number(entry.eliteAffixBonus || 0);
      combined.periodicDamage += Number(entry.periodicDamage || 0);
      if (entry.forcedEliteAffix) combined.forcedEliteAffixes.push(entry.forcedEliteAffix);
    });
    return combined;
  }

  function rollEliteAffixes(random, count, forced = []) {
    const chosen = [...new Set((forced || []).filter(id => D.ELITE_AFFIXES[id]))];
    const pool = Object.entries(D.ELITE_AFFIXES)
      .filter(([id]) => !chosen.includes(id))
      .map(([value, data]) => ({ value, weight: data.weight || 1 }));
    while (chosen.length < count && pool.length) {
      const id = weightedPick(random, pool);
      chosen.push(id);
      const index = pool.findIndex(entry => entry.value === id);
      if (index >= 0) pool.splice(index, 1);
    }
    return chosen;
  }

  function missionDefinitions(regionIndex) {
    const region = D.REGIONS[regionIndex];
    const base = region.level;
    const names = [
      ['Scouting Route', 'A shorter route with moderate rewards.', 'easy', .88, .85, 'clear'],
      ['Purge the Nest', 'Break a reinforced nest through multiple waves.', 'normal', 1.04, 1.08, 'purge'],
      ['Recover the Sign', 'Secure a guarded regional relic.', 'normal', 1.08, 1.14, 'relic'],
      ['Hold the Last Mark', 'Survive until the extraction signal completes.', 'hard', 1.2, 1.28, 'survival'],
      ['Break the Ritual', 'Destroy void anchors beneath active defenders.', 'hard', 1.28, 1.38, 'ritual'],
      ['Elite Incursion', 'Defeat the regional apex for the strongest reward.', 'hard', 1.34, 1.48, 'boss']
    ];
    if (region.id === 'endless') {
      const run = state.progress.endlessRun;
      const depth = Math.max(1, run?.active ? Number(run.depth || 0) + 1 : Number(state.progress.endlessDepth || 0) + 1);
      const sovereign = Object.entries(D.ENDGAME_BOSSES).find(([, boss]) => Number(boss.depth) === depth);
      const encounter = D.ENDLESS_ENCOUNTERS[(depth - 1) % D.ENDLESS_ENCOUNTERS.length];
      const objectiveType = sovereign ? 'boss' : encounter.objectiveType;
      const baseMission = {
        id: `${region.id}_descent_${depth}`, name: sovereign ? `Sovereign Depth ${depth} · ${sovereign[1].name}` : `Descent ${depth} · ${encounter.name}`,
        description: `${run?.active ? 'Continue with the cached haul at risk. ' : ''}${sovereign ? sovereign[1].mechanicText : encounter.text}`,
        difficulty: 'endless', baseThreat: (1.25 + depth * .08) * Number(encounter.threat || 1), baseReward: (1.3 + depth * .08) * Number(encounter.reward || 1),
        threat: (1.25 + depth * .08) * Number(encounter.threat || 1), reward: (1.3 + depth * .08) * Number(encounter.reward || 1),
        level: base + depth - 1, boss: objectiveType === 'boss', objectiveType, depth, encounterId: encounter.id,
        survivalSeconds: Number(encounter.survivalSeconds || 0), forcedBossId: sovereign?.[0] || null, principalFinal: Boolean(sovereign?.[1]?.principal),
        endlessModifiers: endlessModifierIds(depth, state.progress.endlessDepth || 0), contracts: []
      };
      return [applyMissionContracts(baseMission, [])];
    }
    if (region.id === 'mountains') {
      const completed = Number(state.progress.mountainSequence || 0);
      return D.MOUNTAIN_CAMPAIGN.map(stage => applyMissionContracts({
        ...deepClone(stage),
        baseThreat: stage.threat,
        baseReward: stage.reward,
        level: Math.max(base + stage.stage - 1, state.hero.level + stage.stage - 2),
        locked: stage.stage > completed + 1,
        completed: stage.stage <= completed,
        contracts: [], endlessModifiers: []
      }, []));
    }
    const standard = names.map(([name, description, difficulty, threat, reward, objectiveType], index) => {
      const id = `${region.id}_${objectiveType}`;
      return applyMissionContracts({
        id,
        name: objectiveType === 'boss' && regionIndex === state.progress.unlockedRegion ? `${name}: Region Boss` : name,
        description, difficulty, baseThreat: threat, baseReward: reward, threat, reward,
        level: Math.max(base, state.hero.level + index - 1),
        boss: objectiveType === 'boss', objectiveType, completed: Number(state.progress.missionRecords?.[id]?.clears || 0) > 0,
        survivalSeconds: objectiveType === 'survival' ? 18 + regionIndex * 1.5 : 0, contracts: [], endlessModifiers: []
      }, []);
    });
    const hunts = Object.entries(D.NAMED_ELITES)
      .filter(([, elite]) => elite.regionId === region.id)
      .map(([id, elite], index) => applyMissionContracts({
        id: `${region.id}_hunt_${id}`,
        name: `Hunt · ${elite.name}`,
        completed: Number(state.progress.missionRecords?.[`${region.id}_hunt_${id}`]?.clears || 0) > 0,
        description: elite.text,
        difficulty: index === 0 ? 'normal' : 'hard',
        baseThreat: 1.08 + regionIndex * .025 + index * .1,
        baseReward: Number(elite.reward || 1.35),
        threat: 1.08 + regionIndex * .025 + index * .1,
        reward: Number(elite.reward || 1.35),
        level: Math.max(base, state.hero.level + index),
        boss: false,
        objectiveType: 'elite',
        forcedNamedEliteId: id,
        contracts: [], endlessModifiers: [], namedHunt: true
      }, []));
    return [...standard, ...hunts];
  }

  function roomTypeFor(random, mission, layerIndex, regionIndex, boss = false) {
    if (boss) return 'boss';
    const hardBias = mission.difficulty === 'hard' || mission.difficulty === 'endless';
    const base = {
      battle: 30,
      swarm: hardBias ? 20 : 13,
      ranged: 15,
      elite: hardBias ? 18 : 9,
      treasure: 10,
      shrine: 8,
      hazard: 10 + layerIndex * 2
    };
    const region = D.REGIONS[regionIndex];
    const changes = D.REGION_RULES[region.id]?.roomWeights || {};
    Object.entries(changes).forEach(([type, amount]) => { base[type] = Math.max(1, (base[type] || 0) + amount); });
    return weightedPick(random, Object.entries(base).map(([value, weight]) => ({ value, weight })));
  }

  function generateDungeon(regionIndex, mission, seed = Date.now()) {
    const random = rng(seed);
    const region = D.REGIONS[regionIndex];
    const rule = D.REGION_RULES[region.id];
    const modifiers = missionModifiers(mission);
    const bossPool = rule?.bosses || [];
    const priorBossClears = Number(state.progress.bossClears[region.id] || 0);
    const bossId = mission.forcedBossId || (bossPool.length ? bossPool[(priorBossClears + Math.floor(random() * bossPool.length)) % bossPool.length] : null);
    const namedPool = Object.entries(D.NAMED_ELITES).filter(([, elite]) => elite.regionId === region.id).map(([id]) => id);
    const templates = [
      [8, 50], [23, 26], [23, 74], [41, 13], [43, 43], [41, 86],
      [61, 27], [62, 72], [78, 14], [79, 50], [93, 50]
    ];
    const edges = [
      [0,1], [0,2], [1,3], [1,4], [2,4], [2,5], [3,6], [4,6], [4,7], [5,7],
      [6,8], [6,9], [7,9], [8,9], [8,10], [9,10]
    ];
    const nodes = templates.map(([x, y], index) => {
      const finalNode = index === templates.length - 1;
      let type = index === 0 ? 'start' : finalNode ? (mission.objectiveType === 'clear' ? 'battle' : (mission.objectiveType || (mission.boss ? 'boss' : 'elite'))) : roomTypeFor(random, mission, Math.floor(index / 2), regionIndex);
      if (index === 3 && type === 'shrine') type = 'treasure';
      if (index === 5 && type === 'elite') type = 'shrine';
      let namedEliteId = null;
      if (type === 'elite') {
        if (finalNode && mission.forcedNamedEliteId) namedEliteId = mission.forcedNamedEliteId;
        else if (namedPool.length && random() < (mission.difficulty === 'hard' || mission.difficulty === 'endless' ? .46 : .3)) namedEliteId = pick(random, namedPool);
      }
      const named = namedEliteId ? D.NAMED_ELITES[namedEliteId] : null;
      const baseRisk = D.ROOM_TYPES[type].risk;
      const affixCount = Math.min(4, (mission.difficulty === 'easy' ? 1 : mission.difficulty === 'normal' ? 1 : 2) + modifiers.eliteAffixBonus + (mission.difficulty === 'endless' && Number(mission.depth || 0) >= 8 ? 1 : 0));
      return {
        id: index,
        x: x + randomInt(random, -2, 2),
        y: y + randomInt(random, -3, 3),
        type,
        risk: round(baseRisk * mission.threat * (1 + regionIndex * .08) * Number(named?.reward || 1), 2),
        reward: round(D.ROOM_TYPES[type].reward * mission.reward * Number(named?.reward || 1), 2),
        seed: Math.floor(random() * 2 ** 31),
        hazard: type === 'hazard' ? deepClone(rule?.hazard || null) : null,
        namedEliteId,
        eliteAffixes: type === 'elite' ? rollEliteAffixes(random, affixCount, [...(modifiers.forcedEliteAffixes || []), ...(named?.affixes || [])]) : [],
        survivalSeconds: type === 'survival' ? Number(mission.survivalSeconds || 18) : 0,
        objectiveAnchors: type === 'ritual' ? 3 : 0,
        purgeWaves: type === 'purge' ? 3 : 0,
        visited: false
      };
    });
    return {
      id: `dungeon_${seed}`,
      seed,
      regionIndex,
      mission: deepClone(mission),
      nodes,
      edges,
      bossId,
      regionRule: deepClone(rule || null),
      modifiers: deepClone(modifiers),
      commandPoints: calculateStats().stats.commandPoints,
      generatedAt: Date.now(),
      objective: deepClone(D.MISSION_OBJECTIVES[mission.objectiveType] || D.MISSION_OBJECTIVES.clear),
      finalBoss: Boolean(mission.principalFinal)
    };
  }

  function adjacentNodes(dungeon, nodeId) {
    const ids = [];
    dungeon.edges.forEach(([a, b]) => {
      if (a === nodeId) ids.push(b);
      if (b === nodeId) ids.push(a);
    });
    return ids;
  }

  function validateRoute(dungeon, route) {
    if (!Array.isArray(route) || route.length < 2 || route[0] !== 0) return { ok: false, message: 'Route must begin at the entrance.' };
    if (route.length - 1 > dungeon.commandPoints) return { ok: false, message: 'Route exceeds available Command Points.' };
    const seen = new Set([0]);
    for (let i = 1; i < route.length; i += 1) {
      if (!adjacentNodes(dungeon, route[i - 1]).includes(route[i])) return { ok: false, message: 'Route contains a disconnected step.' };
      if (seen.has(route[i])) return { ok: false, message: 'A room cannot be entered twice.' };
      seen.add(route[i]);
    }
    return { ok: true };
  }

  function autoRoute(dungeon) {
    if (!dungeon?.nodes?.length) return { ok: false, route: [0], spent: 0, full: false, message: 'No dungeon is available to plan.' };
    const target = dungeon.nodes[dungeon.nodes.length - 1].id;
    const budget = Math.max(1, Math.round(Number(dungeon.commandPoints || 1)));
    const candidates = [];
    const visited = new Set([0]);
    const path = [0];
    const walk = nodeId => {
      const spent = path.length - 1;
      if (spent > budget) return;
      if (nodeId === target) {
        candidates.push([...path]);
        return;
      }
      if (spent === budget) return;
      const nextNodes = adjacentNodes(dungeon, nodeId).sort((a, b) => a - b);
      nextNodes.forEach(next => {
        if (visited.has(next)) return;
        visited.add(next);
        path.push(next);
        walk(next);
        path.pop();
        visited.delete(next);
      });
    };
    walk(0);
    if (!candidates.length) return { ok: false, route: [0], spent: 0, full: false, message: 'No valid route reaches the objective.' };
    const score = route => {
      const rooms = route.slice(1).map(id => dungeon.nodes.find(node => node.id === id)).filter(Boolean);
      const utility = rooms.reduce((sum, node) => sum + Number(node.reward || 0) * 120 - Number(node.risk || 0) * 12
        + (node.type === 'treasure' ? 55 : 0) + (node.type === 'shrine' ? 38 : 0) + (node.type === 'elite' ? 24 : 0), 0);
      return (route.length - 1) * 100000 + utility;
    };
    const exact = candidates.filter(route => route.length - 1 === budget);
    const pool = exact.length ? exact : candidates;
    pool.sort((a, b) => score(b) - score(a) || a.join('-').localeCompare(b.join('-')));
    const route = pool[0];
    const spent = route.length - 1;
    return {
      ok: true,
      route,
      spent,
      full: spent === budget,
      message: spent === budget ? `Auto-route committed all ${budget} Command Points.` : `Auto-route found the longest valid path (${spent}/${budget} Command Points).`
    };
  }

  function getCampQuestState(questId, inputState = state) {
    const quest = D.CAMP_QUESTS[questId];
    if (!quest) return null;
    const stored = inputState.progress?.quests?.[questId] || {};
    return { progress: Math.max(0, Number(stored.progress || 0)), claimed: Boolean(stored.claimed), complete: Number(stored.progress || 0) >= quest.target };
  }

  function availableCampQuests(inputState = state) {
    return Object.entries(D.CAMP_QUESTS).filter(([, quest]) => {
      const regionIndex = D.REGIONS.findIndex(region => region.id === quest.regionId);
      return regionIndex >= 0 && regionIndex <= inputState.progress.unlockedRegion;
    }).map(([id, quest]) => ({ id, ...quest, state: getCampQuestState(id, inputState) }));
  }

  function updateCampQuests(result) {
    const region = D.REGIONS[result.regionIndex];
    if (!region) return [];
    const changed = [];
    Object.entries(D.CAMP_QUESTS).forEach(([id, quest]) => {
      if (quest.regionId !== region.id) return;
      const entry = state.progress.quests[id] || { progress: 0, claimed: false };
      const before = Number(entry.progress || 0);
      let progress = before;
      if (quest.type === 'expeditions' && result.success) progress += 1;
      else if (quest.type === 'elites') progress += Number(result.telemetry?.elitesKilled || 0);
      else if (quest.type === 'namedElite' && (result.namedElitesKilled || []).includes(quest.targetId)) progress += 1;
      else if (quest.type === 'namedElitesAny') progress += (result.namedElitesKilled || []).length;
      else if (quest.type === 'regionalLoot') progress += (result.loot || []).filter(item => item.regionId === region.id).length;
      else if (quest.type === 'contracts' && result.success) progress += (result.contracts || []).length;
      else if (quest.type === 'mountainStage') progress = Math.max(progress, Number(state.progress.mountainSequence || 0));
      else if (quest.type === 'endlessDepth') progress = Math.max(progress, Number(result.depth || 0));
      entry.progress = Math.min(quest.target, progress);
      state.progress.quests[id] = entry;
      if (entry.progress !== before) changed.push({ id, progress: entry.progress, complete: entry.progress >= quest.target });
    });
    return changed;
  }

  function claimCampQuest(questId) {
    const quest = D.CAMP_QUESTS[questId];
    const questState = getCampQuestState(questId);
    if (!quest || !questState) return { ok: false, message: 'Unknown camp quest.' };
    if (questState.claimed) return { ok: false, message: 'Quest reward already claimed.' };
    if (!questState.complete) return { ok: false, message: 'Quest objective is not complete.' };
    const reward = quest.reward || {};
    state.resources.gold += Math.max(0, Math.round(reward.gold || 0));
    state.resources.renown += Math.max(0, Math.round(reward.renown || 0));
    state.hero.skillPoints += Math.max(0, Math.round(reward.skillPoints || 0));
    if (reward.rune && D.RUNES[reward.rune]) state.hero.runes[reward.rune] = (state.hero.runes[reward.rune] || 0) + Math.max(1, Math.round(reward.count || 1));
    let item = null;
    if (reward.itemRarity && D.RARITIES[reward.itemRarity]) {
      const regionIndex = D.REGIONS.findIndex(region => region.id === quest.regionId);
      item = generateItem(Math.max(state.hero.level, D.REGIONS[regionIndex]?.level || 1), rng(hashString(`quest_${questId}_${state.meta.saveRevision}`)), { forceRarity: reward.itemRarity, forceRegional: true, regionIndex, source: 'camp-quest' });
      if (!addItemToInventory(item)) {
        state.resources.gold += item.sellValue;
        item = null;
      }
    }
    state.progress.quests[questId] = { progress: quest.target, claimed: true };
    save('camp-quest');
    return { ok: true, message: `${quest.name} reward claimed.`, item };
  }

  function addItemToInventory(item) {
    if (state.hero.inventory.length >= inventoryCapacity()) return false;
    state.hero.inventory.push(item);
    return true;
  }

  function rewardPackageFromResult(result) {
    return {
      gold: Math.round((result.gold || 0) * (1 + calculateStats().stats.goldFind)),
      xp: Math.max(0, Math.round(result.xp || 0)),
      loot: deepClone(result.loot || []),
      runes: { ...(result.runes || {}) },
      recipes: [...(result.recipes || [])]
    };
  }

  function applyRewardPackage(rewards) {
    const gold = Math.max(0, Math.round(rewards.gold || 0));
    state.resources.gold += gold;
    const previousLevel = state.hero.level;
    const previousSkillPoints = state.hero.skillPoints;
    const levels = grantXp(rewards.xp || 0);
    const newLevel = state.hero.level;
    const levelUp = levels ? {
      levels,
      previousLevel,
      newLevel,
      skillPointsGained: Math.max(0, state.hero.skillPoints - previousSkillPoints),
      unlockedSlots: slotUnlocksBetween(previousLevel, newLevel),
      nextUnlocks: D.SLOTS
        .filter(([slot]) => D.SLOT_UNLOCK_LEVEL[slot] > newLevel)
        .sort((a, b) => D.SLOT_UNLOCK_LEVEL[a[0]] - D.SLOT_UNLOCK_LEVEL[b[0]])
        .slice(0, 2)
        .map(([slot, label, glyph]) => ({ slot, label, glyph, level: D.SLOT_UNLOCK_LEVEL[slot] }))
    } : null;
    const acceptedLoot = [];
    const overflowGold = [];
    (rewards.loot || []).forEach(item => {
      if (addItemToInventory(item)) acceptedLoot.push(item);
      else {
        state.resources.gold += item.sellValue;
        overflowGold.push(item.sellValue);
      }
    });
    Object.entries(rewards.runes || {}).forEach(([rune, count]) => {
      if (!D.RUNES[rune]) return;
      state.hero.runes[rune] = (state.hero.runes[rune] || 0) + Math.max(0, Math.round(count));
    });
    (rewards.recipes || []).forEach(recipeId => {
      if (D.RUNEWORDS[recipeId] && !state.hero.recipes.includes(recipeId)) state.hero.recipes.push(recipeId);
    });
    return { gold, levels, acceptedLoot, overflowGold, levelUp };
  }

  function recordExpeditionProgress(result) {
    const region = D.REGIONS[result.regionIndex];
    if (!region) return;
    (result.namedElitesKilled || []).forEach(id => {
      if (D.NAMED_ELITES[id]) state.progress.namedEliteClears[id] = (state.progress.namedEliteClears[id] || 0) + 1;
    });
    (result.loot || []).forEach(item => {
      if (item.regionId && D.REGIONAL_LOOT[item.regionId]) state.progress.regionalFinds[item.regionId] = (state.progress.regionalFinds[item.regionId] || 0) + 1;
    });
    if (!result.success) {
      updateCampQuests(result);
      updateAchievements();
      return;
    }
    state.progress.regionClears[region.id] = (state.progress.regionClears[region.id] || 0) + 1;
    const objectiveType = result.objectiveType || 'clear';
    state.progress.objectiveClears[objectiveType] = (state.progress.objectiveClears[objectiveType] || 0) + 1;
    const buildIdentity = analyzeBuild().primary?.id;
    if (buildIdentity) state.progress.archetypeWins[buildIdentity] = (state.progress.archetypeWins[buildIdentity] || 0) + 1;
    const record = state.progress.missionRecords[result.missionId] || {};
    state.progress.missionRecords[result.missionId] = { clears: Number(record.clears || 0) + 1, bestTime: record.bestTime ? Math.min(record.bestTime, result.duration) : result.duration, bestHealth: Math.max(Number(record.bestHealth || 0), Number(result.heroHealthRatio || 0)) };
    const rank = { easy: 1, normal: 2, hard: 3, endless: 4 }[result.difficulty] || 1;
    state.progress.highestDifficulty[region.id] = Math.max(state.progress.highestDifficulty[region.id] || 0, rank);
    (result.contracts || []).forEach(id => {
      if (D.DIFFICULTY_CONTRACTS[id]) state.progress.contractMastery[id] = (state.progress.contractMastery[id] || 0) + 1;
    });
    (result.endlessModifiers || []).forEach(id => {
      if (D.ENDLESS_MODIFIERS[id]) state.progress.endlessModifiersSeen[id] = (state.progress.endlessModifiersSeen[id] || 0) + 1;
    });
    if (region.id === 'mountains' && result.campaignStage) {
      state.progress.mountainSequence = Math.max(state.progress.mountainSequence || 0, Number(result.campaignStage));
    }
    if (region.id === 'endless') {
      state.progress.endlessDepth = Math.max(state.progress.endlessDepth, Number(result.depth || 0));
    }
    if (result.bossKilled) {
      if (result.bossId) state.progress.bossesSeen[result.bossId] = (state.progress.bossesSeen[result.bossId] || 0) + 1;
      state.progress.bossClears[region.id] = (state.progress.bossClears[region.id] || 0) + 1;
      const mayUnlockNext = region.id !== 'mountains' || Boolean(result.campaignFinal) || state.progress.mountainSequence >= D.MOUNTAIN_CAMPAIGN.length;
      if (mayUnlockNext && result.regionIndex < D.REGIONS.length - 1) state.progress.unlockedRegion = Math.max(state.progress.unlockedRegion, result.regionIndex + 1);
      if (region.id === 'endless') {
        if (result.bossId && D.ENDGAME_BOSSES[result.bossId]) state.progress.endgameBossClears[result.bossId] = (state.progress.endgameBossClears[result.bossId] || 0) + 1;
        if (result.finalBoss) state.progress.finalBossDefeated = true;
      }
    }
    updateCampQuests(result);
    updateChallengesFromResult(result);
    updateAchievements();
  }

  function mergeEndlessRewards(run, rewards, depth) {
    run.active = true;
    run.depth = Math.max(Number(run.depth || 0), Number(depth || 0));
    run.gold = Math.max(0, Math.round(Number(run.gold || 0) + Number(rewards.gold || 0)));
    run.xp = Math.max(0, Math.round(Number(run.xp || 0) + Number(rewards.xp || 0)));
    run.loot = [...(run.loot || []), ...(rewards.loot || [])].slice(0, 120);
    Object.entries(rewards.runes || {}).forEach(([rune, count]) => {
      run.runes[rune] = (run.runes[rune] || 0) + count;
    });
    run.recipes = [...new Set([...(run.recipes || []), ...(rewards.recipes || [])])];
    return run;
  }

  function emptyEndlessRun() {
    return { active: false, depth: 0, gold: 0, xp: 0, loot: [], runes: {}, recipes: [] };
  }

  function achievementProgress(id, inputState = state) {
    const achievement = D.ACHIEVEMENTS[id];
    if (!achievement) return 0;
    if (achievement.type === 'expeditions') return Number(inputState.hero.lifetime.expeditions || 0);
    if (achievement.type === 'kills') return Number(inputState.hero.lifetime.kills || 0);
    if (achievement.type === 'bosses') return Number(inputState.hero.lifetime.bosses || 0);
    if (achievement.type === 'namedEliteUnique') return Object.keys(inputState.progress.namedEliteClears || {}).filter(key => inputState.progress.namedEliteClears[key] > 0).length;
    if (achievement.type === 'mountainStage') return Number(inputState.progress.mountainSequence || 0);
    if (achievement.type === 'endlessDepth') return Number(inputState.progress.endlessDepth || 0);
    if (achievement.type === 'setThreshold') return Math.max(0, ...Object.values(calculateStats(inputState).setCounts || {}));
    if (achievement.type === 'runewords') return Number(inputState.progress.runewordsCrafted || 0);
    if (achievement.type === 'contracts') return Object.values(inputState.progress.contractMastery || {}).reduce((sum, value) => sum + Number(value || 0), 0);
    if (achievement.type === 'finalBoss') return inputState.progress.finalBossDefeated ? 1 : 0;
    return 0;
  }

  function updateAchievements() {
    const unlocked = [];
    Object.entries(D.ACHIEVEMENTS).forEach(([id, achievement]) => {
      if (state.progress.achievements[id]?.unlockedAt) return;
      if (achievementProgress(id) >= Number(achievement.target || 1)) {
        state.progress.achievements[id] = { unlockedAt: new Date().toISOString() };
        unlocked.push(id);
      }
    });
    return unlocked;
  }

      this.canvas.height = Math.floor(this.height * dpr);
      this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      this.hero.y = C.clamp(this.hero.y, 50, this.height - 50);
    }

    start() {
      if (this.running || this.completed) return;
      this.running = true;
      this.lastTime = performance.now();
      this.raf = requestAnimationFrame(this.boundFrame);
    }

    destroy() {
      this.running = false;
      if (typeof cancelAnimationFrame === 'function') cancelAnimationFrame(this.raf);
      if (this._resizeHandler) window.removeEventListener('resize', this._resizeHandler);
      if (this._visibilityHandler) document.removeEventListener('visibilitychange', this._visibilityHandler);
    }

    advanceSimulation(seconds) {
      if (this.completed || this.paused || seconds <= 0) return;
      this.accumulator += seconds;
      const maximumSteps = Math.ceil(this.maxBackgroundCatchup / this.fixedStep);
      let steps = 0;
      while (this.accumulator >= this.fixedStep && !this.completed && steps < maximumSteps) {
        this.step(this.fixedStep);
        this.accumulator -= this.fixedStep;
        this.simulationTicks += 1;
        steps += 1;
      }
      if (steps >= maximumSteps) this.accumulator = 0;
    }

    frame(time) {
      if (!this.running) return;
      const raw = Math.min(this.maxFrameDelta, Math.max(0, (time - this.lastTime) / 1000));
      this.lastTime = time;
      if (!this.paused && !this.completed) this.advanceSimulation(raw * this.speed);
      else if (this.completed && this.completionHold > 0) {
        this.updatePresentation(raw);
        this.completionHold = Math.max(0, this.completionHold - raw);
      }
      try {
        this.render();
      } catch (error) {
        // Presentation must never terminate the deterministic expedition loop.
        // Clear transient overlays and retry with presentation disabled so the
        // route can still resolve and reach its result screen.
        const message = error && error.message ? error.message : String(error);
        if (this.lastRenderError !== message) {
          this.lastRenderError = message;
          this.logMessage(`Visual fallback activated: ${message}`, 'info');
        }
        this.presentation.lootReveal = null;
        this.presentation.roomBanner = null;
        this.presentation.bossIntro = null;
        this.presentationEnabled = false;
        try { this.render(); } catch (_) { /* simulation and HUD continue */ }
      }
      if (this.options.onHud) this.options.onHud(this.snapshot());
      if (this.completed && this.completionHold <= 0) this.notifyComplete();
      if (this.running && (!this.completed || this.completionHold > 0)) this.raf = requestAnimationFrame(this.boundFrame);
    }

    notifyComplete() {
      if (this.completionNotified) return;
      this.completionNotified = true;
      this.running = false;
      if (this.options.onComplete) this.options.onComplete(this.result);
    }

    snapshot() {
      const living = alive(this.enemies);
      const currentTarget = this.hero.targetId ? living.find(enemy => enemy.id === this.hero.targetId) : null;
      const focusTarget = (currentTarget && (currentTarget.role === 'boss' || currentTarget.role === 'elite' || currentTarget.namedEliteId) ? currentTarget : null)
        || living.find(enemy => enemy.role === 'boss')
        || living.find(enemy => enemy.namedEliteId)
        || living.find(enemy => enemy.role === 'elite')
        || null;
      return {
        phase: this.phase, room: this.room, roomCursor: this.roomCursor,
        roomCount: this.route.length - 1, hp: this.hero.hp, maxHp: this.hero.maxHp,
        barrier: this.hero.barrier, enemies: living.length,
        focusTarget: focusTarget ? {
          id: focusTarget.id, name: focusTarget.name || 'Elite enemy', role: focusTarget.role || 'elite', icon: focusTarget.icon || '◆',
          hp: Math.max(0, focusTarget.hp), maxHp: Math.max(1, focusTarget.maxHp), barrier: Math.max(0, focusTarget.barrier || 0),
          namedEliteId: focusTarget.namedEliteId || null, eliteAffixes: [...(focusTarget.eliteAffixes || [])]
        } : null,
        cooldowns: { ...this.hero.cooldowns }, statuses: { ...this.hero.statuses },
        paused: this.paused, speed: this.speed, clock: this.totalClock, simulationTicks: this.simulationTicks, shake: this.shake,
        visualQuality: this.visualQuality, heroAnimation: this.hero.visual?.state || 'idle',
        presentation: { roomBanner: this.presentation.roomBanner, bossIntro: this.presentation.bossIntro, lastEvent: this.presentation.lastEvent },
        eliteAffixes: [...new Set(living.flatMap(enemy => enemy.eliteAffixes || []))],
        tacticalRoles: [...new Set(living.map(enemy => enemy.behavior).filter(Boolean))],
        log: this.log.slice(-40), completed: this.completed, result: this.result
      };
    }

    logMessage(message, type = 'info') {
      const entry = { id: C.uid('log'), time: this.totalClock, message, type };
      this.log.push(entry);
      if (this.log.length > 120) this.log.shift();
      if (this.options.onLog) this.options.onLog(entry);
    }

    setSpeed(speed) { this.speed = [1, 2, 4].includes(speed) ? speed : 1; }
    togglePause() {
      this.paused = !this.paused;
      this.manualPaused = this.paused;
      this.autoPausedHidden = false;
      this.lastTime = typeof performance !== 'undefined' ? performance.now() : Date.now();
    }

    step(dt) {
      if (this.completed) return;
      this.totalClock += dt;
      this.updateEffects(dt);
      this.updatePresentation(dt);
      if (this.phase === 'travel') this.updateTravel(dt);
      else if (this.phase === 'combat') this.updateCombat(dt);
      else if (this.phase === 'interaction') this.updateInteraction(dt);
      else if (this.phase === 'roomClear') this.updateRoomClear(dt);
      else if (this.phase === 'transitionOut') this.updateTransitionOut(dt);
      else if (this.phase === 'transitionBlur') this.updateTransitionBlur(dt);
      else if (this.phase === 'transitionIn') this.updateTransitionIn(dt);
      if (this.hero.hp <= 0 && !this.completed) this.handleHeroDeath();
    }

    updatePresentation(dt) {
      if (!this.presentationEnabled) {
        this.enemies.forEach(enemy => { if (enemy.hp <= 0) enemy.deathTimer = Number(enemy.deathTimer || 0) + dt; });
        return;
      }
      const p = this.presentation;
      p.clock += dt;
      p.flash = Math.max(0, p.flash - dt * 3.8);
      p.vignette = Math.max(0, p.vignette - dt * 2.6);
      if (p.roomBanner) { p.roomBanner.time -= dt; if (p.roomBanner.time <= 0) p.roomBanner = null; }
      if (p.lootReveal) { p.lootReveal.time -= dt; if (p.lootReveal.time <= 0) p.lootReveal = null; }
      p.roomTransition = ['transitionOut', 'transitionBlur', 'transitionIn'].includes(this.phase)
        ? lerp(Number(p.roomTransition || 0), this.phase === 'transitionBlur' ? 1 : .55, Math.min(1, dt * 10))
        : lerp(Number(p.roomTransition || 0), 0, Math.min(1, dt * 12));
      if (p.bossIntro) {
        p.bossIntro.time -= dt;
        if (p.bossIntro.time <= 0) { p.bossIntro = null; p.camera.targetZoom = 1; }
      }
      p.camera.trauma = Math.max(0, p.camera.trauma - dt * 2.5);
      p.camera.targetZoom = lerp(p.camera.targetZoom, 1, Math.min(1, dt * 1.7));
      p.camera.zoom = lerp(p.camera.zoom, p.camera.targetZoom, Math.min(1, dt * 8));
      const focusTarget = this.phase === 'combat' && this.hero.targetId ? this.enemies.find(e => e.id === this.hero.targetId) : null;
      const desiredX = focusTarget ? (this.hero.x + focusTarget.x) * .5 : this.width * .5;
      const desiredY = focusTarget ? (this.hero.y + focusTarget.y) * .5 : this.height * .5;
      p.camera.focusX = lerp(p.camera.focusX, desiredX, Math.min(1, dt * 2.2));
      p.camera.focusY = lerp(p.camera.focusY, desiredY, Math.min(1, dt * 2.2));

      const heroVisual = this.hero.visual;
      if (heroVisual) {
        heroVisual.stride += dt * (heroVisual.state === 'run' ? 10 : 3);
        heroVisual.recoil = Math.max(0, Number(heroVisual.recoil || 0) - dt * 6);
        if (heroVisual.time > 0) heroVisual.time -= dt;
        if (heroVisual.time <= 0 && !['death', 'victory'].includes(heroVisual.state)) {
          heroVisual.state = ['travel', 'transitionOut', 'transitionIn', 'interaction'].includes(this.phase) ? 'run' : 'idle';
        }
      }
      this.enemies.forEach(enemy => {
        if (!enemy.visual) return;
        enemy.visual.stride += dt * (enemy.visual.state === 'advance' ? 7 : 2);
        enemy.visual.recoil = Math.max(0, Number(enemy.visual.recoil || 0) - dt * 5);
        if (enemy.visual.time > 0) enemy.visual.time -= dt;
        if (enemy.visual.time <= 0 && enemy.hp > 0) enemy.visual.state = 'idle';
        if (enemy.hp <= 0) { enemy.visual.death = Math.min(1, Number(enemy.visual.death || 0) + dt * 3.1); enemy.deathTimer = Number(enemy.deathTimer || 0) + dt; }
      });
    }

    updateEffects(dt) {
      this.shake = Math.max(0, this.shake - dt);
      if (this.hero.statuses.frost && this.procs.has('winterGuard') && !this.hero.flags.winterGuardActive) {
        this.hero.flags.winterGuardActive = true;
        const before = this.hero.barrier;
        this.hero.barrier = Math.min(this.hero.maxHp * .7, this.hero.barrier + this.hero.maxHp * .16);
        this.telemetry.barrierGained += Math.max(0, this.hero.barrier - before);
        this.logMessage('Frostwarden Guard crystallizes into a protective barrier.', 'proc');
        this.spawnParticles(this.hero.x, this.hero.y, 14, '#d7efff');
      }
      if (!this.hero.statuses.frost) this.hero.flags.winterGuardActive = false;
      const coldRate = this.hero.statuses.frost ? (this.procs.has('winterglass') ? .9 : .72) : 1;
      const nullRate = this.hero.statuses.nullHex ? (this.procs.has('winterglass') ? .88 : .72) : 1;
      const cooldownRate = coldRate * nullRate * this.cooldownMultiplier;
      Object.keys(this.hero.cooldowns).forEach(id => {
        this.hero.cooldowns[id] = Math.max(0, this.hero.cooldowns[id] - dt * cooldownRate);
      });

      if (this.hero.statuses.bleed) {
        this.hero.flags.bleedTick = (this.hero.flags.bleedTick || 0) - dt;
        if (this.hero.flags.bleedTick <= 0) {
          this.hero.flags.bleedTick = .7;
          const dealt = this.applyHeroDamage(this.hero.maxHp * .0065, { name: 'Briar Bleeding', role: 'dot' }, true);
          this.telemetry.statusDamage += dealt;
        }
      }

      Object.keys(this.hero.statuses).forEach(key => {
        this.hero.statuses[key] -= dt;
        if (this.hero.statuses[key] <= 0) delete this.hero.statuses[key];
      });
      const liveTexts = [];
      this.damageTexts.forEach(text => { text.y -= 24 * dt; text.life -= dt; if (text.life > 0) liveTexts.push(text); else this.releaseDamageText(text); });
      this.damageTexts = liveTexts;
      const liveParticles = [];
      this.particles.forEach(particle => {
        particle.x += particle.vx * dt; particle.y += particle.vy * dt; particle.life -= dt;
        particle.vx *= Math.pow(Number(particle.drag || .94), dt * 60); particle.vy *= Math.pow(Number(particle.drag || .94), dt * 60);
        if (particle.gravity) particle.vy += particle.gravity * dt;
        if (particle.life > 0) liveParticles.push(particle); else this.releaseParticle(particle);
      });
      this.particles = liveParticles;
      const liveProjectiles = [];
      this.projectiles.forEach(projectile => {
        const target = projectile.target === 'hero' ? this.hero : this.enemies.find(e => e.id === projectile.target);
        if (!target || target.hp <= 0) { this.releaseProjectile(projectile); return; }
        const dx = target.x - projectile.x;
        const dy = target.y - projectile.y;
        const len = Math.max(1, Math.hypot(dx, dy));
        projectile.angle = Math.atan2(dy, dx);
        projectile.prevX = projectile.x; projectile.prevY = projectile.y;
        projectile.x += (dx / len) * projectile.speed * dt;
        projectile.y += (dy / len) * projectile.speed * dt;
        projectile.life -= dt;
        if (len < Math.max(12, target.radius || 14) || projectile.life <= 0) {
          this.spawnImpact(projectile.x, projectile.y, projectile.color, projectile.impact, projectile.kind);
          this.emitPresentation('projectile-impact', { kind: projectile.kind, source: projectile.source });
          this.releaseProjectile(projectile);
        } else liveProjectiles.push(projectile);
      });
      this.projectiles = liveProjectiles;
      this.trimPresentationPools();
      this.telemetry.maxParticles = Math.max(this.telemetry.maxParticles, this.particles.length);
      this.telemetry.maxDamageTexts = Math.max(this.telemetry.maxDamageTexts, this.damageTexts.length);
      this.telemetry.maxProjectiles = Math.max(this.telemetry.maxProjectiles, this.projectiles.length);
    }

    updateTravel(dt) {
      if (this.roomCursor >= this.route.length - 1) {
        this.finish(true);
        return;
      }
      this.travelProgress += dt * (.86 + this.stats.moveSpeed * .44);
      const startX = -38;
      const endX = this.width * .18;
      this.setHeroAnimation('run', .12, { facing: 1 });
      this.hero.x = startX + (endX - startX) * easeOut(Math.min(1, this.travelProgress));
      this.hero.y = this.height / 2 + Math.sin(this.totalClock * 5) * 3;
      if (this.travelProgress >= 1) {
        this.travelProgress = 0;
        this.roomCursor += 1;
        const nodeId = this.route[this.roomCursor];
        this.enterRoom(this.dungeon.nodes.find(node => node.id === nodeId));
      }
    }

    enterRoom(room, fromTransition = false) {
      this.room = room;
      this.roomClock = 0;
      this.interactionClock = 0;
      this.roomObject = null;
      this.pendingRoomPhase = null;
      this.hero.roomEchoUsed = false;
      this.hero.x = fromTransition ? -42 : this.width * .18;
      this.hero.y = this.height / 2;
      this.hero.flags = {};
      const roomLabel = room.namedEliteId ? D.NAMED_ELITES[room.namedEliteId]?.name || D.ROOM_TYPES[room.type].label : D.ROOM_TYPES[room.type].label;
      this.logMessage(`Entered ${D.ROOM_TYPES[room.type].label}.`, 'room');
      const objectiveInfo = D.MISSION_OBJECTIVES[this.dungeon.mission.objectiveType] || D.MISSION_OBJECTIVES.clear;
      const specialObjective = ['purge', 'relic', 'survival', 'ritual'].includes(room.type);
      this.showRoomBanner(roomLabel, room.namedEliteId ? 'Named hunt' : room.type === 'boss' ? 'Regional apex' : specialObjective ? objectiveInfo.name : `Room ${this.roomCursor} of ${this.route.length - 1}`, room.type === 'boss' || room.namedEliteId ? 'boss' : 'room');
      this.setHeroAnimation(fromTransition ? 'run' : 'idle', .3, { facing: 1 });

      if (room.type === 'shrine') {
        this.roomObject = { type: 'well', x: this.width * .73, y: this.height * .5, state: 'idle', progress: 0 };
        this.pendingRoomPhase = 'interaction';
      } else {
        if (room.type === 'treasure') this.roomObject = { type: 'chest', x: this.width * .75, y: this.height * .52, state: 'closed', progress: 0 };
        if (room.type === 'hazard') {
          const hazard = room.hazard || this.dungeon.regionRule?.hazard || { name: 'Dungeon Hazard', damage: .12 };
          const raw = this.hero.maxHp * Number(hazard.damage || .12) * room.risk;
          const damage = raw * (1 - C.clamp(this.stats.hazardResist, 0, .8));
          this.telemetry.hazardsTaken += damage;
          this.applyHeroDamage(damage, { name: hazard.name, role: 'hazard' }, true);
          if (hazard.status === 'voidScar') {
            const anchorMult = this.procs.has('voidAnchor') || this.procs.has('finalLantern') ? .45 : 1;
            const reduction = Math.min(this.stats.maxHealth * .24, this.stats.maxHealth * .08) * anchorMult;
            this.hero.maxHp = Math.max(this.stats.maxHealth * .55, this.hero.maxHp - reduction);
            this.hero.hp = Math.min(this.hero.hp, this.hero.maxHp);
            this.hero.statuses.voidScar = 999;
            this.logMessage(`${hazard.name} permanently reduces maximum health for this expedition.`, 'bad');
          } else if (hazard.status) {
            this.hero.statuses[hazard.status] = Math.max(this.hero.statuses[hazard.status] || 0, Number(hazard.duration || 5));
            this.logMessage(`${hazard.name}: ${hazard.text}`, 'bad');
          }
        }
        this.spawnRoom(room);
        this.pendingRoomPhase = this.enemies.length ? 'combat' : (this.roomObject ? 'interaction' : 'roomClear');
      }

      if (this.pendingRoomPhase === 'combat') this.applyRoomEntryBuildEffects();
      if (fromTransition) this.phase = 'transitionIn';
      else if (this.pendingRoomPhase === 'interaction') this.beginInteraction(this.roomObject?.type || 'well');
      else this.phase = this.pendingRoomPhase;
    }

    applyRoomEntryBuildEffects() {
      if (this.procs.has('rootbound')) {
        this.healHero(this.hero.maxHp * .045, 'Rootbound');
        this.hero.statuses.rootbound = 4;
        this.logMessage('Rootbound steadies the hero on room entry.', 'proc');
      }
      if (this.procs.has('steadyGuard')) {
        const gain = this.hero.maxHp * (this.procs.has('barrierDiscipline') ? .12 : .08);
        const before = this.hero.barrier;
        this.hero.barrier = Math.min(this.hero.maxHp * .45, this.hero.barrier + gain);
        this.telemetry.barrierGained += Math.max(0, this.hero.barrier - before);
        this.logMessage('Steady Guard raises a barrier on room entry.', 'proc');
      }
      if (this.procs.has('deepForge')) {
        const refinedRanks = Object.values(this.state.hero.equipment || {}).reduce((sum, item) => sum + Number(item?.refinement || 0), 0);
        if (refinedRanks > 0) {
          const gain = Math.min(this.hero.maxHp * .14, refinedRanks * this.hero.maxHp * .012);
          const before = this.hero.barrier;
          this.hero.barrier = Math.min(this.hero.maxHp * .55, this.hero.barrier + gain);
          this.telemetry.barrierGained += Math.max(0, this.hero.barrier - before);
          this.logMessage('Deep Forge turns refinement into a room-entry ward.', 'proc');
        }
      }
      if (this.state.hero.equippedAbilities.includes('rally')) {
        this.hero.statuses.rally = 5;
        this.logMessage('Rally activates: increased damage and movement speed.', 'ability');
      }
    }

    beginInteraction(type) {
      this.interactionClock = 0;
      this.phase = 'interaction';
      if (this.roomObject) this.roomObject.state = 'approach';
      this.hero.targetId = null;
      this.setHeroAnimation('run', .18, { facing: 1 });
      this.emitPresentation(type === 'chest' ? 'chest-approach' : 'well-approach', { room: this.roomCursor });
    }

    updateInteraction(dt) {
      const object = this.roomObject;
      if (!object) { this.completeCurrentRoom(); return; }
      this.interactionClock += dt;

      // Defensive progression contract: an interaction must never be able to
      // hold an expedition indefinitely because of a visual/presentation edge.
      if (!Number.isFinite(this.interactionClock) || this.interactionClock > 8) {
        this.logMessage('Interaction watchdog advanced the expedition.', 'info');
        this.completeCurrentRoom();
        return;
      }

      if (object.completed) {
        object.settleClock = Number(object.settleClock || 0) + dt;
        object.state = object.type === 'chest' ? 'opened' : 'active';
        this.setHeroAnimation('idle', .18, { facing: 1 });
        const settleDuration = object.type === 'chest' ? .72 : .46;
        if (object.settleClock >= settleDuration) {
          this.pendingRoomPhase = 'roomClear';
          this.completeCurrentRoom();
        }
        return;
      }

      const stopX = object.x - (object.type === 'chest' ? 62 : 70);
      if (this.hero.x < stopX) {
        this.setHeroAnimation('run', .12, { facing: 1 });
        this.hero.x = Math.min(stopX, this.hero.x + (145 + this.stats.moveSpeed * 75) * dt);
        this.hero.y = lerp(this.hero.y, object.y + 12, Math.min(1, dt * 4));
        return;
      }
      this.setHeroAnimation('cast', .3, { facing: 1, castKind: object.type });
      object.progress = Math.min(1, Number(object.progress || 0) + dt * 1.65);
      object.state = object.progress >= .18 ? 'active' : 'opening';
      if (object.progress < 1) return;

      object.completed = true;
      object.settleClock = 0;
      object.completedAt = this.totalClock;
      if (object.type === 'well') {
        const amount = this.hero.maxHp * (.28 + this.stats.potionPower);
        this.healHero(amount, 'Regeneration Well');
        this.telemetry.gold += Math.round(4 * this.room.reward);
        this.spawnVfx('sigil', object.x, object.y, { color: '#67d6c6', count: 24, speed: 88, life: .72, size: 4, priority: 5 });
        this.emitPresentation('well-activate', { amount: Math.round(amount), room: this.roomCursor });
        this.logMessage('The Regeneration Well answers with a restorative pulse.', 'good');
      } else if (object.type === 'chest') {
        object.state = 'opened';
        const item = C.generateItem(this.dungeon.mission.level, this.random, {
          luck: this.stats.luck + .16,
          source: 'treasure',
          regionIndex: this.dungeon.regionIndex
        });
        this.previewLoot.push(item);
        this.presentation.lootReveal = { item, time: 2.2, duration: 2.2 };
        this.spawnVfx('critical', object.x, object.y - 26, { color: '#e1bd61', count: 22, speed: 110, life: .72, size: 4, priority: 6 });
        this.emitPresentation('chest-open', { itemName: item.name, rarity: item.rarity, room: this.roomCursor });
        this.logMessage(`Chest opened: ${item.name}.`, 'loot');
      }
    }

    completeCurrentRoom() {
      if (!this.room || this.phase === 'roomClear') return;
      if (['purge', 'relic', 'ritual'].includes(this.room.type) && !this.telemetry.objectivesCompleted.includes(this.room.type)) {
        this.telemetry.objectivesCompleted.push(this.room.type);
        this.emitPresentation('objective-complete', { objectiveType: this.room.type, room: this.roomCursor });
      }
      this.telemetry.roomsCleared += 1;
      this.telemetry.roomTimes.push(this.roomClock);
      this.telemetry.gold += Math.round((6 + this.room.risk * 7) * this.room.reward);
      this.healHero(this.hero.maxHp * (.04 + Number(this.stats.roomHeal || 0)), 'Breathing room');
      this.phase = 'roomClear';
      this.roomClock = 0;
      this.setHeroAnimation('victory', .5, { victory: .46 });
      if (this.room.type !== 'boss') this.showRoomBanner('Room cleared', `${this.telemetry.kills} total kills · ${Math.round(this.hero.hp / this.hero.maxHp * 100)}% health`, 'clear', .82);
      this.emitPresentation('room-clear', { roomType: this.room.type, room: this.roomCursor });
      this.logMessage(`${D.ROOM_TYPES[this.room.type].label} cleared.`, 'good');
    }

    updateTransitionOut(dt) {
      this.transitionClock += dt;
      this.setHeroAnimation('run', .12, { facing: 1 });
      this.hero.x += (210 + this.stats.moveSpeed * 92) * dt;
      this.hero.y += Math.sin(this.totalClock * 7) * .22;
      if (this.hero.x > this.width + 42) {
        this.phase = 'transitionBlur';
        this.transitionClock = 0;
        this.emitPresentation('room-transition', { direction: 'right', room: this.roomCursor });
      }
    }

    updateTransitionBlur(dt) {
      this.transitionClock += dt;
      if (this.transitionClock < (this.state.settings.reducedMotion ? .08 : .24)) return;
      this.transitionClock = 0;
      this.enemies = [];
      this.projectiles.forEach(projectile => this.releaseProjectile(projectile));
      this.projectiles = [];
      this.roomCursor += 1;
      const nodeId = this.route[this.roomCursor];
      this.enterRoom(this.dungeon.nodes.find(node => node.id === nodeId), true);
    }

    updateTransitionIn(dt) {
      this.transitionClock += dt;
      this.setHeroAnimation('run', .12, { facing: 1 });
      const destination = this.width * .18;
      this.hero.x = Math.min(destination, this.hero.x + (210 + this.stats.moveSpeed * 92) * dt);
      this.hero.y = lerp(this.hero.y, this.height * .5, Math.min(1, dt * 5));
      if (this.hero.x >= destination - .5) {
        this.hero.x = destination;
        this.phase = this.pendingRoomPhase || 'combat';
        this.transitionClock = 0;
        if (this.phase === 'interaction') this.beginInteraction(this.roomObject?.type || 'well');
        else this.setHeroAnimation('idle', .24, { facing: 1 });
      }
    }

    spawnRoom(room) {
      const region = D.REGIONS[this.dungeon.regionIndex];
      const pool = D.ENEMIES[region.enemyKey];
      const regionMods = this.dungeon.regionRule?.enemyMods || {};
      const encounterMods = this.modifiers.enemy || {};
      const bossTemplate = room.type === 'boss' ? D.BOSSES[this.dungeon.bossId] : null;
      const namedTemplate = room.namedEliteId ? D.NAMED_ELITES[room.namedEliteId] : null;
      const levelScale = 1 + Math.max(0, this.dungeon.mission.level - 1) * .14;
      let count = 5;
      if (room.type === 'swarm') count = 11;
      if (room.type === 'ranged') count = 7;
