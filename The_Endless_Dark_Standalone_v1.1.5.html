      if (room.type === 'elite') count = 5;
      if (room.type === 'treasure') count = 3;
      if (room.type === 'boss') count = 6;
      if (room.type === 'purge') count = 12;
      if (room.type === 'relic') count = 7;
      if (room.type === 'survival') count = 9;
      if (room.type === 'ritual') count = 7;
      count = Math.max(1, Math.round(
        count * C.clamp(.9 + (room.risk - 1) * .22, .8, 1.3)
        * Number(regionMods.count || 1) * Number(encounterMods.count || 1)
      ));
      if (room.type === 'boss') count = Math.min(count, 9);
      else count = Math.min(count, 22);
      if (room.type === 'survival') {
        this.telemetry.objectiveTarget = Number(room.survivalSeconds || this.dungeon.mission.survivalSeconds || 18);
        if (!Number.isFinite(this.telemetry.survivalSeconds)) this.telemetry.survivalSeconds = 0;
      }
      if (room.type === 'purge') {
        this.telemetry.objectiveTarget = Number(room.purgeWaves || 3);
        if (!Number.isFinite(room.remainingWaves)) room.remainingWaves = Number(room.purgeWaves || 3) - 1;
      }
      if (room.type === 'ritual') this.telemetry.objectiveTarget = Number(room.objectiveAnchors || 3);

      const byRole = role => pool.filter(entry => entry.role === role);
      const rangedPool = pool.filter(entry => entry.role === 'ranged' || entry.role === 'support');
      const meleePool = pool.filter(entry => entry.role === 'melee');
      const brutePool = pool.filter(entry => entry.role === 'brute');
      const enemies = [];
      for (let i = 0; i < count; i += 1) {
        let template;
        if (room.type === 'ranged') template = this.random() < .72 ? C.pick(this.random, rangedPool.length ? rangedPool : pool) : C.pick(this.random, meleePool.length ? meleePool : pool);
        else if (room.type === 'swarm') template = C.pick(this.random, meleePool.length ? meleePool : pool);
        else if ((room.type === 'elite' && i === 0) || (room.type === 'boss' && i === 0)) template = C.pick(this.random, brutePool.length ? brutePool : pool);
        else template = C.pick(this.random, pool);
        const isBoss = room.type === 'boss' && i === 0;
        const isElite = isBoss || (room.type === 'elite' && i === 0);
        const isNamedElite = Boolean(namedTemplate && room.type === 'elite' && i === 0);
        const hpScale = levelScale * room.risk * (isElite ? 1.85 : 1) * (isBoss ? Number(bossTemplate?.hpMult || 2.8) : 1) * (isNamedElite ? 1.22 : 1) * Number(encounterMods.health || 1);
        const dmgScale = levelScale * Math.sqrt(room.risk) * (isElite ? 1.35 : 1) * (isBoss ? Number(bossTemplate?.damageMult || 1.5) : 1) * (isNamedElite ? 1.14 : 1);
        const role = isBoss ? 'boss' : (isElite ? 'elite' : template.role);
        const ranged = Number(bossTemplate?.range || template.range || 34);
        const eliteAffixes = isElite && !isBoss ? [...(room.eliteAffixes || [])] : [];
        const maxHp = template.hp * hpScale;
        const enemy = {
          id: C.uid('enemy'),
          name: isBoss ? (bossTemplate?.name || `${region.name} Warden`) : isNamedElite ? namedTemplate.name : template.name,
          bossId: isBoss ? this.dungeon.bossId : null,
          namedEliteId: isNamedElite ? room.namedEliteId : null,
          role,
          x: this.width * (.62 + this.random() * .28),
          y: 90 + this.random() * Math.max(220, this.height - 180),
          radius: isBoss ? 28 : isElite ? 21 : template.role === 'brute' ? 18 : template.role === 'support' ? 15 : 13,
          hp: maxHp,
          maxHp,
          barrier: 0,
          damage: template.damage * dmgScale * .76 * Number(regionMods.damage || 1) * Number(encounterMods.damage || 1),
          speed: template.speed * (isBoss ? Number(bossTemplate?.speedMult || .9) : 1) * Number(encounterMods.speed || 1),
          range: ranged,
          armor: (template.armor || 0) + (isElite ? 3 : 0) + Number(regionMods.armor || 0) + Number(encounterMods.armor || 0) + Number(isBoss ? bossTemplate?.armor || 0 : 0),
          poisonAttack: Boolean(template.poison) || this.random() < Number(regionMods.poisonChance || 0),
          regen: ((template.regen || 0) + Number(regionMods.regen || 0)) * levelScale,
          icon: isBoss ? (bossTemplate?.icon || '◆') : isNamedElite ? namedTemplate.icon : template.icon,
          attackTimer: this.random() * .8,
          attackInterval: (isBoss ? Math.max(.85, Number(bossTemplate?.attackInterval || (template.role === 'ranged' ? 1.55 : 1.35))) : template.role === 'ranged' ? 1.55 : template.role === 'brute' ? 1.65 : template.role === 'support' ? 1.7 : 1.15) / Number(encounterMods.attackSpeed || 1),
          mechanic: isBoss ? bossTemplate?.mechanic : isNamedElite ? namedTemplate.mechanic : null,
          mechanicText: isBoss ? bossTemplate?.mechanicText : isNamedElite ? namedTemplate.text : null,
          mechanicInterval: isBoss ? Number(bossTemplate?.mechanicInterval || 6) : isNamedElite ? Number(namedTemplate.interval || 6) : 0,
          mechanicTimer: (isBoss ? Number(bossTemplate?.mechanicInterval || 6) : isNamedElite ? Number(namedTemplate.interval || 6) : 0) * (.72 + this.random() * .25),
          behavior: isBoss ? null : template.behavior || null,
          behaviorText: isBoss ? null : template.behaviorText || null,
          behaviorInterval: Number(template.behaviorInterval || 0),
          behaviorTimer: Number(template.behaviorInterval || 0) ? Number(template.behaviorInterval) * (.7 + this.random() * .4) : 0,
          eliteAffixes,
          affixTimers: {},
          flags: {},
          statuses: {},
          visual: { state: 'idle', time: 0, duration: 0, facing: -1, stride: this.visualRandom() * Math.PI * 2, recoil: 0, death: 0, spawn: 1, roleKey: null },
          lastHitBy: null
        };
        enemy.visual.roleKey = roleKey(enemy);
        this.applyEliteAffixes(enemy);
        enemies.push(enemy);
      }
      if (room.type === 'ritual') {
        const anchors = Number(room.objectiveAnchors || 3);
        for (let i = 0; i < anchors; i += 1) {
          const hp = (70 + this.dungeon.mission.level * 18) * room.risk;
          enemies.push({ id: C.uid('anchor'), name: `Void Anchor ${i + 1}`, role: 'objective', x: this.width * (.58 + i * .12), y: this.height * (.28 + (i % 2) * .42), radius: 18, hp, maxHp: hp, barrier: 0, damage: 0, speed: 0, range: 0, armor: 6 + this.dungeon.mission.level, poisonAttack: false, regen: 0, icon: '⊘', attackTimer: 999, attackInterval: 999, mechanic: null, mechanicTimer: 0, behavior: null, eliteAffixes: [], affixTimers: {}, flags: { objectiveAnchor: true }, statuses: {}, visual: { state: 'idle', time: 0, duration: 0, facing: -1, stride: 0, recoil: 0, death: 0, spawn: 1, roleKey: 'objective' }, lastHitBy: null });
        }
      }
      this.enemies = enemies;
      this.telemetry.maxEnemies = Math.max(this.telemetry.maxEnemies, enemies.length);
      if (bossTemplate) this.logMessage(`${bossTemplate.name}: ${bossTemplate.mechanicText}`, 'boss');
      if (namedTemplate) this.logMessage(`Named elite · ${namedTemplate.name}: ${namedTemplate.text}`, 'elite');
      const presentationThreat = enemies.find(enemy => enemy.role === 'boss' || enemy.namedEliteId);
      if (presentationThreat) this.showBossIntro(presentationThreat);
      const elite = enemies.find(enemy => enemy.role === 'elite');
      if (elite?.eliteAffixes?.length) {
        const labels = elite.eliteAffixes.map(id => D.ELITE_AFFIXES[id]?.name).filter(Boolean);
        this.logMessage(`Elite encountered: ${labels.join(' · ')}.`, 'elite');
      }
      const tactical = [...new Set(enemies.map(enemy => enemy.behavior).filter(Boolean))];
      if (tactical.length) {
        const examples = enemies.filter(enemy => enemy.behavior).slice(0, 3).map(enemy => `${enemy.name}: ${enemy.behaviorText}`);
        this.logMessage(`Tactical enemies: ${examples.join(' ')}`, 'info');
      }
    }

    applyEliteAffixes(enemy) {
      if (!enemy.eliteAffixes?.length) return;
      enemy.eliteAffixes.forEach(id => {
        if (id === 'bulwark') {
          enemy.barrier = enemy.maxHp * .25;
          enemy.affixTimers.bulwark = 8;
        } else if (id === 'stormbound') enemy.affixTimers.stormbound = 4.5;
        else if (id === 'splitter') enemy.flags.splitterReady = true;
      });
    }

    recordAffixTrigger(id) {
      this.telemetry.eliteAffixTriggers[id] = (this.telemetry.eliteAffixTriggers[id] || 0) + 1;
    }

    recordTacticalBehavior(id) {
      if (!id) return;
      this.telemetry.tacticalBehaviors[id] = (this.telemetry.tacticalBehaviors[id] || 0) + 1;
    }

    spawnBossAdds(boss, count = 2) {
      if (alive(this.enemies).length >= 18) return;
      const region = D.REGIONS[this.dungeon.regionIndex];
      const pool = D.ENEMIES[region.enemyKey];
      const template = pool[0];
      const levelScale = 1 + Math.max(0, this.dungeon.mission.level - 1) * .14;
      for (let i = 0; i < count && alive(this.enemies).length < 18; i += 1) {
        const hp = template.hp * levelScale * this.room.risk * .8;
        this.enemies.push({
          id: C.uid('enemy'), name: `${boss.name} Spawn`, role: 'melee',
          x: C.clamp(boss.x + (this.random() - .5) * 90, 80, this.width - 50),
          y: C.clamp(boss.y + (this.random() - .5) * 90, 60, this.height - 60),
          radius: 11, hp, maxHp: hp, damage: template.damage * levelScale * .7,
          speed: template.speed * 1.1, range: 34, armor: template.armor || 0,
          poisonAttack: false, regen: 0, icon: template.icon, attackTimer: .4 + this.random() * .5,
          attackInterval: 1.2, mechanic: null, mechanicTimer: 0, behavior: null, eliteAffixes: [], affixTimers: {}, flags: {}, statuses: {},
          visual: { state: 'idle', time: 0, duration: 0, facing: -1, stride: this.visualRandom() * Math.PI * 2, recoil: 0, death: 0, spawn: 1, roleKey: 'melee' }, lastHitBy: null
        });
      }
    }

    activateNamedEliteMechanic(enemy) {
      const mechanic = enemy.mechanic;
      if (!mechanic || enemy.hp <= 0) return;
      this.telemetry.namedEliteMechanics[mechanic] = (this.telemetry.namedEliteMechanics[mechanic] || 0) + 1;
      this.setEnemyAnimation(enemy, 'cast', .48, { recoil: .35 });
      this.emitPresentation('boss-phase', { name: enemy.name, mechanic, namedElite: true });
      this.cameraImpact(.28, 1.018, .18);
      const source = { name: `${enemy.name} · ${mechanic}`, role: 'named-elite' };
      if (mechanic === 'packHowl') {
        alive(this.enemies).filter(ally => ally.id !== enemy.id && distance(ally, enemy) < 210).forEach(ally => { ally.statuses.hasted = { duration: 5.5 }; });
        this.spawnBossAdds(enemy, 1);
      } else if (mechanic === 'thornVolley') {
        this.applyHeroDamage(enemy.damage * .72, source);
        this.hero.statuses.rooted = Math.max(this.hero.statuses.rooted || 0, 3.8);
      } else if (mechanic === 'mireBlessing') {
        alive(this.enemies).forEach(ally => { ally.hp = Math.min(ally.maxHp, ally.hp + ally.maxHp * .08); });
        this.hero.statuses.enemyPoison = Math.max(this.hero.statuses.enemyPoison || 0, 5);
      } else if (mechanic === 'undertow') {
        this.hero.x = C.clamp(enemy.x - 32, 55, this.width - 45);
        this.hero.y = enemy.y;
        this.applyHeroDamage(enemy.damage * 1.08, source);
        this.hero.statuses.rooted = Math.max(this.hero.statuses.rooted || 0, 2.5);
      } else if (mechanic === 'warStandard') {
        alive(this.enemies).filter(ally => distance(ally, enemy) < 220).forEach(ally => { ally.statuses.empowered = { duration: 6 }; ally.statuses.hasted = { duration: 6 }; });
      } else if (mechanic === 'furnaceWard') {
        enemy.barrier = Math.min(enemy.maxHp * .4, (enemy.barrier || 0) + enemy.maxHp * .16);
        this.applyHeroDamage(enemy.damage * .65, source, true);
      } else if (mechanic === 'rootCage') {
        this.applyHeroDamage(enemy.damage * .62, source);
        this.hero.statuses.rooted = Math.max(this.hero.statuses.rooted || 0, 4.4);
      } else if (mechanic === 'sporeBloom') {
        alive(this.enemies).forEach(ally => { ally.hp = Math.min(ally.maxHp, ally.hp + ally.maxHp * .1); ally.statuses.hasted = { duration: 3 }; });
      } else if (mechanic === 'avalancheCharge') {
        enemy.x = C.clamp(this.hero.x + 30, 55, this.width - 45);
        enemy.y = this.hero.y;
        this.applyHeroDamage(enemy.damage * 1.42, source);
        this.hero.statuses.rooted = Math.max(this.hero.statuses.rooted || 0, 2.2);
      } else if (mechanic === 'winterToll') {
        this.hero.statuses.frost = Math.max(this.hero.statuses.frost || 0, 6.2);
        this.applyHeroDamage(this.hero.maxHp * .025 + enemy.damage * .35, source, true);
      } else if (mechanic === 'mirrorPain') {
        this.applyHeroDamage(Math.min(this.hero.maxHp * .07, Math.max(enemy.damage * .65, this.telemetry.largestHit * .22)), source, true);
      } else if (mechanic === 'chainDrain') {
        const dealt = this.applyHeroDamage(enemy.damage * .9, source, true);
        enemy.hp = Math.min(enemy.maxHp, enemy.hp + dealt * .7);
        enemy.barrier = Math.min(enemy.maxHp * .3, (enemy.barrier || 0) + dealt * .45);
      }
      this.spawnParticles(enemy.x, enemy.y, 14, '#d2b36a');
      this.logMessage(`${enemy.name} uses ${enemy.mechanicText || mechanic}.`, 'elite');
    }

    activateBossMechanic(enemy) {
      const mechanic = enemy.mechanic;
      if (!mechanic || enemy.hp <= 0) return;
      this.telemetry.bossMechanics[mechanic] = (this.telemetry.bossMechanics[mechanic] || 0) + 1;
      this.setEnemyAnimation(enemy, 'cast', .58, { recoil: .45 });
      this.emitPresentation('boss-phase', { name: enemy.name, mechanic });
      this.cameraImpact(.42, 1.03, .24);
      this.presentation.vignette = Math.max(this.presentation.vignette, .2);
      const source = { name: `${enemy.name} · ${mechanic}`, role: 'boss' };
      if (mechanic === 'charge') {
        enemy.x = C.clamp(this.hero.x + 38, 60, this.width - 40);
        enemy.y = this.hero.y;
        this.applyHeroDamage(enemy.damage * 1.4, source);
        this.logMessage(`${enemy.name} charges across the arena.`, 'boss');
      } else if (mechanic === 'summon') {
        this.spawnBossAdds(enemy, 2);
        this.logMessage(`${enemy.name} calls reinforcements.`, 'boss');
      } else if (mechanic === 'poisonNova') {
        this.applyHeroDamage(this.hero.maxHp * .045 + enemy.damage * .35, source, true);
        this.hero.statuses.enemyPoison = Math.max(this.hero.statuses.enemyPoison || 0, 4.5);
        this.logMessage(`${enemy.name} rings a poison nova.`, 'boss');
      } else if (mechanic === 'regenerate') {
        const healed = enemy.maxHp * .075;
        enemy.hp = Math.min(enemy.maxHp, enemy.hp + healed);
        this.addDamageText(enemy.x, enemy.y - enemy.radius, `+${Math.round(healed)}`, '#83d690', true);
        this.logMessage(`${enemy.name} pulls strength from the mire.`, 'boss');
      } else if (mechanic === 'fortify') {
        enemy.statuses.fortify = { duration: 3.2 };
        this.logMessage(`${enemy.name} enters a fortified stance.`, 'boss');
      } else if (mechanic === 'firePulse') {
        const multiplier = distance(enemy, this.hero) < 175 ? 1 : .45;
        this.applyHeroDamage(enemy.damage * .95 * multiplier, source, true);
        this.logMessage(`${enemy.name} releases a furnace pulse.`, 'boss');
      } else if (mechanic === 'shockwave') {
        this.applyHeroDamage(enemy.damage * .7 + this.hero.maxHp * .035, source, true);
        this.logMessage(`${enemy.name} fractures the ground.`, 'boss');
      } else if (mechanic === 'frostVolley') {
        this.launchProjectile({ x: enemy.x, y: enemy.y, target: 'hero', speed: 420, life: .5, color: '#9ed7ef', kind: 'frost', width: 3, trail: 1, source: enemy.name, impact: 'frost' });
        this.applyHeroDamage(enemy.damage * .92, source);
        this.hero.statuses.frost = Math.max(this.hero.statuses.frost || 0, 5.5);
        this.logMessage(`${enemy.name} lands a slowing frost volley.`, 'boss');
      } else if (mechanic === 'voidPulse') {
        this.applyHeroDamage(enemy.damage * .55 + this.hero.maxHp * .03, source, true);
        const anchorMult = this.procs.has('voidAnchor') || this.procs.has('finalLantern') ? .45 : 1;
        const reduction = this.stats.maxHealth * .025 * anchorMult;
        this.hero.maxHp = Math.max(this.stats.maxHealth * .55, this.hero.maxHp - reduction);
        this.hero.hp = Math.min(this.hero.hp, this.hero.maxHp);
        this.logMessage(`${enemy.name} erodes maximum health.`, 'boss');
      } else if (mechanic === 'execute') {
        const missing = 1 - this.hero.hp / Math.max(1, this.hero.maxHp);
        this.applyHeroDamage(enemy.damage * (1 + missing * 1.1), source);
        this.logMessage(`${enemy.name} exploits the hero's wounds.`, 'boss');
      } else if (mechanic === 'maskShift') {
        enemy.flags.maskPhase = (Number(enemy.flags.maskPhase || 0) + 1) % 3;
        if (enemy.flags.maskPhase === 0) { enemy.statuses.fortify = { duration: 4 }; enemy.barrier = Math.min(enemy.maxHp * .35, (enemy.barrier || 0) + enemy.maxHp * .14); }
        else if (enemy.flags.maskPhase === 1) { enemy.statuses.hasted = { duration: 4.5 }; this.spawnBossAdds(enemy, 1); }
        else { this.hero.statuses.nullHex = Math.max(this.hero.statuses.nullHex || 0, 5); this.applyHeroDamage(enemy.damage * .7, source, true); }
        this.logMessage(`${enemy.name} changes its mask and combat law.`, 'boss');
      } else if (mechanic === 'buriedChoir') {
        this.spawnBossAdds(enemy, 2);
        alive(this.enemies).forEach(ally => { ally.hp = Math.min(ally.maxHp, ally.hp + ally.maxHp * .07); });
        this.hero.statuses.nullHex = Math.max(this.hero.statuses.nullHex || 0, 5.5);
        this.logMessage(`${enemy.name} raises another voice beneath the stone.`, 'boss');
      } else if (mechanic === 'devour') {
        const barrierEaten = Math.min(this.hero.barrier, this.hero.maxHp * .08);
        this.hero.barrier -= barrierEaten;
        const dealt = this.applyHeroDamage(enemy.damage * .85 + this.hero.maxHp * .025, source, true);
        enemy.hp = Math.min(enemy.maxHp, enemy.hp + dealt * .65 + barrierEaten);
        this.hero.maxHp = Math.max(this.stats.maxHealth * .52, this.hero.maxHp - this.stats.maxHealth * .012);
        this.hero.hp = Math.min(this.hero.hp, this.hero.maxHp);
        this.logMessage(`${enemy.name} consumes protection and vitality.`, 'boss');
      } else if (mechanic === 'firstWitness') {
        const ratio = enemy.hp / Math.max(1, enemy.maxHp);
        if (ratio > .66) { this.applyHeroDamage(enemy.damage * .58 + this.hero.maxHp * .025, source, true); this.hero.statuses.frost = Math.max(this.hero.statuses.frost || 0, 4.5); }
        else if (ratio > .33) { this.spawnBossAdds(enemy, 2); this.hero.statuses.nullHex = Math.max(this.hero.statuses.nullHex || 0, 5); }
        else { const missing = 1 - this.hero.hp / Math.max(1, this.hero.maxHp); this.applyHeroDamage(enemy.damage * (1.05 + missing), source); enemy.statuses.hasted = { duration: 4 }; }
        this.logMessage(`${enemy.name} records and repeats an earlier pressure.`, 'boss');
      }
      this.spawnParticles(enemy.x, enemy.y, 14, '#d5ad58');
    }

    updateCombat(dt) {
      this.roomClock += dt;
      if (this.modifiers.periodicDamage > 0) {
        this.periodicPressureTimer -= dt;
        if (this.periodicPressureTimer <= 0) {
          this.periodicPressureTimer += 6.5;
          const dealt = this.applyHeroDamage(this.hero.maxHp * this.modifiers.periodicDamage, { name: 'Unstable Ground', role: 'modifier' }, true);
          this.telemetry.modifierDamage += dealt;
          this.logMessage('Unstable Ground tears through the arena.', 'bad');
        }
      }
      this.updateEnemyStatuses(dt);
      this.tryAbilities();
      this.updateHero(dt);
      this.updateEnemies(dt);
      this.telemetry.maxEnemies = Math.max(this.telemetry.maxEnemies, alive(this.enemies).length);
      this.enemies = this.enemies.filter(enemy => enemy.hp > 0 || enemy.deathTimer < .5);
      const living = alive(this.enemies);
      if (this.room?.type === 'survival') {
        this.telemetry.survivalSeconds = Math.min(this.telemetry.objectiveTarget, this.roomClock);
        this.telemetry.objectiveProgress = this.telemetry.survivalSeconds;
        if (this.roomClock < this.telemetry.objectiveTarget && living.length === 0) { this.spawnRoom(this.room); return; }
        if (this.roomClock >= this.telemetry.objectiveTarget) { this.enemies.forEach(enemy => { enemy.hp = 0; }); this.telemetry.objectivesCompleted.push('survival'); }
      }
      if (this.room?.type === 'purge' && living.length === 0 && Number(this.room.remainingWaves || 0) > 0) {
        this.room.remainingWaves -= 1;
        this.telemetry.objectiveProgress = this.telemetry.objectiveTarget - this.room.remainingWaves;
        this.logMessage(`Purge wave ${this.telemetry.objectiveProgress}/${this.telemetry.objectiveTarget} broken.`, 'objective');
        this.spawnRoom(this.room);
        return;
      }
      if (this.room?.type === 'ritual') this.telemetry.objectiveProgress = this.telemetry.objectiveTarget - living.filter(enemy => enemy.flags?.objectiveAnchor).length;
      if (!alive(this.enemies).length) {
        if (this.room?.type === 'treasure' && this.roomObject && !this.roomObject.completed) {
          this.beginInteraction('chest');
          return;
        }
        this.completeCurrentRoom();
      }
    }

    updateRoomClear(dt) {
      this.roomClock += dt;
      if (this.roomCursor >= this.route.length - 1) {
        if (this.roomClock > .72) this.finish(true);
        return;
      }
      if (this.roomClock > .48) {
        this.roomClock = 0;
        this.phase = 'transitionOut';
        this.transitionClock = 0;
        this.hero.targetId = null;
        this.roomObject = null;
        this.setHeroAnimation('run', .18, { facing: 1, victory: 0 });
      }
    }

    updateEnemyStatuses(dt) {
      alive(this.enemies).forEach(enemy => {
        if (enemy.regen) enemy.hp = Math.min(enemy.maxHp, enemy.hp + enemy.regen * dt);
        if (enemy.eliteAffixes?.includes('frenzied')) {
          const missing = 1 - enemy.hp / Math.max(1, enemy.maxHp);
          enemy.statuses.frenzy = { duration: .2, intensity: missing };
        }
        if (enemy.eliteAffixes?.includes('bulwark')) {
          enemy.affixTimers.bulwark = Number(enemy.affixTimers.bulwark || 0) - dt;
          if (enemy.affixTimers.bulwark <= 0) {
            enemy.affixTimers.bulwark += 8;
            const before = enemy.barrier || 0;
            enemy.barrier = Math.min(enemy.maxHp * .35, before + enemy.maxHp * .14);
            if (enemy.barrier > before) {
              this.recordAffixTrigger('bulwark');
              this.addDamageText(enemy.x, enemy.y - enemy.radius, `+${Math.round(enemy.barrier - before)} ward`, '#e2c46d', true);
            }
          }
        }
        if (enemy.eliteAffixes?.includes('stormbound')) {
          enemy.affixTimers.stormbound = Number(enemy.affixTimers.stormbound || 0) - dt;
          if (enemy.affixTimers.stormbound <= 0) {
            enemy.affixTimers.stormbound += 4.5;
            const dealt = this.applyHeroDamage(enemy.damage * .48 + this.hero.maxHp * .018, { name: `${enemy.name} · Stormbound`, role: 'elite' }, true);
            this.telemetry.modifierDamage += dealt;
            this.recordAffixTrigger('stormbound');
            this.launchProjectile({ x: enemy.x, y: enemy.y, target: 'hero', speed: 520, life: .28, color: '#8ec9ff', kind: 'storm', width: 3, trail: 1, source: enemy.name, impact: 'storm' });
          }
        }
        if (enemy.eliteAffixes?.includes('splitter') && enemy.flags?.splitterReady && enemy.hp / enemy.maxHp <= .5) {
          enemy.flags.splitterReady = false;
          this.spawnBossAdds(enemy, 2);
          this.recordAffixTrigger('splitter');
          this.logMessage(`${enemy.name} splits and releases reinforcements.`, 'elite');
        }
        Object.keys(enemy.statuses || {}).forEach(key => {
          const status = enemy.statuses[key];
          status.duration -= dt;
          if (key === 'poison' || key === 'bleed') {
            status.tick -= dt;
            if (status.tick <= 0) {
              status.tick += Number(status.interval || .5);
              this.damageEnemy(enemy, status.damage, { source: key === 'bleed' ? 'Rupture bleed' : 'Poison', proc: true, canCrit: false });
            }
          }
          if (status.duration <= 0) delete enemy.statuses[key];
        });
      });
    }

    updateHero(dt) {
      const targets = alive(this.enemies);
      if (!targets.length) return;
      let target = targets.find(enemy => enemy.id === this.hero.targetId);
      if (!target) {
        target = targets.reduce((best, enemy) => !best || distance(this.hero, enemy) < distance(this.hero, best) ? enemy : best, null);
        this.hero.targetId = target.id;
      }
      const dist = distance(this.hero, target);
      const stackTempo = 1 + Number(this.hero.statuses.pursuitStacks || 0) * .018 + Number(this.hero.statuses.marchStacks || 0) * .016;
      const tempoMult = (this.hero.statuses.killHaste ? 1.24 : 1) * (this.hero.statuses.smokeVeil ? 1.18 : 1) * (this.hero.statuses.tacticalReset ? 1.22 : 1) * (this.hero.statuses.warBanner ? 1.18 : 1) * stackTempo;
      const moveMult = (this.hero.statuses.rally ? 1.3 : 1) * (this.hero.statuses.rooted ? .78 : 1) * (this.hero.statuses.rootbound ? 1.08 : 1) * tempoMult;
      if (dist > 37) {
        const dx = target.x - this.hero.x;
        const dy = target.y - this.hero.y;
        const len = Math.max(1, dist);
        const speed = 92 * this.stats.moveSpeed * moveMult;
        this.setHeroAnimation('run', .14, { facing: dx >= 0 ? 1 : -1 });
        this.hero.x += dx / len * speed * dt;
        this.hero.y += dy / len * speed * dt;
      } else {
        this.hero.attackTimer -= dt;
        const rageMult = this.hero.statuses.bloodRage ? 1.35 : 1;
        const rootMult = this.hero.statuses.rooted ? .78 : 1;
        if (this.hero.attackTimer <= 0) {
          this.hero.attackTimer += 1 / (this.stats.attackSpeed * rageMult * rootMult * tempoMult);
          this.basicAttack(target);
        }
      }
    }

    basicAttack(target) {
      this.hero.attackCount += 1;
      this.setHeroAnimation('attack', .24, { facing: target.x >= this.hero.x ? 1 : -1, recoil: 1 });
      this.setEnemyAnimation(target, 'hurt', .13, { recoil: 1 });
      this.emitPresentation('hero-attack', { target: target.name });
      const changedTarget = Boolean(this.hero.sameTargetId && this.hero.sameTargetId !== target.id);
      if (changedTarget && this.procs.has('cinderPursuit')) {
        this.damageEnemy(target, this.stats.maxDamage * .55, { source: 'Cinder Pursuit', proc: true });
      }
      if (changedTarget && this.procs.has('abyssStep') && !this.hero.flags.abyssStepUsed) {
        this.hero.flags.abyssStepUsed = true;
        const dx = target.x - this.hero.x;
        const dy = target.y - this.hero.y;
        const len = Math.max(1, Math.hypot(dx, dy));
        this.hero.x = target.x - dx / len * 24;
        this.hero.y = target.y - dy / len * 24;
        this.damageEnemy(target, this.stats.maxDamage * 1.15, { source: 'Abyss Step', proc: true });
        this.logMessage('Abyss Step crosses the room to the next prey.', 'proc');
        this.spawnParticles(this.hero.x, this.hero.y, 16, '#a69bd7');
      }
      if (this.hero.sameTargetId === target.id) this.hero.sameTargetHits += 1;
      else {
        this.hero.sameTargetId = target.id;
        this.hero.sameTargetHits = 1;
      }
      const base = this.stats.minDamage + this.random() * (this.stats.maxDamage - this.stats.minDamage);
      const crit = this.random() < this.stats.critChance;
      const rally = this.hero.statuses.rally ? 1.22 : 1;
      const banner = this.hero.statuses.warBanner ? 1.2 : 1;
      const iron = 1 + this.hero.ironStacks * .03;
      const pursuit = 1 + Number(this.hero.statuses.pursuitStacks || 0) * .025 + Number(this.hero.statuses.marchStacks || 0) * .02;
      const gambit = this.hero.statuses.calculatedGambit ? 1 + Number(this.hero.flags.gambitPower || 0) : 1;
      let damage = base * rally * banner * iron * pursuit * gambit * (crit ? this.stats.critDamage : 1);
      if (this.procs.has('bloodDebt')) damage *= 1 + Math.max(0, 1 - this.hero.hp / this.hero.maxHp) * .38;
      if (this.procs.has('executioner') && target.hp / target.maxHp < .25) damage *= 1.3;
      if (this.procs.has('duelist') && alive(this.enemies).length === 1) damage *= 1.24;
      if (this.procs.has('packbreaker') && alive(this.enemies).length >= 6) damage *= 1.22;
      if (this.procs.has('longRoad') && target.role === 'boss') {
        const unused = Math.max(0, this.dungeon.commandPoints - (this.route.length - 1));
        damage *= 1 + unused * .08;
      }
      if (this.hero.statuses.bulwarkCharge) {
        damage += this.stats.armor * .28 * this.hero.statuses.bulwarkCharge;
        this.hero.statuses.bulwarkCharge = 0;
      }
      const dealt = this.damageEnemy(target, damage, { source: crit ? 'Critical attack' : 'Basic attack', crit, basic: true });
      this.telemetry.attackDamage += dealt;
      this.spawnImpact(target.x, target.y, crit ? '#ffe2a1' : '#b8b0a0', crit ? 'critical' : 'slash', crit ? 'critical' : 'melee');
      if (crit) { this.cameraImpact(.24, 1.022, .12); this.presentation.flash = Math.max(this.presentation.flash, .035); this.presentation.flashColor = '#ffe3a4'; this.emitPresentation('hero-crit', { damage: dealt, target: target.name }); }

      if (crit) this.onCritical(target, dealt);
      if (this.procs.has('echo') && this.hero.attackCount % 5 === 0 && target.hp > 0) {
        this.damageEnemy(target, dealt * .65, { source: 'Echoing strike', proc: true });
      }
      if (this.procs.has('mobRule') && alive(this.enemies).length >= 5) {
        this.areaDamage(target.x, target.y, 82, dealt * .24, 'Mob Rule', target.id);
      }
      if (this.procs.has('avalancheHeart') && this.hero.attackCount % 4 === 0) {
        this.areaDamage(target.x, target.y, 110, dealt * .34, 'Avalanche Heart', target.id);
      }
      if (this.stats.lifesteal > 0) {
        const rageBonus = this.hero.statuses.bloodRage ? .08 : 0;
        this.healHero(dealt * (this.stats.lifesteal + rageBonus), 'Life steal');
      }
    }

    onCritical(target, damage) {
      this.hero.critCount += 1;
      this.hero.flags.justCrit = true;
      if (this.procs.has('stormCycle')) {
        Object.keys(this.hero.cooldowns).forEach(id => { this.hero.cooldowns[id] = Math.max(0, this.hero.cooldowns[id] - .35); });
      }
      if (this.procs.has('nightVenom')) {
        target.statuses.poison = { duration: 4, tick: .5, damage: (this.stats.minDamage + this.stats.maxDamage) * .08 };
      }
      if (this.procs.has('ashheart')) target.statuses.shattered = { duration: 4.5 };
      if (this.procs.has('stormbrand')) this.chainDamage(target, damage * .38, 1, 'Stormbrand');
      if (this.procs.has('setChain') && this.hero.critCount % 3 === 0) this.chainDamage(target, damage * .52, 4, 'Chain lightning');
      if (this.procs.has('carrionWind')) {
        this.hero.carrionCount += 1;
        this.areaDamage(target.x, target.y, 100, damage * .28, 'Carrion Wind');
        if (this.hero.carrionCount % 5 === 0) this.healHero(this.hero.maxHp * .08, 'Carrion Wind');
      }
      if (this.procs.has('brightOath')) {
        this.hero.brightStacks += 1;
        if (this.hero.brightStacks >= 5) {
          this.hero.brightStacks = 0;
          this.areaDamage(this.hero.x, this.hero.y, 180, this.stats.maxDamage * 2.4, 'Radiant eruption');
        }
      }
    }

    chainDamage(origin, damage, jumps, source) {
      let current = origin;
      const hit = new Set([origin.id]);
      for (let i = 0; i < jumps; i += 1) {
        const candidates = alive(this.enemies).filter(enemy => !hit.has(enemy.id));
        if (!candidates.length) break;
        const next = candidates.reduce((best, enemy) => !best || distance(current, enemy) < distance(current, best) ? enemy : best, null);
        if (!next || distance(current, next) > 230) break;
        this.damageEnemy(next, damage * (1 - i * .12), { source, proc: true });
        this.launchProjectile({ x: current.x, y: current.y, target: next.id, speed: 500, life: .25, color: '#8ec9ff', kind: 'chain', width: 3, trail: 1, source, impact: 'storm' });
        hit.add(next.id);
        current = next;
      }
    }

    activateEnemyBehavior(enemy) {
      const behavior = enemy.behavior;
      if (!behavior || enemy.hp <= 0) return;
      this.recordTacticalBehavior(behavior);
      const source = { name: `${enemy.name} · ${behavior}`, role: 'tactical' };
      if (behavior === 'charger') {
        enemy.x = C.clamp(this.hero.x + 34, 55, this.width - 45);
        enemy.y = this.hero.y;
        this.applyHeroDamage(enemy.damage * 1.28, source);
      } else if (behavior === 'snare') {
        this.applyHeroDamage(enemy.damage * .55, source);
        this.hero.statuses.rooted = Math.max(this.hero.statuses.rooted || 0, 3.5);
      } else if (behavior === 'hasteSupport') {
        alive(this.enemies).filter(ally => distance(ally, enemy) < 190).forEach(ally => { ally.statuses.hasted = { duration: 5 }; });
      } else if (behavior === 'damageSupport') {
        alive(this.enemies).filter(ally => distance(ally, enemy) < 190).forEach(ally => { ally.statuses.empowered = { duration: 5 }; });
      } else if (behavior === 'healer') {
        const wounded = alive(this.enemies).filter(ally => ally.hp < ally.maxHp).sort((a, b) => a.hp / a.maxHp - b.hp / b.maxHp)[0];
        if (wounded) {
          const amount = wounded.maxHp * .13;
          wounded.hp = Math.min(wounded.maxHp, wounded.hp + amount);
          this.addDamageText(wounded.x, wounded.y - wounded.radius, `+${Math.round(amount)}`, '#83d690', true);
        }
      } else if (behavior === 'ambusher') {
        enemy.x = C.clamp(this.hero.x + 30, 55, this.width - 45);
        enemy.y = C.clamp(this.hero.y + (this.random() - .5) * 36, 50, this.height - 50);
        const dealt = this.applyHeroDamage(enemy.damage * 1.05, source);
        if (enemy.poisonAttack && dealt > 0) this.hero.statuses.enemyPoison = Math.max(this.hero.statuses.enemyPoison || 0, 4);
      } else if (behavior === 'rootCharge') {
        enemy.x = C.clamp(this.hero.x + 30, 55, this.width - 45);
        enemy.y = this.hero.y;
        this.applyHeroDamage(enemy.damage * 1.12, source);
        this.hero.statuses.rooted = Math.max(this.hero.statuses.rooted || 0, 3.2);
      } else if (behavior === 'frostHex') {
        this.hero.statuses.frost = Math.max(this.hero.statuses.frost || 0, 4.5);
        this.applyHeroDamage(enemy.damage * .42, source);
      } else if (behavior === 'nullHex') {
        this.hero.statuses.nullHex = Math.max(this.hero.statuses.nullHex || 0, 4.5);
        this.applyHeroDamage(enemy.damage * .38, source);
      }
      if (!['healer', 'hasteSupport', 'damageSupport'].includes(behavior)) this.spawnParticles(enemy.x, enemy.y, 8, '#c6a967');
    }

    updateEnemies(dt) {
      alive(this.enemies).forEach(enemy => {
        if (enemy.mechanic && (enemy.role === 'boss' || enemy.namedEliteId)) {
          enemy.mechanicTimer -= dt;
          if (enemy.mechanicTimer <= 0) {
            enemy.mechanicTimer += enemy.mechanicInterval;
            if (enemy.role === 'boss') this.activateBossMechanic(enemy);
            else this.activateNamedEliteMechanic(enemy);
          }
        }
        if (enemy.behaviorInterval > 0) {
          enemy.behaviorTimer -= dt;
          if (enemy.behaviorTimer <= 0) {
            enemy.behaviorTimer += enemy.behaviorInterval;
            this.activateEnemyBehavior(enemy);
          }
        }
        const dist = distance(enemy, this.hero);
        const preferred = enemy.range || 34;
        const frenzy = enemy.statuses?.frenzy?.intensity || 0;
        const haste = enemy.statuses?.hasted ? 1.22 : 1;
        const speedMult = (1 + frenzy * .38) * haste;
        const wantsDistance = enemy.behavior === 'skirmisher' && dist < preferred * .72;
        if (wantsDistance) {
          const dx = enemy.x - this.hero.x;
          const dy = enemy.y - this.hero.y;
          const len = Math.max(1, dist);
          const speed = 62 * enemy.speed * speedMult;
          this.setEnemyAnimation(enemy, 'advance', .16, { facing: dx >= 0 ? 1 : -1 });
          enemy.x = C.clamp(enemy.x + dx / len * speed * dt, 45, this.width - 45);
          enemy.y = C.clamp(enemy.y + dy / len * speed * dt, 45, this.height - 45);
        } else if (dist > preferred) {
          const dx = this.hero.x - enemy.x;
          const dy = this.hero.y - enemy.y;
          const len = Math.max(1, dist);
          const speed = 58 * enemy.speed * speedMult;
          this.setEnemyAnimation(enemy, 'advance', .16, { facing: dx >= 0 ? 1 : -1 });
          enemy.x += dx / len * speed * dt;
          enemy.y += dy / len * speed * dt;
        } else {
          enemy.attackTimer -= dt * (1 + frenzy * .55) * haste;
          if (enemy.attackTimer <= 0) {
            enemy.attackTimer += enemy.attackInterval;
            this.setEnemyAnimation(enemy, enemy.range > 60 ? 'cast' : 'attack', enemy.range > 60 ? .34 : .24, { facing: this.hero.x >= enemy.x ? 1 : -1, recoil: .7 });
            this.emitPresentation('enemy-attack', { name: enemy.name, ranged: enemy.range > 60 });
            if (enemy.range > 60) {
              this.launchProjectile({ x: enemy.x, y: enemy.y, target: 'hero', speed: 320, life: .45, color: '#d46d62', kind: 'enemy-bolt', width: 3, trail: 1, source: enemy.name, impact: enemy.poisonAttack ? 'poison' : 'spark' });
            }
            const empowerment = enemy.statuses?.empowered ? 1.2 : 1;
            const dealt = this.applyHeroDamage(enemy.damage * empowerment * (.85 + this.random() * .3), enemy);
            if (enemy.poisonAttack && dealt > 0) this.hero.statuses.enemyPoison = 3;
            if ((enemy.behavior === 'leech' || enemy.eliteAffixes?.includes('vampiric')) && dealt > 0) {
              const amount = dealt * (enemy.eliteAffixes?.includes('vampiric') ? .42 : .3);
              enemy.hp = Math.min(enemy.maxHp, enemy.hp + amount);
              if (amount > 1) this.addDamageText(enemy.x, enemy.y - enemy.radius, `+${Math.round(amount)}`, '#83d690');
              if (enemy.eliteAffixes?.includes('vampiric')) this.recordAffixTrigger('vampiric');
            }
          }
        }
      });
      if (this.hero.statuses.enemyPoison) {
        this.hero.flags.poisonTick = (this.hero.flags.poisonTick || 0) - dt;
        if (this.hero.flags.poisonTick <= 0) {
          this.hero.flags.poisonTick = .6;
          this.applyHeroDamage(this.hero.maxHp * .012 * (this.procs.has('tideward') ? .55 : 1), { name: 'Poison', role: 'dot' }, true);
        }
      }
    }

    applyHeroDamage(raw, source, unavoidable = false) {
      if (this.hero.hp <= 0) return 0;
      const dynamicDodge = C.clamp(this.stats.dodgeChance + (this.hero.statuses.smokeVeil ? .24 : 0), 0, .75);
      if (!unavoidable && this.random() < dynamicDodge) {
        this.telemetry.dodged += raw;
        this.addDamageText(this.hero.x, this.hero.y - 20, 'DODGE', '#8bd8cc', true);
        this.setHeroAnimation('run', .18, { recoil: .5 });
        return 0;
      }
      const unusedCommand = Math.max(0, Number(this.dungeon.commandPoints || 0) - Math.max(0, this.route.length - 1));
      const preparedArmor = this.procs.has('preparedDefense') ? unusedCommand * 3 : 0;
      const effectiveArmor = (this.stats.armor + preparedArmor) * (this.hero.statuses.ash ? .7 : 1);
      let damage = raw * (100 / (100 + effectiveArmor * 4.5));
      let blocked = false;
      const dynamicBlock = C.clamp(this.stats.blockChance + (this.hero.statuses.bastion ? .22 : 0) + (this.hero.statuses.warBanner ? .08 : 0), 0, .8);
      if (!unavoidable && this.random() < dynamicBlock) {
        blocked = true;
        const prevented = damage * .55;
        damage -= prevented;
        this.telemetry.blocked += prevented;
        this.addDamageText(this.hero.x, this.hero.y - 20, 'BLOCK', '#9fc4d9', true);
        this.setHeroAnimation('block', .28, { recoil: .45 });
        this.emitPresentation('hero-block', { prevented });
        this.spawnImpact(this.hero.x, this.hero.y, '#9fc4d9', 'block', 'shield');
        if (this.procs.has('thornwake')) this.areaDamage(this.hero.x, this.hero.y, 105, prevented * .7, 'Thornwake');
        if (this.procs.has('stoneChoir')) {
          const beforeBarrier = this.hero.barrier;
          this.hero.barrier = Math.min(this.hero.maxHp * .5, this.hero.barrier + prevented * .35);
          this.telemetry.barrierGained += Math.max(0, this.hero.barrier - beforeBarrier);
          this.areaDamage(this.hero.x, this.hero.y, 92, prevented * .25, 'Stone Choir');
        }
        if (this.procs.has('bulwarkEngine')) this.hero.statuses.bulwarkCharge = Math.min(5, Number(this.hero.statuses.bulwarkCharge || 0) + 1);
        if (this.procs.has('ironVengeance')) this.hero.ironStacks = Math.min(8, this.hero.ironStacks + 1);
        if (this.procs.has('brightOath')) {
          this.hero.brightStacks += 1;
          if (this.hero.brightStacks >= 5) {
            this.hero.brightStacks = 0;
            this.areaDamage(this.hero.x, this.hero.y, 180, this.stats.maxDamage * 2.4, 'Radiant eruption');
          }
        }
      }
      if (this.hero.barrier > 0) {
        const absorbed = Math.min(this.hero.barrier, damage);
        this.hero.barrier -= absorbed;
        damage -= absorbed;
      }
      if (damage > 0) {
        this.hero.hp -= damage;
        this.telemetry.damageTaken += damage;
        const sourceName = source?.name || 'Unknown source';
        this.telemetry.incomingBySource[sourceName] = (this.telemetry.incomingBySource[sourceName] || 0) + damage;
        this.addDamageText(this.hero.x, this.hero.y - 18, `-${Math.round(damage)}`, '#f0877d');
        this.setHeroAnimation('hurt', damage > this.hero.maxHp * .16 ? .32 : .19, { recoil: Math.min(1.4, damage / Math.max(1, this.hero.maxHp * .12)) });
        this.emitPresentation('hero-hurt', { damage, source: sourceName, heavy: damage > this.hero.maxHp * .16 });
        if (damage > this.hero.maxHp * .16) this.hero.flags.heavyHit = true;
        if (damage > this.hero.maxHp * .08) this.cameraImpact(Math.min(.7, damage / this.hero.maxHp * 2.2), 1.02, .16);
      }
      this.spawnImpact(this.hero.x, this.hero.y, blocked ? '#9fc4d9' : '#d66d63', blocked ? 'block' : 'blood', blocked ? 'shield' : 'hit');
      return damage;
    }

    healHero(amount, source) {
      if (amount <= 0 || this.hero.hp <= 0) return 0;
      const tideward = this.procs.has('tideward') ? .55 : 1;
      let healingMult = (this.hero.statuses.mire ? 1 - (1 - .65) * tideward : 1) * (this.hero.statuses.nullHex ? 1 - (1 - .7) * tideward : 1) * this.healingMultiplier;
      const suppressorAlive = alive(this.enemies).some(enemy => enemy.eliteAffixes?.includes('suppressor'));
      if (suppressorAlive) {
        const penalty = this.procs.has('mireDominion') ? .825 : .65;
        healingMult *= penalty;
        this.telemetry.eliteAffixTriggers.suppressor = (this.telemetry.eliteAffixTriggers.suppressor || 0) + 1;
      }
      amount *= healingMult;
      const missing = this.hero.maxHp - this.hero.hp;
      const healed = Math.min(missing, amount);
      const overflow = Math.max(0, amount - healed);
      this.hero.hp += healed;
      this.telemetry.healing += healed;
      if (healed > .2) {
        this.addDamageText(this.hero.x, this.hero.y - 30, `+${Math.round(healed)}`, '#83d690');
        this.emitPresentation('hero-heal', { amount: healed, source });
        this.spawnVfx('heal', this.hero.x, this.hero.y, { color: '#83d690', count: 7, priority: 2 });
      }
      if (overflow > 0 && this.procs.has('bloodwell')) {
        const gain = Math.min(this.hero.maxHp * .35 - this.hero.barrier, overflow);
        if (gain > 0) {
          this.hero.barrier += gain;
          this.telemetry.barrierGained += gain;
        }
      }
      return healed;
    }

    damageEnemy(enemy, raw, meta = {}) {
      if (!enemy || enemy.hp <= 0) return 0;
      if (enemy.eliteAffixes?.includes('evasive') && !meta.proc && this.random() < .15) {
        this.recordAffixTrigger('evasive');
        this.addDamageText(enemy.x, enemy.y - enemy.radius, 'EVADE', '#9bd9d0', true);
        return 0;
      }
      let adjustedRaw = raw;
      if (this.procs.has('firstStrike') && enemy.hp >= enemy.maxHp * .985) adjustedRaw *= 1.28;
      const abilityHit = Object.values(D.ABILITIES).some(ability => ability.name === meta.source);
      if (this.procs.has('crownbreaker') && (enemy.role === 'elite' || enemy.role === 'boss') && abilityHit) adjustedRaw *= 1.18;
      if (enemy.statuses?.marked) adjustedRaw *= 1.22;
      if (this.procs.has('witchglass') && abilityHit && !meta.crit && this.random() < this.stats.critChance) {
        adjustedRaw *= this.stats.critDamage;
        meta.crit = true;
        Object.keys(this.hero.cooldowns).forEach(id => { this.hero.cooldowns[id] = Math.max(0, this.hero.cooldowns[id] - .22); });
      }
      const wardingArmor = alive(this.enemies).some(ally => ally.id !== enemy.id && ally.eliteAffixes?.includes('warding') && distance(ally, enemy) < 185) ? 7 : 0;
      const guardianArmor = alive(this.enemies).some(ally => ally.id !== enemy.id && ally.behavior === 'guardian' && distance(ally, enemy) < 175) ? 6 : 0;
      const fracturedArmor = enemy.statuses?.shattered ? 7 : 0;
      const effectiveEnemyArmor = Math.max(0, (enemy.armor || 0) - fracturedArmor) + wardingArmor + guardianArmor + (enemy.statuses?.fortify ? 12 : 0);
      let damage = Math.max(.1, adjustedRaw * (100 / (100 + effectiveEnemyArmor * 5)));
      if (enemy.barrier > 0) {
        const absorbed = Math.min(enemy.barrier, damage);
        enemy.barrier -= absorbed;
        damage -= absorbed;
        if (damage <= .01) {
          this.telemetry.damageDealt += absorbed;
          this.addDamageText(enemy.x, enemy.y - enemy.radius, `${Math.round(absorbed)} ward`, '#e2c46d');
          return absorbed;
        }
      }
      enemy.hp -= damage;
      enemy.lastHitBy = meta.source || 'Unknown';
      this.setEnemyAnimation(enemy, meta.crit ? 'stagger' : 'hurt', meta.crit ? .28 : .14, { recoil: meta.crit ? 1.25 : .65 });
      this.telemetry.damageDealt += damage;
      this.telemetry.largestHit = Math.max(this.telemetry.largestHit, damage);
      if (meta.proc) this.telemetry.procDamage += damage;
      if (meta.source && meta.source !== 'Basic attack' && meta.source !== 'Critical attack') {
        this.telemetry.abilityDamage[meta.source] = (this.telemetry.abilityDamage[meta.source] || 0) + damage;
      }
      if (this.state.settings.damageNumbers) {
        this.addDamageText(enemy.x, enemy.y - enemy.radius, `${meta.crit ? '✦ ' : ''}${Math.round(damage)}`, meta.crit ? '#ffe39b' : '#e7ded0', meta.crit);
      }
      if (enemy.eliteAffixes?.includes('thorned') && meta.basic && damage > 0) {
        const reflected = Math.min(this.hero.maxHp * .035, damage * .1);
        this.applyHeroDamage(reflected, { name: `${enemy.name} · Thorned`, role: 'elite' }, true);
        this.recordAffixTrigger('thorned');
      }
      if (this.procs.has('mireSustain') && (meta.source === 'Poison' || meta.source === 'Rupture bleed')) this.healHero(damage * .12, 'Mireborn Covenant');
      if (enemy.hp <= 0) this.killEnemy(enemy);
      return damage;
    }

    killEnemy(enemy) {
      enemy.hp = 0;
      enemy.deathTimer = 0;
      this.setEnemyAnimation(enemy, 'death', enemy.role === 'boss' ? .75 : .42, { death: 0 });
      this.telemetry.kills += 1;
      if (enemy.role === 'elite' || enemy.role === 'boss') this.telemetry.elitesKilled += 1;
      if (enemy.namedEliteId) {
        if (!this.telemetry.namedElitesKilled.includes(enemy.namedEliteId)) this.telemetry.namedElitesKilled.push(enemy.namedEliteId);
        this.logMessage(`${enemy.name} has been erased from the hunt ledger.`, 'good');
      }
      if (enemy.role === 'boss') this.logMessage(`${enemy.name} defeated.`, 'good');
      const deathEvent = enemy.role === 'boss' ? 'boss-death' : (enemy.role === 'elite' || enemy.namedEliteId) ? 'elite-death' : 'enemy-death';
      this.emitPresentation(deathEvent, { name: enemy.name, x: enemy.x, y: enemy.y });
      if (enemy.role === 'boss') {
        this.cameraImpact(.9, 1.075, .45);
        this.presentation.flash = .085; this.presentation.flashColor = '#e6c477'; this.presentation.vignette = .16;
        this.showRoomBanner(`${enemy.name} defeated`, 'The route is open.', 'clear', 1.9);
      } else if (enemy.role === 'elite' || enemy.namedEliteId) this.cameraImpact(.48, 1.035, .22);
      this.telemetry.gold += enemy.role === 'boss' ? 35 : enemy.namedEliteId ? 24 : enemy.role === 'elite' ? 12 : 1;
      if ((enemy.eliteAffixes?.includes('volatile') || enemy.behavior === 'exploder') && distance(enemy, this.hero) < 175) {
        const sourceName = enemy.eliteAffixes?.includes('volatile') ? `${enemy.name} · Volatile` : `${enemy.name} · Death Burst`;
        this.applyHeroDamage(enemy.damage * (enemy.eliteAffixes?.includes('volatile') ? .95 : .7), { name: sourceName, role: 'death' }, true);
        if (enemy.eliteAffixes?.includes('volatile')) this.recordAffixTrigger('volatile');
        this.spawnParticles(enemy.x, enemy.y, 18, '#d88a54');
      }
      if ((enemy.role === 'elite' || enemy.role === 'boss') && this.procs.has('bloodFeast')) {
        this.healHero(this.hero.maxHp * .08, 'Feast');
        this.logMessage('Feast restores health from the elite kill.', 'proc');
      }
      if (this.procs.has('killHaste')) this.hero.statuses.killHaste = Math.max(this.hero.statuses.killHaste || 0, 3);
      if (this.procs.has('pursuitMastery')) this.hero.statuses.pursuitStacks = Math.min(8, Number(this.hero.statuses.pursuitStacks || 0) + 1);
      if (this.procs.has('redMarch')) this.hero.statuses.marchStacks = Math.min(10, Number(this.hero.statuses.marchStacks || 0) + 1);
      if (this.procs.has('roomforge') && !this.hero.flags.roomforgeUsed) {
        this.hero.flags.roomforgeUsed = true;
        const before = this.hero.barrier;
        this.hero.barrier = Math.min(this.hero.maxHp * .48, this.hero.barrier + this.hero.maxHp * .12);
        this.telemetry.barrierGained += Math.max(0, this.hero.barrier - before);
      }
      if (this.procs.has('graveShade')) this.areaDamage(enemy.x, enemy.y, 115, this.stats.maxDamage * .6, 'Grave shade', enemy.id);
      if (this.procs.has('mireDominion') && enemy.statuses.poison) this.areaDamage(enemy.x, enemy.y, 105, this.stats.maxDamage * .48, 'Mireborn burst', enemy.id);
      if (enemy.statuses.poison) this.hero.flags.killedPoisoned = true;
      this.spawnParticles(enemy.x, enemy.y, enemy.role === 'boss' ? 20 : 8, enemy.role === 'boss' ? '#d6b15e' : '#786e61');
      if (this.hero.targetId === enemy.id) this.hero.targetId = null;
      if (this.hero.sameTargetId === enemy.id) {
        this.hero.sameTargetId = null;
        this.hero.sameTargetHits = 0;
      }
    }

    areaDamage(x, y, radius, damage, source, excludeId = null) {
      alive(this.enemies).forEach(enemy => {
        if (enemy.id !== excludeId && Math.hypot(enemy.x - x, enemy.y - y) <= radius) {
          this.damageEnemy(enemy, damage, { source, proc: true });
        }
      });
      this.spawnParticles(x, y, 12, '#d5ad58');
    }

    tryAbilities() {
      const ids = this.state.hero.equippedAbilities;
      for (const id of ids) {
        if ((this.hero.cooldowns[id] || 0) > 0) continue;
        const ability = D.ABILITIES[id];
        if (!ability) continue;
        if (this.tryAbility(id, ability)) {
          this.hero.cooldowns[id] = ability.cooldown;
          this.hero.abilityCount += 1;
          if (this.procs.has('stormSurge') && this.hero.abilityCount % 5 === 0) {
            Object.keys(this.hero.cooldowns).forEach(otherId => { if (otherId !== id) this.hero.cooldowns[otherId] = Math.max(0, this.hero.cooldowns[otherId] - 1.35); });
            const surgeTarget = alive(this.enemies).find(enemy => enemy.id === this.hero.targetId) || alive(this.enemies)[0];
            if (surgeTarget) this.chainDamage(surgeTarget, this.stats.maxDamage * .62 * (1 + this.stats.abilityPower), Math.min(5, alive(this.enemies).length - 1), 'Storm Surge');
            this.logMessage('Storm Surge discharges the fifth activation.', 'proc');
          }
          if (this.procs.has('arcBattery') && this.hero.abilityCount % 4 === 0) {
            Object.keys(this.hero.cooldowns).forEach(otherId => { this.hero.cooldowns[otherId] = Math.max(0, this.hero.cooldowns[otherId] - 1.15); });
            this.logMessage('Arc Battery releases stored cooldown energy.', 'proc');
          }
          this.setHeroAnimation('cast', .34, { castKind: id, recoil: .35 });
          this.emitPresentation('ability-cast', { id, name: ability.name, icon: ability.icon });
          this.spawnAbilityVfx(id);
          this.logMessage(`${ability.name} activates.`, 'ability');
          if (this.procs.has('ironEcho') && !this.hero.roomEchoUsed) {
            this.hero.roomEchoUsed = true;
            if (this.tryAbility(id, ability, true)) this.logMessage(`${ability.name} echoes from Iron Vow.`, 'proc');
          }
          if (this.procs.has('abilityEcho') && this.hero.abilityCount % 3 === 0) {
            if (this.tryAbility(id, ability, true)) this.logMessage(`${ability.name} resonates a second time.`, 'proc');
          }
        }
      }
      this.hero.flags.justCrit = false;
      this.hero.flags.heavyHit = false;
      this.hero.flags.killedPoisoned = false;
    }

    tryAbility(id, ability, echoed = false) {
      const enemies = alive(this.enemies);
      const nearby = enemies.filter(enemy => distance(enemy, this.hero) < 115);
      const power = (1 + this.stats.abilityPower) * (echoed ? .55 : 1);
      if (id === 'cleave' && nearby.length >= 2) {
        nearby.forEach(enemy => this.damageEnemy(enemy, this.stats.maxDamage * 1.45 * power, { source: 'Cleave', proc: true }));
        return true;
      }
      if (id === 'bloodRage' && this.hero.hp / this.hero.maxHp < .55 && !this.hero.statuses.bloodRage) {
        this.hero.statuses.bloodRage = 4.2 * power;
        return true;
      }
      if (id === 'ironWard' && this.hero.flags.heavyHit) {
        const gain = this.hero.maxHp * .22 * power;
        this.hero.barrier = Math.min(this.hero.maxHp * .55, this.hero.barrier + gain);
        this.telemetry.barrierGained += gain;
        return true;
      }
      if (id === 'shieldBurst' && nearby.length >= 3) {
        nearby.forEach(enemy => this.damageEnemy(enemy, (this.stats.armor * 1.1 + this.stats.maxDamage) * power, { source: 'Shield Burst', proc: true }));
        return true;
      }
      if (id === 'stormArc' && this.hero.flags.justCrit && enemies.length >= 2) {
        const origin = enemies.find(enemy => enemy.id === this.hero.targetId) || enemies[0];
        this.chainDamage(origin, this.stats.maxDamage * .8 * power, 4, 'Storm Arc');
        return true;
      }
      if (id === 'tempest' && enemies.length >= 6) {
        const hits = Math.min(10, enemies.length + 3);
        for (let i = 0; i < hits; i += 1) {
          const target = enemies[Math.floor(this.random() * enemies.length)];
          if (target?.hp > 0) this.damageEnemy(target, this.stats.maxDamage * .55 * power, { source: 'Tempest', proc: true });
        }
        return true;
      }
      if (id === 'shadowstep') {
        const ranged = enemies.filter(enemy => enemy.range > 80 && distance(enemy, this.hero) > 120).sort((a, b) => distance(b, this.hero) - distance(a, this.hero))[0];
        if (ranged) {
          this.hero.x = ranged.x - 28;
          this.hero.y = ranged.y;
          this.damageEnemy(ranged, this.stats.maxDamage * 1.8 * power, { source: 'Shadowstep', proc: true });
          return true;
        }
      }
      if (id === 'venomBurst' && this.hero.flags.killedPoisoned) {
        this.areaDamage(this.hero.x, this.hero.y, 170, this.stats.maxDamage * .9 * power, 'Venom Burst');
        enemies.slice(0, 6).forEach(enemy => {
          enemy.statuses.poison = { duration: 4, tick: .5, damage: this.stats.maxDamage * .07 * power };
        });
        return true;
      }
      if (id === 'execution') {
        const target = enemies.find(enemy => (enemy.role === 'elite' || enemy.role === 'boss') && enemy.hp / enemy.maxHp < .3);
        if (target) {
          this.damageEnemy(target, this.stats.maxDamage * 3.4 * power, { source: 'Execution', proc: true, crit: true });
          return true;
        }
      }
      if (id === 'rally' && this.roomClock < .2 && !this.hero.statuses.rally) {
        this.hero.statuses.rally = 5 * power;
        return true;
      }
      if (id === 'rupture') {
        const target = enemies.find(enemy => enemy.id === this.hero.sameTargetId);
        if (target && this.hero.sameTargetHits >= 4) {
          this.damageEnemy(target, this.stats.maxDamage * 2.25 * power, { source: 'Rupture', proc: true, crit: true });
          if (target.hp > 0) {
            target.statuses.bleed = {
              duration: 5,
              tick: .35,
              interval: .6,
              damage: this.stats.maxDamage * .16 * power
            };
          }
          this.hero.sameTargetHits = 0;
          return true;
        }
      }
      if (id === 'bastion' && this.hero.hp / this.hero.maxHp < .35 && !this.hero.statuses.bastion) {
        const before = this.hero.barrier;
        this.hero.barrier = Math.min(this.hero.maxHp * .65, this.hero.barrier + this.hero.maxHp * .3 * power);
        this.telemetry.barrierGained += Math.max(0, this.hero.barrier - before);
        this.hero.statuses.bastion = 5;
        return true;
      }
      if (id === 'overcharge') {
        const active = Object.entries(this.hero.cooldowns).filter(([otherId, cooldown]) => otherId !== id && cooldown > .25);
        if (active.length >= 3 && enemies.length) {
          const origin = enemies.find(enemy => enemy.id === this.hero.targetId) || enemies[0];
          this.chainDamage(origin, this.stats.maxDamage * 1.05 * power, Math.min(7, enemies.length - 1), 'Overcharge');
          this.damageEnemy(origin, this.stats.maxDamage * 1.05 * power, { source: 'Overcharge', proc: true });
          Object.keys(this.hero.cooldowns).forEach(otherId => {
            if (otherId !== id) this.hero.cooldowns[otherId] = Math.max(0, this.hero.cooldowns[otherId] - 2.25 * power);
          });
          return true;
        }
      }
      if (id === 'smokeVeil' && enemies.length >= 5 && !this.hero.statuses.smokeVeil) {
        this.hero.statuses.smokeVeil = 5;
        this.spawnParticles(this.hero.x, this.hero.y, 22, '#9585a6');
        return true;
      }
      if (id === 'tacticalReset' && this.roomClock >= 8 && !this.hero.flags.tacticalResetUsed) {
        const active = Object.entries(this.hero.cooldowns).filter(([otherId, cooldown]) => otherId !== id && cooldown > .5);
        const pressure = active.reduce((sum, [, cooldown]) => sum + cooldown, 0);
        if (active.length >= 2 && pressure >= 6) {
          active.forEach(([otherId]) => { this.hero.cooldowns[otherId] *= .35; });
          this.hero.statuses.tacticalReset = 4.5;
          this.hero.flags.tacticalResetUsed = true;
          return true;
        }
      }
      if (id === 'bloodstorm' && this.hero.hp / this.hero.maxHp < .72 && nearby.length >= 4) {
        let total = 0;
        nearby.forEach(enemy => { total += this.damageEnemy(enemy, this.stats.maxDamage * 1.05 * power, { source: 'Bloodstorm', proc: true }); });
        this.healHero(total * .07, 'Bloodstorm');
        return true;
      }
      if (id === 'aegisMarch' && this.hero.barrier > this.hero.maxHp * .04 && nearby.length >= 2) {
        nearby.forEach(enemy => this.damageEnemy(enemy, (this.stats.armor * .85 + this.stats.maxDamage) * power, { source: 'Aegis March', proc: true }));
        const before = this.hero.barrier;
        this.hero.barrier = Math.min(this.hero.maxHp * .6, this.hero.barrier + this.hero.maxHp * .1 * power);
        this.telemetry.barrierGained += Math.max(0, this.hero.barrier - before);
        return true;
      }
      if (id === 'thunderhead' && enemies.length >= 4) {
        const origin = enemies.find(enemy => enemy.id === this.hero.targetId) || enemies[0];
        this.damageEnemy(origin, this.stats.maxDamage * 1.15 * power, { source: 'Thunderhead', proc: true });
        this.chainDamage(origin, this.stats.maxDamage * .72 * power, Math.min(7, enemies.length - 1), 'Thunderhead');
        const active = Object.entries(this.hero.cooldowns).filter(([otherId, cooldown]) => otherId !== id && cooldown > .5).sort((a,b)=>b[1]-a[1])[0];
        if (active) this.hero.cooldowns[active[0]] = Math.max(0, active[1] - 1.5);
        return true;
      }
      if (id === 'markedPrey') {
        const target = enemies.find(enemy => (enemy.role === 'elite' || enemy.role === 'boss') && enemy.hp / enemy.maxHp > .5 && !enemy.statuses.marked);
        if (target) {
          target.statuses.marked = { duration: 7 };
          this.damageEnemy(target, this.stats.maxDamage * .8 * power, { source: 'Marked Prey', proc: true });
          return true;
        }
      }
      if (id === 'warBanner' && this.roomClock < 1 && enemies.length >= 3 && !this.hero.statuses.warBanner) {
        this.hero.statuses.warBanner = 6.5;
        const before = this.hero.barrier;
        this.hero.barrier = Math.min(this.hero.maxHp * .45, this.hero.barrier + this.hero.maxHp * .12 * power);
        this.telemetry.barrierGained += Math.max(0, this.hero.barrier - before);
        return true;
      }
      if (id === 'crimsonPact' && this.hero.hp / this.hero.maxHp < .62 && nearby.length >= 3) {
        const mastery = this.procs.has('crimsonPactMastery');
        const cost = Math.min(this.hero.hp - 1, this.hero.maxHp * (mastery ? .045 : .075));
        if (cost <= 0) return false;
        this.hero.hp -= cost;
        let dealtTotal = 0;
        nearby.forEach(enemy => { dealtTotal += this.damageEnemy(enemy, (this.stats.maxDamage * 1.35 + cost * .55) * power, { source: 'Crimson Pact', proc: true }); });
        const before = this.hero.barrier;
        this.hero.barrier = Math.min(this.hero.maxHp * .58, this.hero.barrier + dealtTotal * (mastery ? .08 : .045));
        this.telemetry.barrierGained += Math.max(0, this.hero.barrier - before);
        return true;
      }
      if (id === 'fortressPulse' && this.hero.barrier >= this.hero.maxHp * .12 && nearby.length >= 2) {
        const charge = 1 + Number(this.hero.statuses.bulwarkCharge || 0) * .12;
        nearby.forEach(enemy => this.damageEnemy(enemy, (this.stats.armor * 1.25 + this.stats.maxDamage * .8) * power * charge, { source: 'Fortress Pulse', proc: true }));
        const before = this.hero.barrier;
        this.hero.barrier = Math.min(this.hero.maxHp * .65, this.hero.barrier + this.stats.armor * .18 * power);
        this.telemetry.barrierGained += Math.max(0, this.hero.barrier - before);
        this.hero.statuses.bulwarkCharge = 0;
        return true;
      }
      if (id === 'chainReaction' && this.hero.abilityCount >= 3 && enemies.length >= 3) {
        const origin = enemies.find(enemy => enemy.id === this.hero.targetId) || enemies[0];
        this.damageEnemy(origin, this.stats.maxDamage * 1.05 * power, { source: 'Chain Reaction', proc: true });
        this.chainDamage(origin, this.stats.maxDamage * .82 * power, Math.min(8, enemies.length - 1), 'Chain Reaction');
        const active = Object.entries(this.hero.cooldowns).filter(([otherId, cooldown]) => otherId !== id && cooldown > .5).sort((a,b)=>b[1]-a[1])[0];
        if (active) this.hero.cooldowns[active[0]] = Math.max(0, active[1] - 2.1);
        this.hero.abilityCount = 0;
        return true;
      }
      if (id === 'phantomVolley') {
        const distant = enemies.filter(enemy => enemy.range > 90 && distance(enemy, this.hero) > 105).sort((a,b)=>distance(b,this.hero)-distance(a,this.hero));
        if (distant.length >= 2) {
          distant.slice(0, 5).forEach((enemy, index) => this.damageEnemy(enemy, this.stats.maxDamage * (.82 + index * .08) * power, { source: 'Phantom Volley', proc: true, canCrit: true }));
          return true;
        }
      }
      if (id === 'calculatedGambit' && this.unusedCommand >= 1 && this.roomClock >= 2 && !this.hero.statuses.calculatedGambit) {
        const retained = this.procs.has('gambitMastery') ? .5 : 0;
        const spendable = Math.max(1, this.unusedCommand * (1 - retained));
        this.hero.statuses.calculatedGambit = 6.5;
        this.hero.flags.gambitPower = Math.min(.42, spendable * .075);
        return true;
      }
      return false;
    }

    handleHeroDeath() {
      if (this.procs.has('graveReprieve') && !this.hero.graveReprieveUsed) {
        this.hero.graveReprieveUsed = true;
        this.hero.hp = 1;
        this.hero.barrier += this.hero.maxHp * .15;
        this.logMessage('Gravewalker reprieve prevents death.', 'proc');
        return;
      }
      this.hero.hp = 0;
      this.setHeroAnimation('death', .9, { recoil: 1.2 });
      this.presentation.vignette = 1;
      this.emitPresentation('expedition-failure', { source: 'hero-death' });
      this.finish(false);
    }

    buildResult(success) {
      const mission = this.dungeon.mission;
      const random = this.random;
      const bossKilled = success && this.room?.type === 'boss' && Boolean(mission.boss);
      const cleared = this.telemetry.roomsCleared;
      const lootCount = success ? Math.min(4, 1 + Math.floor(cleared / 2) + (bossKilled ? 1 : 0)) : Math.min(2, Math.floor(cleared / 3));
      const loot = this.previewLoot.map(item => C.deepClone(item));
      for (let i = loot.length; i < lootCount; i += 1) {
        const namedEliteBonus = this.telemetry.namedElitesKilled.length > 0;
        loot.push(C.generateItem(mission.level + (bossKilled ? 1 : 0), random, {
          luck: mission.reward * .08 + (bossKilled ? .12 : 0) + (namedEliteBonus ? .08 + Number(this.stats.namedHuntLuck || 0) : 0),
          source: bossKilled ? 'boss' : namedEliteBonus ? 'named-elite' : 'expedition',
          regionIndex: this.dungeon.regionIndex, socketFind: Number(this.stats.socketFind || 0), ancientLuck: Number(this.stats.ancientLuck || 0),
          forceRegional: (this.procs.has('deepWitness') || this.procs.has('extractionInstinct')) && namedEliteBonus && i === 0
        }));
      }
      const runes = {};
      const runeChance = .08 + this.telemetry.elitesKilled * .12 + (bossKilled ? .42 : 0) + Number(this.stats.runeFind || 0);
      if (random() < runeChance) {
        const keys = Object.keys(D.RUNES);
        const rune = keys[Math.floor(random() * keys.length)];
        runes[rune] = 1 + (bossKilled && random() < .2 ? 1 : 0);
      }
      const recipes = [];
      const unknown = Object.keys(D.RUNEWORDS).filter(id => !this.state.hero.recipes.includes(id));
      if (unknown.length && bossKilled && (this.state.hero.recipes.length === 0 || random() < .24 + Number(this.stats.recipeFind || 0))) recipes.push(unknown[Math.floor(random() * unknown.length)]);
      const xp = Math.round((18 + this.telemetry.kills * 2.2 + this.telemetry.elitesKilled * 12) * mission.reward * (success ? 1 : .55));
      return {
        success, bossKilled, bossId: bossKilled ? this.dungeon.bossId : null, regionIndex: this.dungeon.regionIndex,
        difficulty: mission.difficulty, missionId: mission.id, depth: Number(mission.depth || 0),
        contracts: [...(mission.contracts || [])], endlessModifiers: [...(mission.endlessModifiers || [])],
        namedElitesKilled: [...this.telemetry.namedElitesKilled],
        campaignStage: Number(mission.stage || 0), campaignFinal: Boolean(mission.campaignFinal),
        objectiveType: mission.objectiveType || 'clear', encounterId: mission.encounterId || null, finalBoss: Boolean(mission.principalFinal && bossKilled),
        heroHealthRatio: this.hero.hp / Math.max(1, this.hero.maxHp), heroMaxHealth: this.hero.maxHp,
        commandUsed: Math.max(0, this.route.length - 1), commandAvailable: Number(this.dungeon.commandPoints || 0),
        gold: Math.round(this.telemetry.gold * mission.reward * (success ? 1 : .6) * (this.procs.has('extractionInstinct') && mission.difficulty === 'endless' ? 1.12 : 1)),
        xp, kills: this.telemetry.kills, loot, runes, recipes,
        telemetry: C.deepClone(this.telemetry),
        duration: this.totalClock,
        roomsCleared: cleared,
        diagnosis: this.diagnose(success)
      };
    }

    diagnose(success) {
      const incoming = Object.entries(this.telemetry.incomingBySource).sort((a, b) => b[1] - a[1]);
      const abilities = Object.entries(this.telemetry.abilityDamage).sort((a, b) => b[1] - a[1]);
      const points = [];
      if (incoming[0]) points.push(`Most incoming damage came from ${incoming[0][0]} (${Math.round(incoming[0][1])}).`);
      if (this.telemetry.hazardsTaken > this.hero.maxHp * .1) points.push('Environmental damage materially reduced expedition endurance.');
      if (this.telemetry.healing < this.telemetry.damageTaken * .08) points.push('The build recovered very little health during combat.');
      if (this.telemetry.blocked + this.telemetry.dodged > this.telemetry.damageTaken * .35) points.push('Avoidance and mitigation prevented a significant amount of damage.');
      if (abilities[0]) points.push(`${abilities[0][0]} was the strongest triggered effect (${Math.round(abilities[0][1])} damage).`);
      const affixes = Object.entries(this.telemetry.eliteAffixTriggers).sort((a, b) => b[1] - a[1]);
      const behaviors = Object.entries(this.telemetry.tacticalBehaviors).sort((a, b) => b[1] - a[1]);
      if (this.telemetry.objectivesCompleted.length) points.push(`Objective completed: ${this.telemetry.objectivesCompleted.map(id => D.MISSION_OBJECTIVES[id]?.name || id).join(', ')}.`);
      if (this.telemetry.namedElitesKilled.length) points.push(`Named elite defeated: ${this.telemetry.namedElitesKilled.map(id => D.NAMED_ELITES[id]?.name || id).join(', ')}.`);
      if (affixes[0] && D.ELITE_AFFIXES[affixes[0][0]]) points.push(`${D.ELITE_AFFIXES[affixes[0][0]].name} was the most active elite pressure (${affixes[0][1]} triggers).`);
      else if (behaviors[0]) points.push(`The ${behaviors[0][0]} enemy behaviour activated ${behaviors[0][1]} times.`);
      if (!success && this.telemetry.roomsCleared >= this.route.length - 3) points.push('The route was nearly viable; a small increase in sustain or focused damage may be sufficient.');
      if (success && this.hero.hp / this.hero.maxHp < .2) points.push('The expedition succeeded with a narrow health margin.');
      if (!points.length) points.push(success ? 'The build cleared the route without a dominant weakness.' : 'The build was overwhelmed by cumulative incoming damage.');
      return points.slice(0, 4);
    }

    finish(success) {
      if (this.completed) return;
      this.completed = true;
      this.result = this.buildResult(success);
      this.phase = 'complete';
      this.setHeroAnimation(success ? 'victory' : 'death', success ? 1.2 : .9, { victory: success ? 1 : 0 });
      if (success) {
        this.showRoomBanner('Expedition complete', 'The build held.', 'clear', 2.1);
        this.emitPresentation('expedition-success', { duration: this.totalClock });
      } else if (this.presentation.lastEvent?.type !== 'expedition-failure') this.emitPresentation('expedition-failure', { duration: this.totalClock });
      this.logMessage(success ? 'Expedition successful.' : 'Expedition failed.', success ? 'good' : 'bad');
      this.completionHold = this.ctx && this.options.onComplete ? (this.state.settings.reducedMotion ? .22 : 1.05) : 0;
      if (!this.completionHold) this.notifyComplete();
      if (this.ctx) this.render();
    }

    addDamageText(x, y, text, color, large = false) {
      if (!this.presentationEnabled) return;
      if (!this.state.settings.damageNumbers && !['DODGE', 'BLOCK', 'EVADE'].includes(String(text))) return;
      const entry = this.acquireDamageText();
      Object.assign(entry, { x, y, text, color, life: large ? 1 : .75, maxLife: large ? 1 : .75, large, drift: (this.visualRandom() - .5) * 12 });
      this.damageTexts.push(entry);
      if (this.damageTexts.length > this.quality.maxDamageTexts) this.releaseDamageText(this.damageTexts.shift());
    }

    spawnParticles(x, y, count, color) {
      this.spawnVfx('spark', x, y, { count, color, priority: 2 });
    }

    spawnVfx(kind, x, y, options = {}) {
      if (!this.presentationEnabled) return;
      const priority = Number(options.priority ?? 2);
      const baseCount = Math.max(1, Number(options.count || 6));
      const count = Math.max(1, Math.round(baseCount * this.quality.particleScale));
      const lifeBase = Number(options.life || (kind === 'smoke' ? .75 : .38));
      for (let i = 0; i < count; i += 1) {
        if (this.particles.length >= this.quality.maxParticles) {
          const replaceIndex = this.particles.findIndex(particle => Number(particle.priority || 0) < priority);
          if (replaceIndex < 0) break;
          this.releaseParticle(this.particles.splice(replaceIndex, 1)[0]);
        }
        const angle = options.angle == null ? this.visualRandom() * Math.PI * 2 : Number(options.angle) + (this.visualRandom() - .5) * Number(options.spread || .7);
        const speed = Number(options.speed || 62) * (.35 + this.visualRandom() * .9);
        const particle = this.acquireParticle();
        Object.assign(particle, {
          x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: lifeBase * (.72 + this.visualRandom() * .55), maxLife: lifeBase,
          color: options.color || '#d7c9ae', size: Number(options.size || 3) * (.72 + this.visualRandom() * .75), kind, priority,
          drag: Number(options.drag || (kind === 'smoke' ? .985 : .93)), gravity: Number(options.gravity || 0), rotation: this.visualRandom() * Math.PI * 2
        });
        this.particles.push(particle);
      }
    }

    spawnImpact(x, y, color, impact = 'spark', kind = 'hit') {
      const definitions = {
        slash: { count: 7, speed: 90, spread: .9, life: .28, size: 3, priority: 3 },
        critical: { count: 16, speed: 145, spread: 6.2, life: .42, size: 4, priority: 6 },
        block: { count: 11, speed: 105, spread: 5.8, life: .38, size: 3, priority: 4 },
        blood: { count: 8, speed: 85, spread: 4.2, life: .34, size: 3, priority: 3, gravity: 75 },
        frost: { count: 13, speed: 90, spread: 6.2, life: .5, size: 3, priority: 4 },
        storm: { count: 15, speed: 120, spread: 6.2, life: .35, size: 3, priority: 5 },
        poison: { count: 10, speed: 70, spread: 6.2, life: .55, size: 4, priority: 3 },
        spark: { count: 7, speed: 75, spread: 6.2, life: .3, size: 3, priority: 2 }
      };
      this.spawnVfx(impact, x, y, { color, ...(definitions[impact] || definitions.spark) });
      if (impact === 'critical') this.presentation.flash = Math.max(this.presentation.flash, .028);
    }

    spawnAbilityVfx(id) {
      const h = this.hero;
      const colorByBranch = { blood: '#c85f56', steel: '#9fc4d9', storm: '#8ec9ff', shadow: '#a694bc', command: '#d8bd72' };
      const ability = D.ABILITIES[id];
      const color = colorByBranch[ability?.branch] || '#d8bd72';
      const kind = ['bloodstorm', 'cleave', 'shieldBurst', 'aegisMarch'].includes(id) ? 'ring' : ['stormArc', 'tempest', 'overcharge', 'thunderhead'].includes(id) ? 'storm' : ['shadowstep', 'smokeVeil', 'markedPrey'].includes(id) ? 'smoke' : 'sigil';
      this.spawnVfx(kind, h.x, h.y, { color, count: kind === 'ring' ? 22 : 16, speed: kind === 'smoke' ? 38 : 105, life: kind === 'smoke' ? .75 : .5, size: kind === 'sigil' ? 4 : 3, priority: 4 });
      this.cameraImpact(['execution', 'bloodstorm', 'thunderhead', 'aegisMarch'].includes(id) ? .5 : .22, ['execution', 'bloodstorm', 'thunderhead'].includes(id) ? 1.04 : 1.018, .2);
    }

    drawAuthoredCrest(ctx, key, x, y, size, alpha = 1) {
      const seed = C.hashString(String(key || 'crest'));
      const spokes = 5 + (seed % 4);
      const inner = size * (.28 + ((seed >>> 4) % 15) / 100);
      ctx.save(); ctx.translate(x, y); ctx.rotate(((seed >>> 8) % 360) * Math.PI / 180);
      ctx.globalAlpha = alpha; ctx.lineWidth = Math.max(1, size * .035);
      ctx.beginPath();
      for (let i = 0; i < spokes * 2; i += 1) {
        const angle = -Math.PI / 2 + Math.PI * i / spokes;
        const radius = i % 2 ? inner : size;
        const px = Math.cos(angle) * radius, py = Math.sin(angle) * radius;
        if (!i) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, 0, size * .16, 0, Math.PI * 2); ctx.stroke();
      const cut = ((seed >>> 12) % spokes);
      for (let i = 0; i < spokes; i += 1) {
        if (i === cut) continue;
        const angle = -Math.PI / 2 + Math.PI * 2 * i / spokes;
        ctx.beginPath(); ctx.moveTo(Math.cos(angle) * size * .2, Math.sin(angle) * size * .2); ctx.lineTo(Math.cos(angle) * size * .72, Math.sin(angle) * size * .72); ctx.stroke();
      }
      ctx.restore();
    }

    drawRegionMotif(ctx, region) {
      const regionKey = region.id || region.name;
      ctx.save(); ctx.strokeStyle = `hsla(${region.hue} 42% 68% / .055)`; ctx.fillStyle = ctx.strokeStyle;
      this.drawAuthoredCrest(ctx, regionKey, this.width * .83, this.height * .24, Math.min(this.width, this.height) * .12, 1);
      ctx.globalAlpha = .045;
      const horizon = this.height * .76;
      if (region.id === 'fields') {
        for (let x = 20; x < this.width; x += 42) { ctx.beginPath(); ctx.moveTo(x, horizon); ctx.lineTo(x + 7, horizon - 34 - (x % 3) * 5); ctx.lineTo(x + 13, horizon); ctx.stroke(); }
      } else if (region.id === 'ruins') {
        for (let x = 36; x < this.width; x += 90) { ctx.strokeRect(x, horizon - 52, 34, 52); ctx.beginPath(); ctx.arc(x + 17, horizon - 52, 17, Math.PI, 0); ctx.stroke(); }
      } else if (region.id === 'citadel') {
        for (let x = 20; x < this.width; x += 78) { ctx.strokeRect(x, horizon - 42, 50, 42); ctx.strokeRect(x + 18, horizon - 20, 14, 20); }
      } else if (region.id === 'forest') {
        for (let x = 20; x < this.width; x += 64) { ctx.beginPath(); ctx.moveTo(x + 24, horizon); ctx.lineTo(x + 24, horizon - 58); ctx.moveTo(x, horizon - 22); ctx.lineTo(x + 24, horizon - 58); ctx.lineTo(x + 48, horizon - 20); ctx.stroke(); }
      } else if (region.id === 'mountains') {
        ctx.beginPath(); ctx.moveTo(0, horizon); for (let x = 0; x <= this.width; x += 90) ctx.lineTo(x + 45, horizon - 70 - (x % 180 ? 25 : 0)), ctx.lineTo(x + 90, horizon); ctx.stroke();
      } else {
        for (let x = 35; x < this.width; x += 110) { ctx.beginPath(); ctx.arc(x, horizon - 35, 28, 0, Math.PI * 2); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x - 38, horizon); ctx.lineTo(x, horizon - 80); ctx.lineTo(x + 38, horizon); ctx.stroke(); }
      }
      ctx.restore();
    }

    drawArenaBackground(ctx, region) {
      if (this.quality.gradients) {
        const grad = ctx.createRadialGradient(this.width * .58, this.height * .42, 24, this.width * .55, this.height * .48, this.width * .82);
        grad.addColorStop(0, `hsl(${region.hue} 19% 18%)`);
        grad.addColorStop(.58, `hsl(${region.hue} 14% 11%)`);
        grad.addColorStop(1, `hsl(${region.hue} 12% 6%)`);
        ctx.fillStyle = grad;
      } else ctx.fillStyle = `hsl(${region.hue} 13% 9%)`;
      ctx.fillRect(0, 0, this.width, this.height);
