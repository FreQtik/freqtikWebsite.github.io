      const roomPulse = this.phase === 'combat' ? .05 + Math.sin(this.presentation.clock * .75) * .012 : .025;
      ctx.fillStyle = `hsla(${region.hue} 42% 45% / ${roomPulse})`;
      ctx.beginPath();
      ctx.ellipse(this.width * .58, this.height * .52, this.width * .48, this.height * .36, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = 'rgba(255,255,255,.035)';
      ctx.lineWidth = 1;
      const grid = this.visualQuality === 'low' ? 72 : 54;
      const driftX = (this.presentation.clock * 5) % grid;
      const driftY = (this.presentation.clock * 2) % grid;
      for (let x = -grid + driftX; x < this.width + grid; x += grid) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, this.height); ctx.stroke();
      }
      for (let y = -grid + driftY; y < this.height + grid; y += grid) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(this.width, y); ctx.stroke();
      }

      ctx.strokeStyle = `hsla(${region.hue} 35% 62% / .10)`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(35, this.height * .73);
      ctx.bezierCurveTo(this.width * .3, this.height * .61, this.width * .58, this.height * .82, this.width - 28, this.height * .64);
      ctx.stroke();

      this.drawRegionMotif(ctx, region);

      if (this.quality.ambientMotes) {
        for (let i = 0; i < this.quality.ambientMotes; i += 1) {
          const seed = i * 17.371;
          const x = (Math.sin(seed * 4.13) * .5 + .5) * this.width;
          const y = ((Math.cos(seed * 2.47) * .5 + .5) * this.height + this.presentation.clock * (3 + i % 4)) % this.height;
          const alpha = .08 + (i % 5) * .012;
          ctx.fillStyle = `hsla(${region.hue} 48% 72% / ${alpha})`;
          ctx.fillRect(x, y, i % 3 === 0 ? 2 : 1, i % 3 === 0 ? 2 : 1);
        }
      }
    }

    drawProjectile(ctx, projectile) {
      const angle = Number(projectile.angle || 0);
      ctx.save();
      ctx.translate(projectile.x, projectile.y);
      ctx.rotate(angle);
      if (this.quality.trails && projectile.trail) {
        const length = projectile.kind === 'chain' ? 25 : projectile.kind === 'frost' ? 20 : 17;
        const trail = ctx.createLinearGradient(-length, 0, 4, 0);
        trail.addColorStop(0, 'rgba(255,255,255,0)');
        trail.addColorStop(1, projectile.color);
        ctx.strokeStyle = trail;
        ctx.lineWidth = Math.max(1, Number(projectile.width || 2) * .72);
        ctx.beginPath(); ctx.moveTo(-length, 0); ctx.lineTo(2, 0); ctx.stroke();
      }
      ctx.strokeStyle = projectile.color;
      ctx.fillStyle = projectile.color;
      ctx.lineWidth = Number(projectile.width || 2);
      if (projectile.kind === 'frost') {
        ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(-4, -5); ctx.lineTo(-1, 0); ctx.lineTo(-4, 5); ctx.closePath(); ctx.fill();
      } else if (projectile.kind === 'storm' || projectile.kind === 'chain') {
        ctx.beginPath(); ctx.moveTo(-8, 3); ctx.lineTo(-2, -2); ctx.lineTo(1, 2); ctx.lineTo(8, -3); ctx.stroke();
      } else {
        ctx.beginPath(); ctx.moveTo(-7, 0); ctx.lineTo(7, 0); ctx.stroke();
        ctx.beginPath(); ctx.arc(7, 0, Math.max(2, Number(projectile.width || 2)), 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
    }

    drawParticle(ctx, particle) {
      const alpha = C.clamp(particle.life / Math.max(.01, particle.maxLife || particle.life), 0, 1);
      const size = Number(particle.size || 3) * (.7 + alpha * .3);
      ctx.save();
      ctx.translate(particle.x, particle.y);
      ctx.rotate(Number(particle.rotation || 0) + this.presentation.clock * .6);
      ctx.globalAlpha = alpha * (particle.kind === 'smoke' ? .42 : .92);
      ctx.fillStyle = particle.color;
      ctx.strokeStyle = particle.color;
      if (particle.kind === 'ring') {
        ctx.globalAlpha *= .65;
        ctx.lineWidth = Math.max(1, size * .35);
        ctx.beginPath(); ctx.arc(0, 0, size * 1.6, 0, Math.PI * 2); ctx.stroke();
      } else if (particle.kind === 'sigil') {
        ctx.lineWidth = 1.3;
        ctx.beginPath();
        for (let i = 0; i < 6; i += 1) {
          const a = Math.PI / 3 * i;
          const px = Math.cos(a) * size;
          const py = Math.sin(a) * size;
          if (!i) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath(); ctx.stroke();
      } else if (particle.kind === 'smoke') {
        ctx.beginPath(); ctx.arc(0, 0, size * (1.2 + (1 - alpha)), 0, Math.PI * 2); ctx.fill();
      } else if (particle.kind === 'critical' || particle.kind === 'storm') {
        ctx.beginPath(); ctx.moveTo(0, -size * 1.6); ctx.lineTo(size * .5, 0); ctx.lineTo(0, size * 1.6); ctx.lineTo(-size * .5, 0); ctx.closePath(); ctx.fill();
      } else {
        ctx.fillRect(-size * .5, -size * .5, size, size);
      }
      ctx.restore();
    }

    drawEnemySilhouette(ctx, enemy, visualKey, radius, fill, edge) {
      ctx.fillStyle = fill;
      ctx.strokeStyle = edge;
      ctx.lineWidth = enemy.role === 'boss' ? 3 : enemy.role === 'elite' ? 2.5 : 2;
      const r = radius;
      if (visualKey === 'brute' || visualKey === 'guardian') {
        ctx.beginPath();
        ctx.moveTo(-r * .9, -r * .45); ctx.lineTo(-r * .62, -r); ctx.lineTo(r * .62, -r); ctx.lineTo(r * .9, -r * .45);
        ctx.lineTo(r * .72, r * .9); ctx.lineTo(-r * .72, r * .9); ctx.closePath(); ctx.fill(); ctx.stroke();
        if (visualKey === 'guardian') {
          ctx.fillStyle = edge; ctx.globalAlpha = .45;
          ctx.beginPath(); ctx.moveTo(-r * .95, -r * .45); ctx.lineTo(-r * .35, -r * .75); ctx.lineTo(-r * .22, r * .7); ctx.lineTo(-r * .9, r * .35); ctx.closePath(); ctx.fill();
          ctx.globalAlpha = 1;
        }
      } else if (visualKey === 'ranged' || visualKey === 'skirmisher') {
        ctx.beginPath(); ctx.moveTo(0, -r * 1.05); ctx.lineTo(r * .82, r * .8); ctx.lineTo(0, r * .5); ctx.lineTo(-r * .82, r * .8); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.arc(r * .72, 0, r * .45, Math.PI * .55, Math.PI * 1.45); ctx.stroke();
      } else if (visualKey === 'support' || visualKey === 'healer' || visualKey === 'hasteSupport' || visualKey === 'damageSupport' || visualKey === 'frostHex' || visualKey === 'nullHex') {
        ctx.beginPath();
        for (let i = 0; i < 6; i += 1) {
          const a = -Math.PI / 2 + i * Math.PI / 3;
          const px = Math.cos(a) * r;
          const py = Math.sin(a) * r;
          if (!i) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.arc(0, -r * .1, r * .46, 0, Math.PI * 2); ctx.stroke();
        if (visualKey === 'healer') {
          ctx.globalAlpha = .5 + Math.sin(this.presentation.clock * 4) * .15;
          ctx.beginPath(); ctx.arc(0, 0, r * 1.22, 0, Math.PI * 2); ctx.stroke(); ctx.globalAlpha = 1;
        }
      } else if (visualKey === 'charger' || visualKey === 'rootCharge') {
        ctx.beginPath(); ctx.moveTo(r * 1.12, 0); ctx.lineTo(-r * .72, -r * .85); ctx.lineTo(-r * .48, 0); ctx.lineTo(-r * .72, r * .85); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(r * .28, -r * .78); ctx.lineTo(r * .7, -r * 1.2); ctx.moveTo(r * .28, r * .78); ctx.lineTo(r * .7, r * 1.2); ctx.stroke();
      } else if (visualKey === 'exploder') {
        ctx.beginPath();
        for (let i = 0; i < 16; i += 1) {
          const a = i * Math.PI / 8;
          const rr = i % 2 ? r * .82 : r * 1.18;
          const px = Math.cos(a) * rr;
          const py = Math.sin(a) * rr;
          if (!i) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath(); ctx.fill(); ctx.stroke();
      } else if (visualKey === 'ambusher' || visualKey === 'leech') {
        ctx.beginPath(); ctx.moveTo(0, -r * 1.15); ctx.lineTo(r * .82, 0); ctx.lineTo(0, r * 1.15); ctx.lineTo(-r * .82, 0); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 0, r * .34, 0, Math.PI * 2); ctx.stroke();
      } else if (visualKey === 'boss') {
        ctx.beginPath();
        ctx.moveTo(-r * .82, -r * .52); ctx.lineTo(-r * .58, -r * 1.02); ctx.lineTo(-r * .18, -r * .72);
        ctx.lineTo(0, -r * 1.2); ctx.lineTo(r * .18, -r * .72); ctx.lineTo(r * .58, -r * 1.02); ctx.lineTo(r * .82, -r * .52);
        ctx.lineTo(r * .74, r * .88); ctx.lineTo(-r * .74, r * .88); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.globalAlpha = .35;
        ctx.beginPath(); ctx.arc(0, 0, r * 1.22 + Math.sin(this.presentation.clock * 3) * 2, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = 1;
      } else if (visualKey === 'elite') {
        ctx.beginPath();
        for (let i = 0; i < 8; i += 1) {
          const a = -Math.PI / 2 + i * Math.PI / 4;
          const rr = i % 2 ? r * .85 : r * 1.05;
          const px = Math.cos(a) * rr;
          const py = Math.sin(a) * rr;
          if (!i) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath(); ctx.fill(); ctx.stroke();
      } else {
        ctx.beginPath(); ctx.moveTo(0, -r); ctx.lineTo(r * .82, -r * .25); ctx.lineTo(r * .64, r * .88); ctx.lineTo(-r * .64, r * .88); ctx.lineTo(-r * .82, -r * .25); ctx.closePath(); ctx.fill(); ctx.stroke();
      }
    }

    renderEnemy(ctx, enemy) {
      const visual = enemy.visual || { state: 'idle', stride: 0, recoil: 0, death: 0, facing: -1, roleKey: roleKey(enemy) };
      const ratio = C.clamp(enemy.hp / enemy.maxHp, 0, 1);
      const death = C.clamp(Number(visual.death || 0), 0, 1);
      const stateProgress = visual.duration > 0 ? 1 - C.clamp(visual.time / visual.duration, 0, 1) : 1;
      const bob = visual.state === 'advance' ? Math.sin(visual.stride) * 2.2 : Math.sin(this.presentation.clock * 2 + enemy.x * .01) * .55;
      const recoil = Number(visual.recoil || 0) * (1 - stateProgress) * 4;
      const attackLunge = visual.state === 'attack' ? Math.sin(stateProgress * Math.PI) * 7 : 0;
      const castPulse = visual.state === 'cast' ? Math.sin(stateProgress * Math.PI) : 0;
      const facing = Number(visual.facing || -1);
      const scale = (1 + castPulse * .08) * (1 - death * .55);
      const rotation = death * facing * .75 + (visual.state === 'stagger' ? Math.sin(stateProgress * Math.PI) * -.18 * facing : 0);
      const fill = enemy.role === 'boss' ? '#754047' : enemy.role === 'elite' ? '#6e5731' : enemy.range > 60 ? '#50485b' : enemy.role === 'brute' ? '#51483d' : '#46433c';
      const edge = enemy.role === 'boss' ? '#efaa94' : enemy.role === 'elite' ? '#e4c26d' : enemy.behavior === 'healer' ? '#8fcf9a' : enemy.range > 60 ? '#b4a6c6' : '#aaa194';

      ctx.save();
      ctx.translate(enemy.x + facing * attackLunge - facing * recoil, enemy.y + bob + death * 10);
      ctx.rotate(rotation);
      ctx.scale(scale, scale);
      ctx.globalAlpha = 1 - death;

      if (this.quality.shadows) {
        ctx.save(); ctx.scale(1, .45); ctx.globalAlpha = .25 * (1 - death); ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.ellipse(0, enemy.radius * 1.45, enemy.radius * 1.15, enemy.radius * .55, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();
      }

      if (castPulse > 0) {
        ctx.globalAlpha = .25 * castPulse;

        ctx.beginPath(); ctx.arc(0, 0, enemy.radius * (1.2 + castPulse * .45), 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = 1 - death;
      }

      this.drawEnemySilhouette(ctx, enemy, visual.roleKey || roleKey(enemy), enemy.radius, fill, edge);
      ctx.fillStyle = '#f1eadc';
      ctx.font = `700 ${Math.max(11, enemy.radius * .72)}px system-ui`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(enemy.icon, 0, 1);

      if (enemy.barrier > 0) {
        ctx.strokeStyle = '#e4c96f'; ctx.lineWidth = 2.5; ctx.globalAlpha = .76;
        ctx.beginPath(); ctx.arc(0, 0, enemy.radius + 6 + Math.sin(this.presentation.clock * 4 + enemy.x) * 1.2, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = 1 - death;
      }
      if (enemy.statuses.poison) {
        ctx.strokeStyle = '#78b96f'; ctx.lineWidth = 2;
        ctx.setLineDash([3, 4]); ctx.beginPath(); ctx.arc(0, 0, enemy.radius + 5, 0, Math.PI * 2); ctx.stroke(); ctx.setLineDash([]);
      }
      if (enemy.statuses.fortify) {
        ctx.strokeStyle = '#c9b17b'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(-enemy.radius, enemy.radius * .7); ctx.lineTo(0, enemy.radius + 9); ctx.lineTo(enemy.radius, enemy.radius * .7); ctx.stroke();
      }

      ctx.globalAlpha = 1 - death;
      const barWidth = Math.max(enemy.radius * 2, enemy.role === 'boss' ? 76 : enemy.role === 'elite' || enemy.namedEliteId ? 60 : 42);
      const barHeight = enemy.role === 'boss' || enemy.role === 'elite' || enemy.namedEliteId ? 7 : 5;
      const barY = -enemy.radius - (enemy.role === 'boss' || enemy.role === 'elite' || enemy.namedEliteId ? 18 : 12);
      ctx.fillStyle = 'rgba(8,8,8,.94)';
      ctx.fillRect(-barWidth / 2 - 1, barY - 1, barWidth + 2, barHeight + 2);
      ctx.fillStyle = 'rgba(67,53,47,.98)'; ctx.fillRect(-barWidth / 2, barY, barWidth, barHeight);
      ctx.fillStyle = enemy.role === 'boss' ? '#df786d' : enemy.role === 'elite' || enemy.namedEliteId ? '#d0a852' : '#b45e55';
      ctx.fillRect(-barWidth / 2, barY, barWidth * ratio, barHeight);
      if (enemy.barrier > 0) {
        const barrierRatio = C.clamp(enemy.barrier / Math.max(1, enemy.maxHp), 0, 1);
        ctx.fillStyle = '#d9c977';
        ctx.fillRect(-barWidth / 2, barY + barHeight - 2, barWidth * barrierRatio, 2);
      }
      if (enemy.role === 'boss' || enemy.role === 'elite' || enemy.namedEliteId) {
        ctx.fillStyle = '#ede5d7'; ctx.font = `600 ${enemy.role === 'boss' ? 11 : 9}px system-ui`; ctx.textBaseline = 'alphabetic';
        ctx.fillText(enemy.name, 0, barY - 4);
      }

      if (enemy.eliteAffixes?.length) {
        ctx.font = '700 9px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        enemy.eliteAffixes.slice(0, 4).forEach((id, index) => {
          const count = Math.min(4, enemy.eliteAffixes.length);
          const ax = (index - (count - 1) / 2) * 16;
          const ay = enemy.radius + 11;
          ctx.fillStyle = '#261f18'; ctx.beginPath(); ctx.arc(ax, ay, 7, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#e9c96f'; ctx.fillText(D.ELITE_AFFIXES[id]?.icon || '◆', ax, ay + .5);
        });
      }
      ctx.restore();
    }

    renderHero(ctx) {
      const h = this.hero;
      const visual = h.visual || { state: 'idle', stride: 0, recoil: 0, facing: 1, time: 0, duration: 0 };
      const progress = visual.duration > 0 ? 1 - C.clamp(visual.time / visual.duration, 0, 1) : 1;
      const facing = Number(visual.facing || 1);
      const runBob = visual.state === 'run' ? Math.sin(visual.stride) * 2.4 : Math.sin(this.presentation.clock * 2.4) * .6;
      const runLean = visual.state === 'run' ? Math.sin(visual.stride) * .06 : 0;
      const hurtLean = visual.state === 'hurt' ? -facing * Math.sin(progress * Math.PI) * .22 : 0;
      const death = visual.state === 'death' ? easeOut(progress) : 0;
      const attackSwing = visual.state === 'attack' ? -1.1 + smoothstep(progress) * 2.35 : -.72;
      const blockRaise = visual.state === 'block' ? Math.sin(progress * Math.PI) : 0;
      const castPulse = visual.state === 'cast' ? Math.sin(progress * Math.PI) : 0;
      const victory = visual.state === 'victory' ? Math.sin(Math.min(1, progress) * Math.PI) : 0;
      const equipment = this.state.hero.equipment || {};
      const setPiece = Object.values(equipment).find(item => item?.setId);
      const legendary = Object.values(equipment).some(item => item?.rarity === 'legendary' || item?.rarity === 'ancient');
      const body = h.statuses.bloodRage ? '#8e4039' : h.statuses.smokeVeil ? '#655a72' : h.statuses.bastion ? '#50697a' : setPiece ? '#655838' : '#5c5951';
      const edge = legendary ? '#edcf83' : '#ded3bd';
      const cape = equipment.cape ? '#49353a' : '#332f2b';

      ctx.save();
      ctx.translate(h.x - facing * Number(visual.recoil || 0) * 3, h.y + runBob + death * 10);
      ctx.rotate(runLean + hurtLean + death * facing * 1.25);
      ctx.scale(1 - death * .28, 1 - death * .45);
      ctx.globalAlpha = 1 - death * .75;

      if (this.quality.shadows) {
        ctx.save(); ctx.scale(1, .42); ctx.globalAlpha = .3 * (1 - death);
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.ellipse(0, 40, 24, 10, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();
      }

      if (h.barrier > 0) {
        const barrierRatio = C.clamp(h.barrier / Math.max(1, h.maxHp * .4), 0, 1);
        ctx.strokeStyle = '#8fc9df'; ctx.lineWidth = 2.5 + barrierRatio * 1.5; ctx.globalAlpha = .45 + barrierRatio * .35;
        ctx.beginPath(); ctx.arc(0, 0, 25 + Math.sin(this.presentation.clock * 4) * 1.5, 0, Math.PI * 2); ctx.stroke(); ctx.globalAlpha = 1 - death * .75;
      }

      if (castPulse > 0) {
        ctx.strokeStyle = edge; ctx.lineWidth = 2; ctx.globalAlpha = .26 + castPulse * .35;
        ctx.beginPath(); ctx.arc(0, 0, 22 + castPulse * 11, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 0, 13 + castPulse * 7, 0, Math.PI * 2); ctx.stroke(); ctx.globalAlpha = 1 - death * .75;
      }

      ctx.save();
      ctx.scale(facing, 1);
      ctx.fillStyle = cape; ctx.strokeStyle = '#837068'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(-8, -10); ctx.lineTo(-21, 26); ctx.lineTo(-4, 19); ctx.lineTo(7, 27); ctx.lineTo(8, -9); ctx.closePath(); ctx.fill(); ctx.stroke();

      ctx.fillStyle = body; ctx.strokeStyle = edge; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-11, -8); ctx.lineTo(-15, 12); ctx.lineTo(-8, 25); ctx.lineTo(8, 25); ctx.lineTo(15, 12); ctx.lineTo(11, -8); ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#c6b99f'; ctx.beginPath(); ctx.arc(0, -16, 8.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

      const legOffset = visual.state === 'run' ? Math.sin(visual.stride) * 5 : 0;
      ctx.strokeStyle = edge; ctx.lineWidth = 5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(-5, 19); ctx.lineTo(-7 + legOffset, 34); ctx.moveTo(5, 19); ctx.lineTo(7 - legOffset, 34); ctx.stroke();

      const shieldX = -15 + blockRaise * 7;
      const shieldY = 3 - blockRaise * 5;
      ctx.fillStyle = '#4c5960'; ctx.strokeStyle = '#a9c4cf'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(shieldX - 7, shieldY - 8); ctx.lineTo(shieldX + 6, shieldY - 5); ctx.lineTo(shieldX + 5, shieldY + 10); ctx.lineTo(shieldX - 1, shieldY + 15); ctx.lineTo(shieldX - 8, shieldY + 8); ctx.closePath(); ctx.fill(); ctx.stroke();

      ctx.save();
      ctx.translate(9, -1 - victory * 9);
      ctx.rotate(attackSwing - victory * .85);
      ctx.strokeStyle = '#ded7c8'; ctx.lineWidth = 3; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(29, 0); ctx.stroke();
      ctx.strokeStyle = '#8b6b43'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(-3, 0); ctx.lineTo(5, 0); ctx.stroke();
      ctx.restore();
      ctx.restore();

      if (h.statuses.bloodRage || h.statuses.warBanner) {

      }
      ctx.restore();
    }

    drawRoomObject(ctx) {
      const object = this.roomObject;
      if (!object) return;
      const pulse = .5 + Math.sin(this.presentation.clock * 3.2) * .5;
      ctx.save();
      ctx.translate(object.x, object.y);
      if (this.quality.shadows) {
        ctx.save(); ctx.scale(1, .34); ctx.globalAlpha = .34; ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.ellipse(0, 52, object.type === 'chest' ? 48 : 42, 15, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();
      }
      if (object.type === 'chest') {
        const opening = smoothstep(Number(object.progress || 0));
        ctx.globalAlpha = .16 + pulse * .07;
        ctx.fillStyle = '#d3a23c'; ctx.beginPath(); ctx.arc(0, -2, 42 + opening * 12, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.strokeStyle = '#6f5325'; ctx.fillStyle = '#362818'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.rect(-34, -3, 68, 38); ctx.fill(); ctx.stroke();
        ctx.save(); ctx.translate(0, -3); ctx.rotate(-opening * .68);
        ctx.fillStyle = '#49341d'; ctx.strokeStyle = '#b48639'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.rect(-34, -22, 68, 24); ctx.fill(); ctx.stroke();
        ctx.restore();
        ctx.fillStyle = '#d4ae56'; ctx.fillRect(-4, 5, 8, 14);
        ctx.strokeStyle = '#e6c56e'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(-25, -1); ctx.lineTo(-25, 34); ctx.moveTo(25, -1); ctx.lineTo(25, 34); ctx.stroke();
        if (opening > .15) {
          const beam = ctx.createLinearGradient(0, -44, 0, 22);
          beam.addColorStop(0, 'rgba(237,202,104,0)'); beam.addColorStop(1, `rgba(237,202,104,${.14 + opening * .24})`);
          ctx.fillStyle = beam; ctx.beginPath(); ctx.moveTo(-28, -12); ctx.lineTo(28, -12); ctx.lineTo(13, -58); ctx.lineTo(-13, -58); ctx.closePath(); ctx.fill();
        }

        const active = smoothstep(Number(object.progress || 0));

        ctx.fillStyle = '#56cdbf'; ctx.beginPath(); ctx.arc(0, -12, 48 + active * 12, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#242925'; ctx.strokeStyle = '#7b8d82'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.ellipse(0, 18, 37, 14, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#3f504a'; ctx.beginPath(); ctx.rect(-31, 17, 62, 26); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#143d3b'; ctx.strokeStyle = '#68d8ca';
        ctx.beginPath(); ctx.ellipse(0, 15, 29, 9, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.strokeStyle = `rgba(109,232,217,${.45 + pulse * .35})`; ctx.lineWidth = 2;
        for (let i = 0; i < 3; i += 1) {
          const y = -3 - i * 12 - active * 7;
          ctx.beginPath(); ctx.arc(0, y, 8 + i * 4 + pulse * 2, Math.PI * .15, Math.PI * .85); ctx.stroke();
        }
        ctx.fillStyle = '#78e3d5'; ctx.globalAlpha = .65 + pulse * .25;
        ctx.beginPath(); ctx.arc(0, -20 - active * 9, 4 + active * 2, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
    }

    drawTransitionVeil(ctx) {
      const amount = C.clamp(Number(this.presentation.roomTransition || 0), 0, 1);
      if (amount <= .01) return;
      ctx.save();
      ctx.globalAlpha = amount * .76;
      const gradient = ctx.createLinearGradient(0, 0, this.width, 0);
      gradient.addColorStop(0, 'rgba(7,7,8,0)');
      gradient.addColorStop(.34, 'rgba(40,25,53,.4)');
      gradient.addColorStop(.5, 'rgba(119,73,154,.66)');
      gradient.addColorStop(.66, 'rgba(40,25,53,.4)');
      gradient.addColorStop(1, 'rgba(7,7,8,0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, this.width, this.height);
      ctx.strokeStyle = `rgba(195,151,230,${.12 + amount * .2})`;
      ctx.lineWidth = 2;
      for (let i = 0; i < 11; i += 1) {
        const y = ((i + 1) / 12) * this.height + Math.sin(this.presentation.clock * 7 + i) * 8;
        const offset = ((this.presentation.clock * (70 + i * 7)) % (this.width + 220)) - 110;
        ctx.beginPath(); ctx.moveTo(offset - 130, y); ctx.lineTo(offset + 130, y); ctx.stroke();
      }
      ctx.restore();
    }

    drawLootReveal(ctx) {
      const reveal = this.presentation.lootReveal;
      if (!reveal?.item) return;
      const elapsed = 1 - reveal.time / reveal.duration;
      const intro = smoothstep(Math.min(1, elapsed * 6));
      const outro = smoothstep(Math.min(1, reveal.time * 4));
      const alpha = intro * outro;
      const item = reveal.item;
      const colors = { normal: '#afa899', magic: '#6ea2eb', rare: '#e1b34e', epic: '#ad75de', legendary: '#e67e35', ancient: '#efc86f' };
      const accent = colors[item.rarity] || '#d3b66b';
      const power = C.itemScore(item);
      const w = Math.min(430, this.width * .58), h = 116;
      const x = (this.width - w) / 2, y = this.height * .13 + (1 - intro) * 18;
      ctx.save(); ctx.globalAlpha = alpha;
      const glow = ctx.createRadialGradient(this.width * .5, y + h * .5, 5, this.width * .5, y + h * .5, w * .65);
      glow.addColorStop(0, `${accent}33`); glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow; ctx.fillRect(x - 70, y - 45, w + 140, h + 90);
      ctx.fillStyle = 'rgba(12,11,10,.94)'; ctx.strokeStyle = accent; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.rect(x, y, w, h); ctx.fill(); ctx.stroke();
      ctx.fillStyle = `${accent}18`; ctx.fillRect(x + 1, y + 1, 86, h - 2);
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillStyle = accent; ctx.font = '700 34px system-ui';
      ctx.fillText(item.icon || '◆', x + 44, y + h * .5);
      ctx.textAlign = 'left';
      ctx.fillStyle = accent; ctx.font = '700 11px system-ui'; ctx.fillText(`${D.RARITIES[item.rarity]?.label || item.rarity} ${String(item.slot || '').toUpperCase()}`, x + 104, y + 26);
      ctx.fillStyle = '#f3eadb'; ctx.font = '800 19px system-ui'; ctx.fillText(String(item.name || 'Recovered Relic').slice(0, 30), x + 104, y + 52);
      ctx.fillStyle = '#b8ad9b'; ctx.font = '500 12px system-ui'; ctx.fillText(`Item power ${power} · Added to expedition haul`, x + 104, y + 77);
      ctx.fillStyle = '#d9bc68'; ctx.font = '700 12px system-ui'; ctx.fillText('CHEST REWARD', x + 104, y + 98);
      ctx.restore();
    }

    drawPresentationOverlay(ctx) {
      const p = this.presentation;
      if (p.vignette > 0) {
        const grad = ctx.createRadialGradient(this.width * .5, this.height * .5, this.width * .2, this.width * .5, this.height * .5, this.width * .72);
        grad.addColorStop(0, 'rgba(0,0,0,0)'); grad.addColorStop(1, `rgba(66,18,22,${p.vignette * .2})`);
        ctx.fillStyle = grad; ctx.fillRect(0, 0, this.width, this.height);
      }
      if (p.flash > 0) {
        ctx.globalAlpha = Math.min(.055, p.flash);
        ctx.fillStyle = p.flashColor || '#fff'; ctx.fillRect(0, 0, this.width, this.height); ctx.globalAlpha = 1;
      }

      if (p.roomBanner) {
        const elapsed = 1 - p.roomBanner.time / p.roomBanner.duration;
        const intro = smoothstep(Math.min(1, elapsed * 5));
        const outro = smoothstep(Math.min(1, p.roomBanner.time * 4));
        const alpha = intro * outro;
        const y = this.height * .77 + (1 - intro) * 18;
        ctx.globalAlpha = alpha;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = 'rgba(13,12,10,.72)'; ctx.fillRect(this.width * .2, y - 32, this.width * .6, 64);
        ctx.strokeStyle = p.roomBanner.type === 'boss' ? '#d57f70' : p.roomBanner.type === 'clear' ? '#d0b56f' : '#807667';
        ctx.beginPath(); ctx.moveTo(this.width * .28, y - 31); ctx.lineTo(this.width * .72, y - 31); ctx.stroke();
        ctx.fillStyle = '#f0e8d8'; ctx.font = '700 20px system-ui'; ctx.fillText(p.roomBanner.title, this.width * .5, y - 5);
        ctx.fillStyle = '#afa696'; ctx.font = '500 12px system-ui'; ctx.fillText(p.roomBanner.subtitle, this.width * .5, y + 17);
        ctx.globalAlpha = 1;
      }

      if (p.bossIntro) {
        const elapsed = 1 - p.bossIntro.time / p.bossIntro.duration;
        const intro = smoothstep(Math.min(1, elapsed * 4));
        const outro = smoothstep(Math.min(1, p.bossIntro.time * 3));
        const alpha = intro * outro;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = 'rgba(8,7,7,.58)'; ctx.fillRect(0, 0, this.width, this.height);
        const bandY = this.height * .5;
        ctx.fillStyle = 'rgba(28,17,17,.94)'; ctx.fillRect(0, bandY - 72, this.width, 144);
        ctx.strokeStyle = p.bossIntro.role === 'boss' ? '#dd8b77' : '#d3b15b'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(this.width * .14, bandY - 70); ctx.lineTo(this.width * .86, bandY - 70); ctx.moveTo(this.width * .14, bandY + 70); ctx.lineTo(this.width * .86, bandY + 70); ctx.stroke();
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.save(); ctx.strokeStyle = p.bossIntro.role === 'boss' ? '#dd8b77' : '#d3b15b';
        this.drawAuthoredCrest(ctx, p.bossIntro.title, this.width * .19, bandY, 34, .72);
        this.drawAuthoredCrest(ctx, `${p.bossIntro.title}-mirror`, this.width * .81, bandY, 34, .72);
        ctx.restore();
        ctx.fillStyle = p.bossIntro.role === 'boss' ? '#f0a48d' : '#e4c46f'; ctx.font = '700 13px system-ui';
        const introLabel = p.bossIntro.tier === 'principal' ? 'THE FIRST WITNESS' : p.bossIntro.tier === 'sovereign' ? `SOVEREIGN · DEPTH ${p.bossIntro.depth}` : p.bossIntro.role === 'boss' ? 'REGIONAL APEX' : 'NAMED HUNT';
        ctx.fillText(introLabel, this.width * .5, bandY - 43);
        ctx.fillStyle = '#f4ecde'; ctx.font = '800 28px system-ui'; ctx.fillText(`${p.bossIntro.icon}  ${p.bossIntro.title}`, this.width * .5, bandY - 4);
        ctx.fillStyle = '#bdb3a3'; ctx.font = '500 13px system-ui';
        const mechanic = String(p.bossIntro.subtitle || '').slice(0, 96);
        ctx.fillText(mechanic, this.width * .5, bandY + 34);
        ctx.globalAlpha = 1;
      }

      this.drawTransitionVeil(ctx);
      this.drawLootReveal(ctx);

      if (this.paused) {
        ctx.fillStyle = 'rgba(8,8,7,.58)'; ctx.fillRect(0, 0, this.width, this.height);
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = '#f0e7d7'; ctx.font = '700 25px system-ui'; ctx.fillText('EXPEDITION PAUSED', this.width * .5, this.height * .5 - 8);
        ctx.fillStyle = '#ada494'; ctx.font = '500 13px system-ui'; ctx.fillText('The deterministic simulation is stopped.', this.width * .5, this.height * .5 + 22);
      }
    }

    render() {
      if (!this.ctx) return;
      const started = typeof performance !== 'undefined' ? performance.now() : Date.now();
      const ctx = this.ctx;
      const region = D.REGIONS[this.dungeon.regionIndex];
      ctx.clearRect(0, 0, this.width, this.height);
      this.drawArenaBackground(ctx, region);

      const camera = this.presentation.camera;
      const trauma = this.state.settings.screenShake ? camera.trauma : 0;
      const shakeX = Math.sin(this.presentation.clock * 73) * trauma * 5;
      const shakeY = Math.cos(this.presentation.clock * 61) * trauma * 4;
      const panX = (this.width * .5 - camera.focusX) * .045;
      const panY = (this.height * .5 - camera.focusY) * .035;
      ctx.save();
      ctx.translate(this.width * .5 + shakeX + panX, this.height * .5 + shakeY + panY);
      ctx.scale(camera.zoom, camera.zoom);
